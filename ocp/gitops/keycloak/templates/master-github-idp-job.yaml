{{- if and .Values.github.broker .Values.github.mapper .Values.github.org }}
{{- $clusterDomain := .Values.clusterDomain }}
{{- if not $clusterDomain }}
{{- $ingressConfig := lookup "config.openshift.io/v1" "Ingress" "" "cluster" }}
{{- if and $ingressConfig $ingressConfig.spec }}
{{- $clusterDomain = $ingressConfig.spec.domain }}
{{- end }}
{{- end }}
apiVersion: batch/v1
kind: Job
metadata:
  name: github-idp-config
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 300
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: keycloak-config
      containers:
        - name: configure-github-idp
          image: registry.access.redhat.com/ubi9/ubi:latest
          command: ["/bin/sh", "-c"]
          env:
            - name: KEYCLOAK_URL
              value: "https://keycloak.{{ $clusterDomain }}"
            - name: GITHUB_ORG
              value: {{ .Values.github.org | quote }}
            {{- if .Values.github.team }}
            - name: GITHUB_TEAM
              value: {{ .Values.github.team | quote }}
            {{- end }}
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: github-app-credentials
                  key: client-id
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: github-app-credentials
                  key: client-secret
            - name: KC_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: keycloak-initial-admin
                  key: username
            - name: KC_ADMIN_PASS
              valueFrom:
                secretKeyRef:
                  name: keycloak-initial-admin
                  key: password
            - name: RHDH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keycloak-rhdh-client-secret
                  key: client-secret
            - name: CLUSTER_DOMAIN
              value: {{ $clusterDomain | quote }}
          args:
            - |
              set -e

              echo "=== Obtaining admin token ==="
              TOKEN=$(curl -sf -k "${KEYCLOAK_URL}/realms/master/protocol/openid-connect/token" \
                -d "client_id=admin-cli" \
                -d "username=${KC_ADMIN_USER}" \
                -d "password=${KC_ADMIN_PASS}" \
                -d "grant_type=password" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
              AUTH="Authorization: Bearer ${TOKEN}"

              # --- Helper functions ---

              ensure_group() {
                local realm="$1" group_name="$2"
                local group_id
                group_id=$(curl -sf -k -H "${AUTH}" \
                  "${KEYCLOAK_URL}/admin/realms/${realm}/groups?search=${group_name}" \
                  | python3 -c "
              import sys,json
              groups=json.load(sys.stdin)
              matches=[g['id'] for g in groups if g['name']=='${group_name}']
              print(matches[0] if matches else '')
              ")
                if [ -z "$group_id" ]; then
                  echo "  Creating group: ${group_name}"
                  curl -sf -k -X POST \
                    "${KEYCLOAK_URL}/admin/realms/${realm}/groups" \
                    -H "${AUTH}" -H "Content-Type: application/json" \
                    -d "{\"name\": \"${group_name}\"}"
                  group_id=$(curl -sf -k -H "${AUTH}" \
                    "${KEYCLOAK_URL}/admin/realms/${realm}/groups?search=${group_name}" \
                    | python3 -c "import sys,json; groups=json.load(sys.stdin); print(next(g['id'] for g in groups if g['name']=='${group_name}'))")
                else
                  echo "  Group exists: ${group_name}"
                fi
                echo "$group_id"
              }

              ensure_role_for_group() {
                local realm="$1" role_name="$2" group_id="$3"
                local role_exists
                role_exists=$(curl -sf -k -o /dev/null -w "%{http_code}" \
                  -H "${AUTH}" \
                  "${KEYCLOAK_URL}/admin/realms/${realm}/roles/${role_name}")
                if [ "$role_exists" != "200" ]; then
                  echo "  Creating role: ${role_name}"
                  curl -sf -k -X POST \
                    "${KEYCLOAK_URL}/admin/realms/${realm}/roles" \
                    -H "${AUTH}" -H "Content-Type: application/json" \
                    -d "{\"name\": \"${role_name}\"}"
                else
                  echo "  Role exists: ${role_name}"
                fi
                local role_json
                role_json=$(curl -sf -k -H "${AUTH}" \
                  "${KEYCLOAK_URL}/admin/realms/${realm}/roles/${role_name}")
                echo "  Mapping role ${role_name} to group..."
                curl -sf -k -X POST \
                  "${KEYCLOAK_URL}/admin/realms/${realm}/groups/${group_id}/role-mappings/realm" \
                  -H "${AUTH}" -H "Content-Type: application/json" \
                  -d "[${role_json}]" || echo "  (role may already be mapped)"
              }

              upsert_idp_mapper() {
                local realm="$1" name="$2" payload="$3"
                local mappers existing_id
                mappers=$(curl -sf -k -H "${AUTH}" \
                  "${KEYCLOAK_URL}/admin/realms/${realm}/identity-provider/instances/github/mappers")
                existing_id=$(echo "${mappers}" | python3 -c "
              import sys,json
              mappers=json.load(sys.stdin)
              matches=[m['id'] for m in mappers if m['name']=='${name}']
              print(matches[0] if matches else '')
              " 2>/dev/null)

                if [ -n "$existing_id" ]; then
                  echo "  Updating mapper: ${name}"
                  curl -sf -k -X PUT \
                    "${KEYCLOAK_URL}/admin/realms/${realm}/identity-provider/instances/github/mappers/${existing_id}" \
                    -H "${AUTH}" -H "Content-Type: application/json" \
                    -d "$(echo "${payload}" | python3 -c "import sys,json; d=json.load(sys.stdin); d['id']='${existing_id}'; print(json.dumps(d))")"
                else
                  echo "  Creating mapper: ${name}"
                  curl -sf -k -X POST \
                    "${KEYCLOAK_URL}/admin/realms/${realm}/identity-provider/instances/github/mappers" \
                    -H "${AUTH}" -H "Content-Type: application/json" \
                    -d "${payload}"
                fi
              }

              clear_post_broker_flow() {
                local realm="$1"
                echo "  Clearing postBrokerLoginFlowAlias on GitHub IdP (if set)..."
                local idp_config
                idp_config=$(curl -sf -k -H "${AUTH}" \
                  "${KEYCLOAK_URL}/admin/realms/${realm}/identity-provider/instances/github" 2>/dev/null) || return 0
                echo "$idp_config" | python3 -c "
              import sys,json
              idp = json.load(sys.stdin)
              if idp.get('postBrokerLoginFlowAlias'):
                  idp['postBrokerLoginFlowAlias'] = ''
                  print(json.dumps(idp))
              else:
                  sys.exit(1)
              " 2>/dev/null | curl -sf -k -X PUT \
                  "${KEYCLOAK_URL}/admin/realms/${realm}/identity-provider/instances/github" \
                  -H "${AUTH}" -H "Content-Type: application/json" -d @- || echo "  (no change needed)"
              }

              configure_github_idp() {
                local realm="$1"
                echo "  Configuring GitHub IdP..."
                local existing
                existing=$(curl -sf -k -o /dev/null -w "%{http_code}" \
                  -H "${AUTH}" \
                  "${KEYCLOAK_URL}/admin/realms/${realm}/identity-provider/instances/github")

                local idp_payload="{
                  \"alias\": \"github\",
                  \"providerId\": \"github\",
                  \"enabled\": true,
                  \"trustEmail\": true,
                  \"storeToken\": true,
                  \"firstBrokerLoginFlowAlias\": \"first broker login\",
                  \"config\": {
                    \"clientId\": \"${GITHUB_CLIENT_ID}\",
                    \"clientSecret\": \"${GITHUB_CLIENT_SECRET}\",
                    \"defaultScope\": \"user:email read:org\",
                    \"syncMode\": \"FORCE\"
                  }
                }"

                if [ "$existing" = "200" ]; then
                  echo "  GitHub IdP exists, updating..."
                  curl -s -k -X PUT \
                    "${KEYCLOAK_URL}/admin/realms/${realm}/identity-provider/instances/github" \
                    -H "${AUTH}" -H "Content-Type: application/json" \
                    -d "$idp_payload" -o /dev/null -w "%{http_code}" | grep -q "2[0-9][0-9]" \
                    && echo "  Updated" || echo "  Update skipped (IdP may have stale state)"
                else
                  echo "  Creating GitHub IdP..."
                  curl -sf -k -X POST \
                    "${KEYCLOAK_URL}/admin/realms/${realm}/identity-provider/instances" \
                    -H "${AUTH}" -H "Content-Type: application/json" \
                    -d "$idp_payload"
                fi
              }

              configure_realm() {
                local realm="$1"
                echo ""
                echo "========================================"
                echo "=== Configuring realm: ${realm}"
                echo "========================================"

                # Ensure GitHub IdP
                configure_github_idp "${realm}"

                # Ensure groups and matching realm roles
                local admins_gid org_gid
                admins_gid=$(ensure_group "${realm}" "admins")
                org_gid=$(ensure_group "${realm}" "org-members")
                ensure_role_for_group "${realm}" "admins" "${admins_gid}"
                ensure_role_for_group "${realm}" "org-members" "${org_gid}"

                # Ensure IdP mappers
                upsert_idp_mapper "${realm}" "github-username" '{
                  "name": "github-username",
                  "identityProviderAlias": "github",
                  "identityProviderMapper": "oidc-username-idp-mapper",
                  "config": {
                    "syncMode": "INHERIT",
                    "template": "${CLAIM.login}"
                  }
                }'

                TEAM_CONFIG=""
                if [ -n "${GITHUB_TEAM:-}" ]; then
                  TEAM_CONFIG="\"github.team\": \"${GITHUB_TEAM}\","
                fi
                upsert_idp_mapper "${realm}" "github-org-admins" "{
                  \"name\": \"github-org-admins\",
                  \"identityProviderAlias\": \"github\",
                  \"identityProviderMapper\": \"github-org-to-group-mapper\",
                  \"config\": {
                    \"syncMode\": \"FORCE\",
                    \"github.org\": \"${GITHUB_ORG}\",
                    ${TEAM_CONFIG}
                    \"keycloak.group\": \"admins\"
                  }
                }"

                upsert_idp_mapper "${realm}" "github-org-members" "{
                  \"name\": \"github-org-members\",
                  \"identityProviderAlias\": \"github\",
                  \"identityProviderMapper\": \"github-org-to-group-mapper\",
                  \"config\": {
                    \"syncMode\": \"FORCE\",
                    \"github.org\": \"${GITHUB_ORG}\",
                    \"keycloak.group\": \"org-members\"
                  }
                }"

                # Remove post-broker org-check flow (org membership enforced by mapper)
                clear_post_broker_flow "${realm}"
              }

              # --- Configure SSO realm ---
              configure_realm "sso"

              # --- Configure master realm (additional: admin role) ---
              configure_realm "master"

              echo ""
              echo "=== Assigning admin role to admins group in master realm ==="
              GROUP_ID=$(curl -sf -k -H "${AUTH}" \
                "${KEYCLOAK_URL}/admin/realms/master/groups?search=admins" \
                | python3 -c "import sys,json; groups=json.load(sys.stdin); print(next(g['id'] for g in groups if g['name']=='admins'))")
              ADMIN_ROLE=$(curl -sf -k -H "${AUTH}" \
                "${KEYCLOAK_URL}/admin/realms/master/roles/admin")
              curl -sf -k -X POST \
                "${KEYCLOAK_URL}/admin/realms/master/groups/${GROUP_ID}/role-mappings/realm" \
                -H "${AUTH}" -H "Content-Type: application/json" \
                -d "[${ADMIN_ROLE}]" || echo "(role may already be assigned)"

              echo ""
              echo "=== Ensuring default client scopes on all SSO realm clients ==="
              # The realm import's defaultDefaultClientScopes only applies to
              # clients created after the scopes. Built-in clients (account,
              # account-console, admin-cli, etc.) need scopes assigned explicitly.
              SCOPE_IDS=""
              for SCOPE_NAME in profile email roles web-origins; do
                SID=$(curl -sf -k -H "${AUTH}" \
                  "${KEYCLOAK_URL}/admin/realms/sso/client-scopes" \
                  | python3 -c "
              import sys,json
              for s in json.load(sys.stdin):
                  if s['name']=='${SCOPE_NAME}':
                      print(s['id']); break
              ")
                if [ -n "$SID" ]; then
                  SCOPE_IDS="${SCOPE_IDS} ${SID}"
                fi
              done

              curl -sf -k -H "${AUTH}" "${KEYCLOAK_URL}/admin/realms/sso/clients" \
                | python3 -c "
              import sys,json
              for c in json.load(sys.stdin):
                  if c.get('protocol') == 'openid-connect':
                      print(c['id'])
              " | while read CLIENT_UUID; do
                for SID in $SCOPE_IDS; do
                  curl -sf -k -X PUT -H "${AUTH}" \
                    "${KEYCLOAK_URL}/admin/realms/sso/clients/${CLIENT_UUID}/default-client-scopes/${SID}" 2>/dev/null || true
                done
              done
              echo "  Done"

              echo ""
              echo "=== Configuring RHDH OIDC client in SSO realm ==="
              RHDH_EXISTS=$(curl -sf -k -o /dev/null -w "%{http_code}" \
                -H "${AUTH}" \
                "${KEYCLOAK_URL}/admin/realms/sso/clients?clientId=rhdh" \
                | grep -q 200 && curl -sf -k -H "${AUTH}" \
                "${KEYCLOAK_URL}/admin/realms/sso/clients?clientId=rhdh" \
                | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['id'] if d else '')" || echo "")

              RHDH_PAYLOAD=$(python3 -c "
              import json
              print(json.dumps({
                  'clientId': 'rhdh',
                  'enabled': True,
                  'protocol': 'openid-connect',
                  'publicClient': False,
                  'standardFlowEnabled': True,
                  'directAccessGrantsEnabled': False,
                  'serviceAccountsEnabled': True,
                  'secret': '${RHDH_CLIENT_SECRET}',
                  'redirectUris': ['https://rhdh-developer-hub-rhdh.${CLUSTER_DOMAIN}/api/auth/oidc/handler/frame'],
                  'webOrigins': ['https://rhdh-developer-hub-rhdh.${CLUSTER_DOMAIN}'],
                  'defaultClientScopes': [],
                  'optionalClientScopes': ['groups'],
                  'protocolMappers': [
                      {
                          'name': 'groups',
                          'protocol': 'openid-connect',
                          'protocolMapper': 'oidc-group-membership-mapper',
                          'config': {
                              'claim.name': 'groups',
                              'full.path': 'false',
                              'id.token.claim': 'true',
                              'access.token.claim': 'true',
                              'userinfo.token.claim': 'true'
                          }
                      },
                      {
                          'name': 'audience',
                          'protocol': 'openid-connect',
                          'protocolMapper': 'oidc-audience-mapper',
                          'config': {
                              'included.client.audience': 'rhdh',
                              'id.token.claim': 'true',
                              'access.token.claim': 'true'
                          }
                      }
                  ]
              }))
              ")

              if [ -n "$RHDH_EXISTS" ]; then
                echo "  RHDH client exists, updating..."
                curl -sf -k -X PUT \
                  "${KEYCLOAK_URL}/admin/realms/sso/clients/${RHDH_EXISTS}" \
                  -H "${AUTH}" -H "Content-Type: application/json" \
                  -d "${RHDH_PAYLOAD}"
              else
                echo "  Creating RHDH client..."
                curl -sf -k -X POST \
                  "${KEYCLOAK_URL}/admin/realms/sso/clients" \
                  -H "${AUTH}" -H "Content-Type: application/json" \
                  -d "${RHDH_PAYLOAD}"
              fi
              echo "  Done"

              echo ""
              echo "=== Assigning realm-management roles to RHDH service account ==="
              RHDH_CLIENT_UUID=$(curl -sf -k -H "${AUTH}" \
                "${KEYCLOAK_URL}/admin/realms/sso/clients?clientId=rhdh" \
                | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['id'])")
              SA_USER_ID=$(curl -sf -k -H "${AUTH}" \
                "${KEYCLOAK_URL}/admin/realms/sso/clients/${RHDH_CLIENT_UUID}/service-account-user" \
                | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
              REALM_MGMT_UUID=$(curl -sf -k -H "${AUTH}" \
                "${KEYCLOAK_URL}/admin/realms/sso/clients?clientId=realm-management" \
                | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['id'])")
              ROLES=$(curl -sf -k -H "${AUTH}" \
                "${KEYCLOAK_URL}/admin/realms/sso/clients/${REALM_MGMT_UUID}/roles" \
                | python3 -c "
              import sys,json
              roles = json.load(sys.stdin)
              needed = [r for r in roles if r['name'] in ('view-users','query-users','query-groups','view-realm')]
              print(json.dumps(needed))
              ")
              curl -sf -k -X POST \
                "${KEYCLOAK_URL}/admin/realms/sso/users/${SA_USER_ID}/role-mappings/clients/${REALM_MGMT_UUID}" \
                -H "${AUTH}" -H "Content-Type: application/json" \
                -d "${ROLES}" || echo "  (roles may already be assigned)"
              echo "  Done"

              echo ""
              echo "=== Copying RHDH client secret to rhdh namespace ==="
              SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              CACERT="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
              ENCODED_SECRET=$(echo -n "${RHDH_CLIENT_SECRET}" | base64 -w0)
              curl -sf --cacert "${CACERT}" \
                -H "Authorization: Bearer ${SA_TOKEN}" \
                -H "Content-Type: application/json" \
                -X PUT \
                "https://kubernetes.default.svc/api/v1/namespaces/rhdh/secrets/rhdh-keycloak-client-secret" \
                -d "{\"apiVersion\":\"v1\",\"kind\":\"Secret\",\"metadata\":{\"name\":\"rhdh-keycloak-client-secret\",\"namespace\":\"rhdh\"},\"type\":\"Opaque\",\"data\":{\"client-secret\":\"${ENCODED_SECRET}\"}}" \
                2>/dev/null \
              || curl -sf --cacert "${CACERT}" \
                -H "Authorization: Bearer ${SA_TOKEN}" \
                -H "Content-Type: application/json" \
                -X POST \
                "https://kubernetes.default.svc/api/v1/namespaces/rhdh/secrets" \
                -d "{\"apiVersion\":\"v1\",\"kind\":\"Secret\",\"metadata\":{\"name\":\"rhdh-keycloak-client-secret\",\"namespace\":\"rhdh\"},\"type\":\"Opaque\",\"data\":{\"client-secret\":\"${ENCODED_SECRET}\"}}"
              echo "  Done"

              echo ""
              echo "=== Configuration complete ==="
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: keycloak-config
  namespace: {{ .Values.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: keycloak-config
  namespace: rhdh
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["rhdh-keycloak-client-secret"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: keycloak-config
  namespace: rhdh
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: keycloak-config
subjects:
  - kind: ServiceAccount
    name: keycloak-config
    namespace: {{ .Values.namespace }}
{{- end }}
