{{- $existingDbSecret := lookup "v1" "Secret" .Values.namespace "keycloak-db-secret" }}
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-db-secret
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: ServerSideApply=false
type: Opaque
data:
  username: {{ "keycloak" | b64enc }}
  password: {{ if and $existingDbSecret $existingDbSecret.data (index $existingDbSecret.data "password") }}{{ index $existingDbSecret.data "password" }}{{ else }}{{ randAlphaNum 32 | b64enc }}{{ end }}
---
