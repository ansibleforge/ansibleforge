{{- $existingVaultSecret := lookup "v1" "Secret" .Values.namespace "keycloak-vault-client-secret" }}
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-vault-client-secret
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
data:
  client-secret: {{ if and $existingVaultSecret $existingVaultSecret.data (index $existingVaultSecret.data "client-secret") }}{{ index $existingVaultSecret.data "client-secret" }}{{ else }}{{ randAlphaNum 32 | b64enc }}{{ end }}
