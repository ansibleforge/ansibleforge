{{- $existingSsoMonitorSecret := lookup "v1" "Secret" .Values.namespace "keycloak-sso-monitor-client-secret" }}
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-sso-monitor-client-secret
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: ServerSideApply=false
type: Opaque
data:
  client-secret: {{ if and $existingSsoMonitorSecret $existingSsoMonitorSecret.data (index $existingSsoMonitorSecret.data "client-secret") }}{{ index $existingSsoMonitorSecret.data "client-secret" }}{{ else }}{{ randAlphaNum 32 | b64enc }}{{ end }}
---
