{{/* Generate-once admin password, preserved across syncs via lookup —
     same idiom as the keycloak chart's client secrets. */}}
{{- $existing := lookup "v1" "Secret" .Values.namespace "gitea-admin-credentials" }}
apiVersion: v1
kind: Secret
metadata:
  name: gitea-admin-credentials
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: ServerSideApply=false
type: Opaque
data:
  username: {{ .Values.adminUser | b64enc }}
  password: {{ if and $existing $existing.data (index $existing.data "password") }}{{ index $existing.data "password" }}{{ else }}{{ randAlphaNum 32 | b64enc }}{{ end }}
