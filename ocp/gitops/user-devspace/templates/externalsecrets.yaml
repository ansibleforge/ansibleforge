apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ansible-config
  namespace: {{ .Values.username }}-devspaces
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: ansible-config
    template:
      engineVersion: v2
      data:
        ansible.cfg: |
          [galaxy]
          server_list = certified, validated, galaxy

          [galaxy_server.certified]
          url=https://console.redhat.com/api/automation-hub/content/published/
          auth_url=https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token
          token={{`{{ .automationhub_token }}`}}

          [galaxy_server.validated]
          url=https://console.redhat.com/api/automation-hub/content/validated/
          auth_url=https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token
          token={{`{{ .automationhub_token }}`}}

          [galaxy_server.galaxy]
          url=https://galaxy.ansible.com/
  data:
  - secretKey: automationhub_token
    remoteRef:
      key: ansible
      property: automationhub_token
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: quay-registry-secret
  namespace: {{ .Values.username }}-devspaces
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: quay-registry-secret
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      data:
        .dockerconfigjson: |
          {"auths":{"quay.io":{"username":"{{`{{ .username }}`}}","password":"{{`{{ .password }}`}}","auth":"{{`{{ printf "%s:%s" .username .password | b64enc }}`}}"}}}
  data:
  - secretKey: username
    remoteRef:
      key: quay
      property: username
  - secretKey: password
    remoteRef:
      key: quay
      property: password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: snow-creds
  namespace: {{ .Values.username }}-devspaces
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: snow-creds
  data:
  - secretKey: SN_HOST
    remoteRef:
      key: users/{{ .Values.username }}/servicenow
      property: host
  - secretKey: SN_USERNAME
    remoteRef:
      key: users/{{ .Values.username }}/servicenow
      property: username
  - secretKey: SN_PASSWORD
    remoteRef:
      key: users/{{ .Values.username }}/servicenow
      property: password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: aws-creds
  namespace: {{ .Values.username }}-devspaces
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: aws-creds
    template:
      engineVersion: v2
      data:
        AWS_ACCESS_KEY_ID: "{{`{{ .access_key }}`}}"
        AWS_SECRET_ACCESS_KEY: "{{`{{ .secret_key }}`}}"
        AWS_DEFAULT_REGION: us-east-2
        AWS_REGION: us-east-2
  data:
  - secretKey: access_key
    remoteRef:
      key: users/{{ .Values.username }}/aws
      property: access_key
  - secretKey: secret_key
    remoteRef:
      key: users/{{ .Values.username }}/aws
      property: secret_key
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: aap-token
  namespace: {{ .Values.username }}-devspaces
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: aap-token
    template:
      engineVersion: v2
      data:
        CONTROLLER_HOST: "{{`{{ .host }}`}}"
        CONTROLLER_OAUTH_TOKEN: "{{`{{ .token }}`}}"
        AWXKIT_API_BASE_PATH: "/api/controller/"
  data:
  - secretKey: token
    remoteRef:
      key: users/{{ .Values.username }}/aap
      property: token
  - secretKey: host
    remoteRef:
      key: users/{{ .Values.username }}/aap
      property: host
