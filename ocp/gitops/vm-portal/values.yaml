# Injected by the bootstrap app-of-apps (helm parameter), e.g. "apps.ocp.spark.ansibleforge.dev".
clusterDomain: ""

image:
  # ghcr namespace the container-build workflow pushes to (ghcr.io/<owner>).
  # NOTE: confirm the owner matches where CI publishes (github.repository_owner).
  registry: ghcr.io/ansibleforge
  portalTag: latest
  gatewayTag: latest
  # Name of an image pull secret in the vm-portal namespace, if the ghcr
  # packages are private. Leave "" if they are public. TODO: create + reference.
  pullSecret: ""

gateway:
  awsRegion: us-east-2
  defaultSshUser: ec2-user
  requireManagedByAnsible: true
  # Sandbox-tolerant default carried over from the app: skips verification of
  # the AAP TLS cert. TODO: set false once the in-cluster AAP route presents a
  # CA-trusted cert to the gateway.
  aapTlsInsecure: true
  idleTimeoutMs: 600000
  maxSessionMs: 3600000
  maxSessions: 50
  maxSessionsPerUser: 5
