# Injected by the bootstrap app-of-apps (helm parameter), e.g. "apps.ocp.spark.ansibleforge.dev".
clusterDomain: ""

image:
  # Built in-cluster by the shared-builds BuildConfigs (bc-vm-portal,
  # bc-vm-portal-gateway) and served from the internal registry — same pattern
  # as the site app. No pull secret needed: shared-builds grants
  # system:image-puller to system:authenticated. (The ghcr images still build in
  # CI for external use; switch registry to ghcr.io/ansibleforge + set a
  # pullSecret to deploy from there instead.)
  registry: image-registry.openshift-image-registry.svc:5000/shared-builds
  portalTag: latest
  gatewayTag: latest
  pullSecret: ""

gateway:
  awsRegion: us-east-2
  defaultSshUser: ec2-user
  requireManagedByAnsible: true
  # Sandbox-tolerant default carried over from the app: skips verification of
  # the AAP TLS cert. TODO: set false once the in-cluster AAP route presents a
  # CA-trusted cert to the gateway.
  aapTlsInsecure: true
  idleTimeoutMs: 600000
  maxSessionMs: 3600000
  maxSessions: 50
  maxSessionsPerUser: 5
