{{- if .Values.image.pullSecret }}
# Pull secret for the private ghcr vm-portal images. The container-build
# workflow publishes ghcr.io/ansibleforge/vm-portal(+gateway) as PRIVATE
# packages, so the cluster needs registry creds to pull them. Mirrors the
# shared-builds quay-registry-secret pattern: a GitHub PAT (read:packages) in
# Vault, rendered into a dockerconfigjson.
#
# Populate Vault before enabling this app:
#   vm-portal/ghcr-username  = a GitHub user with read access to the packages
#   vm-portal/ghcr-token     = a PAT (classic) with read:packages
#
# Alternatively, make the two ghcr packages public and set image.pullSecret: ""
# in values — then this secret is not rendered and no Vault entry is needed.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.image.pullSecret }}
  namespace: vm-portal
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: {{ .Values.image.pullSecret }}
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      data:
        .dockerconfigjson: |
          {"auths":{"ghcr.io":{"username":"{{`{{ .username }}`}}","password":"{{`{{ .token }}`}}","auth":"{{`{{ printf "%s:%s" .username .token | b64enc }}`}}"}}}
  data:
    - secretKey: username
      remoteRef:
        key: vm-portal
        property: ghcr-username
    - secretKey: token
      remoteRef:
        key: vm-portal
        property: ghcr-token
{{- end }}
