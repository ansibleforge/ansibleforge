apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vm-portal-gateway-aws
  namespace: vm-portal
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: vm-portal-gateway-aws
  data:
    # TODO: confirm the Vault key/property paths for the gateway's AWS IAM
    # user (the one granted the EC2 Instance Connect policy in
    # vm-portal/deploy/iam-policy-gateway.json). Placeholders below.
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: vm-portal
        property: aws-access-key-id
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: vm-portal
        property: aws-secret-access-key
