apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vm-portal-gateway-aws
  namespace: vm-portal
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: vm-portal-gateway-aws
  data:
    # Reuses the existing AWS keys that AAP already uses (Vault secret/aws,
    # fields access_key/secret_key — same path as the "AWS - AnsibleForge"
    # credential). To switch to a dedicated least-privilege user later (the
    # policy in vm-portal/deploy/iam-policy-gateway.json), point these at that
    # user's Vault path instead.
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: aws
        property: access_key
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: aws
        property: secret_key
