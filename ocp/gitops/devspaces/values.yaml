clusterDomain: ""

# Container-run features (nested containers via podman/buildah) are automatically
# enabled on OCP 4.20+ (K8s 1.33+) clusters via Kubernetes version detection.

# GitHub SCM integration for Dev Spaces workspaces
github:
  scm: false     # Dev Spaces SCM OAuth (clone/push to GitHub from workspaces)

# GitLab SCM integration for Dev Spaces workspaces
gitlab:
  scm: false     # Dev Spaces SCM OAuth (clone/push to GitLab from workspaces)
  host: ""

# Gitea SCM integration for Dev Spaces workspaces. DevSpaces has no native
# Gitea OAuth support (supported SCM OAuth providers: GitHub/GitLab/Bitbucket/
# Azure DevOps), so this publishes the Gitea bot PAT in Che's git-credentials
# format instead; distribute it to user namespaces to activate.
gitea:
  scm: false
  host: ""
