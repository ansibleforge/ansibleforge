apiVersion: v1
kind: ConfigMap
metadata:
  name: devfile-registry-data
  namespace: openshift-devspaces
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  httpd.conf: |
    RewriteEngine On
    RewriteRule ^/v2index$ /index.json [L]
    RewriteRule ^/index(/all)?$ /index.json [L]
    RewriteRule ^/devfiles/index\.json$ /index.json [L]
    RewriteRule ^/health$ /index.json [L]
    Header always set Content-Type "application/json" "expr=%{REQUEST_URI} =~ m#\.(json)$|^/(v2index|index|devfiles|health)#"
    Header always set Access-Control-Allow-Origin "*"
  index.json: |
    [
      {
        "name": "ansibleforge",
        "displayName": "AnsibleForge",
        "description": "GitOps-driven Ansible development environment with community tooling",
        "type": "sample",
        "icon": "https://avatars.githubusercontent.com/u/1507452?s=200",
        "tags": ["Ansible", "OpenShift", "GitOps", "Terraform"],
        "projectType": "ansible",
        "language": "YAML",
        "provider": "AnsibleForge",
        "git": {
          "remotes": {
            "origin": "https://github.com/hfenner/ansibleforge.git"
          }
        }
      }
    ]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devfile-registry
  namespace: openshift-devspaces
  labels:
    app: devfile-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devfile-registry
  template:
    metadata:
      labels:
        app: devfile-registry
    spec:
      containers:
        - name: httpd
          image: registry.access.redhat.com/ubi9/httpd-24:latest
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: registry-data
              mountPath: /var/www/html
            - name: registry-data
              mountPath: /etc/httpd/conf.d/registry.conf
              subPath: httpd.conf
          readinessProbe:
            httpGet:
              path: /v2index
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v2index
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: registry-data
          configMap:
            name: devfile-registry-data
---
apiVersion: v1
kind: Service
metadata:
  name: devfile-registry
  namespace: openshift-devspaces
  labels:
    app: devfile-registry
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: devfile-registry
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: devfile-registry
  namespace: openshift-devspaces
spec:
  to:
    kind: Service
    name: devfile-registry
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
