{{/* <release>-dynamic-plugins-registry-auth — auth.json for pulling the OCI
     plugin artifacts from registry.redhat.io. Default release name is
     redhat-rhaap-portal. Sourced from Vault secret/rhaap-portal:registry-auth
     (a base64 dockerconfig-style auth.json for registry.redhat.io). */}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: redhat-rhaap-portal-dynamic-plugins-registry-auth
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: redhat-rhaap-portal-dynamic-plugins-registry-auth
  data:
    - secretKey: auth.json
      remoteRef: {key: rhaap-portal, property: registry-auth-json}
