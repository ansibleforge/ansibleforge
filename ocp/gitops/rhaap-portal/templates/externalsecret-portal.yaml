{{/* secrets-rhaap-portal — the exact secret name + keys the redhat-rhaap-portal
     chart fetches. Sourced from Vault secret/rhaap-portal, seeded from the
     rhaap-portal-credentials k8s secret (secrets namespace) by the vault
     config job. The OAuth client id/secret come from the "Ansible Automation
     Portal" AAP application (CaC); aap-token is a portal service-account token
     with write access. */}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: secrets-rhaap-portal
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: secrets-rhaap-portal
  data:
    - secretKey: aap-host-url
      remoteRef: {key: rhaap-portal, property: aap-host-url}
    - secretKey: oauth-client-id
      remoteRef: {key: rhaap-portal, property: oauth-client-id}
    - secretKey: oauth-client-secret
      remoteRef: {key: rhaap-portal, property: oauth-client-secret}
    - secretKey: aap-token
      remoteRef: {key: rhaap-portal, property: aap-token}
