  annotations:
    argocd.argoproj.io/sync-options: ServerSideApply=false,Replace=true
spec:
  roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: ClusterRole
    name: cluster-admin
  subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: ocpsysadmin
