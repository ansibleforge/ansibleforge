{{- if .Values.keycloak.login }}
{{- $existingSecret := lookup "v1" "Secret" "keycloak" "keycloak-ocp-client-secret" }}
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-oidc-secret
  namespace: openshift-config
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/sync-options: ServerSideApply=false
type: Opaque
data:
  clientSecret: {{ if and $existingSecret $existingSecret.data (index $existingSecret.data "client-secret") }}{{ index $existingSecret.data "client-secret" }}{{ else }}{{ "placeholder" | b64enc }}{{ end }}
{{- end }}
