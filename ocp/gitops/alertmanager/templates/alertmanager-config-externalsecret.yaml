{{/* Renders the cluster Alertmanager config with a single webhook receiver
     pointing at the EDA "Alertmanager" event stream. URL and bearer token
     come from Vault secret/alertmanager-eda, published by the AAP dispatch
     post_tasks and seeded by the vault config job. creationPolicy Merge:
     the operator owns the alertmanager-main secret; we only supply its
     alertmanager.yaml key. */}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager-eda-config
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: alertmanager-main
    creationPolicy: Merge
    template:
      engineVersion: v2
      data:
        alertmanager.yaml: |
          global:
            resolve_timeout: 5m
          route:
            receiver: eda
            group_by:
              - alertname
              - namespace
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 12h
          receivers:
            - name: eda
              webhook_configs:
                - url: "{{`{{ .url }}`}}"
                  send_resolved: true
                  http_config:
                    authorization:
                      type: Bearer
                      credentials: "{{`{{ .token }}`}}"
  data:
    - secretKey: url
      remoteRef:
        key: alertmanager-eda
        property: url
    - secretKey: token
      remoteRef:
        key: alertmanager-eda
        property: token
