{{/* Drop SNO-structural platform alerts before they reach Alertmanager.
     HighOverallControlPlaneMemory is multi-node control-plane failover
     guidance with no remediation on a single-node cluster. Unlike a
     severity relabel (which only rewrites the Alertmanager copy and left
     the console homepage — sourced from Thanos rule evaluation — still
     showing it), action: Drop removes the alert from the Alertmanager
     pipeline entirely. GitOps-managed, so it survives cluster upgrades
     that reset Alertmanager storage — the failure mode that repeatedly
     wiped the manual runtime silence.

     Note: this still does not change the Thanos rule evaluation, so the
     alert may remain visible under Observe -> Alerting (Firing) in the
     console. It removes the alert from Alertmanager routing/notifications
     (including EDA delivery) and the homepage status card. A runtime
     silence remains the belt-and-suspenders for the Observe view; this
     template makes the suppression durable across upgrades. */}}
apiVersion: monitoring.openshift.io/v1
kind: AlertRelabelConfig
metadata:
  name: sno-structural-drop
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  configs:
    - sourceLabels:
        - alertname
      regex: "HighOverallControlPlaneMemory"
      action: Drop
