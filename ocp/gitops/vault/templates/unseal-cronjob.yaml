apiVersion: batch/v1
kind: CronJob
metadata:
  name: vault-unseal
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  schedule: "* * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 55
      template:
        spec:
          serviceAccountName: vault-unseal
          restartPolicy: Never
          containers:
            - name: unseal
              image: registry.access.redhat.com/ubi9/ubi-minimal:latest
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e

                  VAULT_ADDR="http://vault.{{ .Values.namespace }}.svc:8200"
                  SECRET_NAME="vault-unseal-keys"
                  SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                  API="https://kubernetes.default.svc"
                  CACERT="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
                  NS="{{ .Values.namespace }}"

                  # Wait for vault to be reachable
                  for i in $(seq 1 30); do
                    if curl -sf "${VAULT_ADDR}/v1/sys/health" -o /dev/null 2>/dev/null || \
                       curl -sf "${VAULT_ADDR}/v1/sys/seal-status" -o /dev/null 2>/dev/null; then
                      break
                    fi
                    echo "Waiting for Vault to be reachable..."
                    sleep 2
                  done

                  # Get seal status
                  SEAL_STATUS=$(curl -sf "${VAULT_ADDR}/v1/sys/seal-status" 2>/dev/null) || {
                    echo "Vault not reachable, exiting"
                    exit 0
                  }

                  INITIALIZED=$(echo "${SEAL_STATUS}" | grep -o '"initialized":[a-z]*' | cut -d: -f2)
                  SEALED=$(echo "${SEAL_STATUS}" | grep -o '"sealed":[a-z]*' | cut -d: -f2)
                  MIGRATION=$(echo "${SEAL_STATUS}" | grep -o '"migration":[a-z]*' | cut -d: -f2)

                  echo "Vault status: initialized=${INITIALIZED}, sealed=${SEALED}, migration=${MIGRATION}"

                  # If already unsealed, nothing to do
                  if [ "${SEALED}" = "false" ]; then
                    echo "Vault is already unsealed (KMS auto-unseal active)"
                    exit 0
                  fi

                  # Helper: read secret from Kubernetes API
                  get_secret() {
                    curl -sf --cacert "${CACERT}" \
                      -H "Authorization: Bearer ${SA_TOKEN}" \
                      "${API}/api/v1/namespaces/${NS}/secrets/${SECRET_NAME}"
                  }

                  # Helper: create/update secret via Kubernetes API
                  save_secret() {
                    local DATA="$1"
                    # Try to create; if it exists, patch instead
                    HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --cacert "${CACERT}" \
                      -H "Authorization: Bearer ${SA_TOKEN}" \
                      -H "Content-Type: application/json" \
                      -X POST "${API}/api/v1/namespaces/${NS}/secrets" \
                      -d "{\"apiVersion\":\"v1\",\"kind\":\"Secret\",\"metadata\":{\"name\":\"${SECRET_NAME}\",\"namespace\":\"${NS}\"},\"type\":\"Opaque\",\"data\":${DATA}}")

                    if [ "${HTTP_CODE}" = "409" ]; then
                      curl -sf --cacert "${CACERT}" \
                        -H "Authorization: Bearer ${SA_TOKEN}" \
                        -H "Content-Type: application/strategic-merge-patch+json" \
                        -X PATCH "${API}/api/v1/namespaces/${NS}/secrets/${SECRET_NAME}" \
                        -d "{\"data\":${DATA}}" > /dev/null
                    fi
                  }

                  # Helper: base64 encode (portable)
                  b64() { echo -n "$1" | base64 | tr -d '\n'; }

                  # Initialize if needed (recovery keys are generated for KMS seal)
                  if [ "${INITIALIZED}" = "false" ]; then
                    echo "Initializing Vault with KMS auto-unseal..."
                    INIT_RESPONSE=$(curl -sf "${VAULT_ADDR}/v1/sys/init" \
                      -X PUT \
                      -H "Content-Type: application/json" \
                      -d '{"recovery_shares":1,"recovery_threshold":1}')

                    RECOVERY_KEY=$(echo "${INIT_RESPONSE}" | grep -o '"recovery_keys":\["[^"]*"\]' | grep -o '\["[^"]*"\]' | tr -d '[]"')
                    ROOT_TOKEN=$(echo "${INIT_RESPONSE}" | grep -o '"root_token":"[^"]*"' | cut -d'"' -f4)

                    echo "Storing recovery keys in Secret/${SECRET_NAME}"
                    DATA="{\"recovery-key-0\":\"$(b64 "${RECOVERY_KEY}")\",\"root-token\":\"$(b64 "${ROOT_TOKEN}")\"}"
                    save_secret "${DATA}"

                    echo "Vault initialized — KMS will auto-unseal on startup"
                    exit 0
                  fi

                  # Seal migration: Vault is sealed and in migration mode
                  # This happens once when transitioning from Shamir to KMS auto-unseal
                  if [ "${MIGRATION}" = "true" ]; then
                    echo "Vault is in seal migration mode (Shamir → KMS)"
                    SECRET_DATA=$(get_secret) || {
                      echo "ERROR: Migration requires unseal key but no Secret/${SECRET_NAME} found"
                      exit 1
                    }

                    UNSEAL_KEY=$(echo "${SECRET_DATA}" | grep -o '"unseal-key-0": *"[^"]*"' | cut -d'"' -f4 | base64 -d)

                    echo "Performing migration unseal..."
                    RESULT=$(curl -s -w "\n%{http_code}" "${VAULT_ADDR}/v1/sys/unseal" \
                      -X PUT \
                      -H "Content-Type: application/json" \
                      -d "{\"key\":\"${UNSEAL_KEY}\",\"migrate\":true}")
                    HTTP=$(echo "${RESULT}" | tail -1)
                    BODY=$(echo "${RESULT}" | sed '$d')

                    if [ "${HTTP}" -ge 200 ] && [ "${HTTP}" -lt 300 ]; then
                      echo "Seal migration complete — Vault is now using KMS auto-unseal"
                    else
                      echo "ERROR: Migration unseal returned HTTP ${HTTP}: ${BODY}"
                      exit 1
                    fi
                    exit 0
                  fi

                  # Sealed but not migrating — likely KMS connectivity issue
                  echo "WARNING: Vault is sealed but not in migration mode."
                  echo "Check KMS connectivity and vault-kms-credentials secret."
                  exit 1
