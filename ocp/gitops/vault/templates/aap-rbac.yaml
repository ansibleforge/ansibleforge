apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aap-keycloak-sso
  namespace: {{ .Values.namespace }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["vault-approle-aap-playbook"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aap-keycloak-sso
  namespace: {{ .Values.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: aap-keycloak-sso
subjects:
  - kind: ServiceAccount
    name: aap-keycloak-sso
    namespace: aap
