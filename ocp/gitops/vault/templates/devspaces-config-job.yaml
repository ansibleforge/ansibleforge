apiVersion: batch/v1
kind: Job
metadata:
  name: vault-config
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 180
  template:
    spec:
      serviceAccountName: vault-unseal
      restartPolicy: Never
      containers:
        - name: vault-config
          image: registry.connect.redhat.com/hashicorp/vault:1.21.2-ubi
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e

              VAULT_ADDR="http://vault.{{ .Values.namespace }}.svc:8200"
              SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              API="https://kubernetes.default.svc"
              CACERT="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
              NS="{{ .Values.namespace }}"

              # Get root token from secret (.data.root-token is base64-encoded)
              SECRET_JSON=$(curl -sf --cacert "${CACERT}" \
                -H "Authorization: Bearer ${SA_TOKEN}" \
                "${API}/api/v1/namespaces/${NS}/secrets/vault-unseal-keys")
              ROOT_TOKEN=$(echo "${SECRET_JSON}" \
                | python3 -c 'import json,sys,base64; d=json.load(sys.stdin); print(base64.b64decode(d["data"]["root-token"]).decode())')

              export VAULT_ADDR VAULT_TOKEN="${ROOT_TOKEN}"

              echo "=== Vault engine and auth setup ==="

              # Enable KV v2 secrets engine (idempotent)
              vault secrets list -format=json | grep -q '"secret/"' \
                && echo "KV v2 already enabled" \
                || vault secrets enable -path=secret kv-v2

              # Enable Kubernetes auth method (idempotent)
              vault auth list -format=json | grep -q '"kubernetes/"' \
                && echo "Kubernetes auth already enabled" \
                || vault auth enable kubernetes

              # Configure Kubernetes auth
              # No token_reviewer_jwt needed: the vault SA has system:auth-delegator
              # so Vault uses its own pod token for TokenReview calls
              vault write auth/kubernetes/config \
                kubernetes_host="https://kubernetes.default.svc" \
                kubernetes_ca_cert=@"${CACERT}"

              echo "=== ESO policy and role ==="

              vault policy write external-secrets - <<'POLICY'
              path "secret/data/*" {
                capabilities = ["read"]
              }
              path "secret/metadata/*" {
                capabilities = ["read", "list"]
              }
              POLICY

              vault write auth/kubernetes/role/external-secrets \
                bound_service_account_names="cluster-external-secrets" \
                bound_service_account_namespaces="external-secrets" \
                policies="external-secrets" \
                ttl="1h"

              echo "=== DevSpaces policy and role ==="

              vault policy write devspaces-user - <<'POLICY'
              path "secret/data/*" {
                capabilities = ["read"]
              }
              path "secret/metadata/*" {
                capabilities = ["read", "list"]
              }
              POLICY

              vault write auth/kubernetes/role/devspaces-user \
                bound_service_account_names="*" \
                bound_service_account_namespaces="*" \
                policies="devspaces-user" \
                ttl="1h"

              echo "=== Seeding default secret values (no-overwrite) ==="

              # Write a secret only if it does not already exist (HTTP 404).
              # Any other existing value (200) is left untouched.
              init_secret() {
                local path="$1" data="$2"
                local status
                status=$(curl -s -o /dev/null -w "%{http_code}" \
                  -H "X-Vault-Token: ${VAULT_TOKEN}" \
                  "${VAULT_ADDR}/v1/secret/data/${path}")
                case "$status" in
                  200) echo "secret/data/${path} exists, skipping" ;;
                  404)
                    curl -sf -X POST \
                      -H "X-Vault-Token: ${VAULT_TOKEN}" \
                      -H "Content-Type: application/json" \
                      -d "{\"data\":${data}}" \
                      "${VAULT_ADDR}/v1/secret/data/${path}" > /dev/null
                    echo "secret/data/${path} seeded with default value"
                    ;;
                  *) echo "WARNING: unexpected status ${status} for secret/data/${path}, skipping" ;;
                esac
              }

              init_secret "github"  '{"token":"test"}'
              init_secret "ansible" '{"automationhub_token":"test"}'
              init_secret "quay"    '{"username":"test","password":"test"}'

              echo "=== OIDC auth (Keycloak) ==="

              # Read OIDC client secret from K8s secret (if available)
              OIDC_SECRET_JSON=$(curl -sf --cacert "${CACERT}" \
                -H "Authorization: Bearer ${SA_TOKEN}" \
                "${API}/api/v1/namespaces/${NS}/secrets/vault-oidc-client-secret" 2>/dev/null || true)

              if [ -n "${OIDC_SECRET_JSON}" ]; then
                OIDC_CLIENT_SECRET=$(echo "${OIDC_SECRET_JSON}" \
                  | python3 -c 'import json,sys,base64; d=json.load(sys.stdin); print(base64.b64decode(d["data"]["client-secret"]).decode())')

                # Enable OIDC auth method (idempotent)
                vault auth list -format=json | grep -q '"oidc/"' \
                  && echo "OIDC auth already enabled" \
                  || vault auth enable oidc

                # Configure OIDC with Keycloak
                vault write auth/oidc/config \
                  oidc_discovery_url="https://keycloak.{{ .Values.clusterDomain }}/realms/sso" \
                  oidc_client_id="vault" \
                  oidc_client_secret="${OIDC_CLIENT_SECRET}" \
                  default_role="reader"

                # Admin policy - full access
                vault policy write admin - <<'POLICY'
              path "*" {
                capabilities = ["create", "read", "update", "delete", "list", "sudo"]
              }
              POLICY

                # Reader policy - read-only secrets
                vault policy write reader - <<'POLICY'
              path "secret/data/*" {
                capabilities = ["read", "list"]
              }
              path "secret/metadata/*" {
                capabilities = ["read", "list"]
              }
              path "sys/mounts" {
                capabilities = ["read"]
              }
              POLICY

                # Default role for users not in admins group
                vault write auth/oidc/role/reader \
                  bound_audiences="vault" \
                  allowed_redirect_uris="https://vault.{{ .Values.clusterDomain }}/ui/vault/auth/oidc/oidc/callback" \
                  allowed_redirect_uris="http://localhost:8250/oidc/callback" \
                  user_claim="preferred_username" \
                  groups_claim="/groups" \
                  oidc_scopes="openid,profile,email,groups" \
                  policies="reader" \
                  ttl="1h"

                # Admin role for users in the admins group
                vault write auth/oidc/role/admin \
                  bound_audiences="vault" \
                  allowed_redirect_uris="https://vault.{{ .Values.clusterDomain }}/ui/vault/auth/oidc/oidc/callback" \
                  allowed_redirect_uris="http://localhost:8250/oidc/callback" \
                  user_claim="preferred_username" \
                  groups_claim="/groups" \
                  bound_claims_type="glob" \
                  bound_claims='{"groups": ["admins"]}' \
                  oidc_scopes="openid,profile,email,groups" \
                  policies="admin" \
                  ttl="1h"

                # Make OIDC visible on the login page as default
                vault auth tune -listing-visibility=unauth oidc/

                echo "OIDC auth configured with Keycloak"
              else
                echo "WARNING: vault-oidc-client-secret not found, skipping OIDC setup"
              fi

              echo "=== Vault configuration complete ==="
              echo "KV engine:"
              vault secrets list | grep secret
              echo "Auth roles:"
              vault read auth/kubernetes/role/external-secrets
              vault read auth/kubernetes/role/devspaces-user
