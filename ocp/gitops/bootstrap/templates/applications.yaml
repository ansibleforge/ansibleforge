{{- range $name, $app := .Values.components }}
{{- if $app.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $app.name | default $name }}
  namespace: openshift-gitops
  {{- if $app.syncWave }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ $app.syncWave | quote }}
  {{- end }}
spec:
  project: default
  {{- if $app.sources }}
  sources:
    {{- range $app.sources }}
    - repoURL: {{ .repoURL | default $.Values.repoURL }}
      targetRevision: {{ .targetRevision | default $.Values.targetRevision }}
      {{- with .path }}
      path: {{ . }}
      {{- end }}
      {{- with .chart }}
      chart: {{ . }}
      {{- end }}
      {{- with .ref }}
      ref: {{ . }}
      {{- end }}
      {{- if or .helm .injectClusterParams }}
      helm:
        {{- with .helm }}
        {{- if .valueFiles }}
        valueFiles:
          {{- toYaml .valueFiles | nindent 10 }}
        {{- end }}
        {{- end }}
        parameters:
          {{- if $.Values.clusterDomain }}
          - name: clusterDomain
            value: {{ $.Values.clusterDomain | quote }}
          {{- end }}
          {{- if $.Values.clusterName }}
          - name: clusterName
            value: {{ $.Values.clusterName | quote }}
          {{- end }}
          {{- if and .injectClusterRouterBase $.Values.clusterDomain }}
          - name: global.clusterRouterBase
            value: {{ $.Values.clusterDomain | quote }}
          {{- end }}
          {{- if and .injectKeycloakUrl $.Values.clusterDomain }}
          - name: upstream.backstage.extraEnvVars[0].name
            value: KEYCLOAK_METADATA_URL
          - name: upstream.backstage.extraEnvVars[0].value
            value: {{ printf "https://keycloak.%s/realms/sso/.well-known/openid-configuration" $.Values.clusterDomain | quote }}
          - name: upstream.backstage.extraEnvVars[1].name
            value: POSTGRESQL_ADMIN_PASSWORD
          - name: upstream.backstage.extraEnvVars[1].valueFrom.secretKeyRef.name
            value: rhdh-postgresql
          - name: upstream.backstage.extraEnvVars[1].valueFrom.secretKeyRef.key
            value: postgres-password
          {{- end }}
          {{- with .helm }}
          {{- range .parameters }}
          - name: {{ .name }}
            value: {{ .value | quote }}
          {{- end }}
          {{- end }}
      {{- end }}
    {{- end }}
  {{- else }}
  source:
    repoURL: {{ $.Values.repoURL }}
    targetRevision: {{ $.Values.targetRevision }}
    path: {{ $app.path }}
    {{- if or $app.helm $.Values.clusterDomain $.Values.clusterName }}
    helm:
      {{- with $app.helm }}
      {{- if .valueFiles }}
      valueFiles:
        {{- toYaml .valueFiles | nindent 8 }}
      {{- end }}
      {{- end }}
      parameters:
        {{- if $.Values.clusterDomain }}
        - name: clusterDomain
          value: {{ $.Values.clusterDomain | quote }}
        {{- end }}
        {{- if $.Values.clusterName }}
        - name: clusterName
          value: {{ $.Values.clusterName | quote }}
        {{- end }}
        {{- with $app.helm }}
        {{- range .parameters }}
        - name: {{ .name }}
          value: {{ .value | quote }}
        {{- end }}
        {{- end }}
    {{- end }}
  {{- end }}
  destination:
    server: https://kubernetes.default.svc
    {{- with $app.destination }}
    {{- with .namespace }}
    namespace: {{ . }}
    {{- end }}
    {{- end }}
  {{- if $app.ignoreDifferences }}
  ignoreDifferences:
    {{- toYaml $app.ignoreDifferences | nindent 4 }}
  {{- end }}
  syncPolicy:
    {{- if not $app.manualSync }}
    automated:
      prune: true
      selfHeal: true
    {{- end }}
    {{- if $app.retry }}
    retry:
      limit: 10
      backoff:
        duration: 30s
        factor: 1
        maxDuration: 5m
    {{- end }}
    {{- if $app.syncOptions }}
    syncOptions:
      {{- toYaml $app.syncOptions | nindent 6 }}
    {{- end }}
{{- end }}
{{- end }}
