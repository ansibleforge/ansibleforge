repoURL: https://github.com/hfenner/ansibleforge.git
targetRevision: main
clusterDomain: ""
clusterName: ""

components:

  gitops-config:
    enabled: true
    syncWave: "0"
    path: ocp/gitops/gitops-config
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    ignoreDifferences:
      - group: argoproj.io
        kind: ArgoCD
        name: openshift-gitops
        managedFieldsManagers:
          - manager
      - group: external-secrets.io
        kind: ExternalSecret
        jqPathExpressions:
          - .spec.data[].remoteRef.conversionStrategy
          - .spec.data[].remoteRef.decodingStrategy
          - .spec.data[].remoteRef.metadataPolicy
          - .spec.target.creationPolicy
          - .spec.target.deletionPolicy

  vault:
    enabled: true
    syncWave: "1"
    path: ocp/gitops/vault
    destination:
      namespace: vault
    retry: true
    syncOptions:
      - SkipDryRunOnMissingResource=true
    ignoreDifferences:
      - group: admissionregistration.k8s.io
        kind: MutatingWebhookConfiguration
        name: vault-agent-injector-cfg
        jsonPointers:
          - /webhooks/0/clientConfig/caBundle

  external-secrets:
    enabled: true
    syncWave: "1"
    path: ocp/gitops/external-secrets
    retry: true
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    ignoreDifferences:
      - group: external-secrets.io
        kind: ExternalSecret
        jqPathExpressions:
          - .spec.data[].remoteRef.conversionStrategy
          - .spec.data[].remoteRef.decodingStrategy
          - .spec.data[].remoteRef.metadataPolicy
          - .spec.target.creationPolicy
          - .spec.target.deletionPolicy

  pipelines:
    enabled: true
    syncWave: "1"
    path: ocp/gitops/pipelines
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true

  keycloak:
    enabled: true
    syncWave: "1"
    path: ocp/gitops/keycloak
    retry: true
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    ignoreDifferences:
      - group: ""
        kind: Secret
        jqPathExpressions:
          - .data
      - group: external-secrets.io
        kind: ExternalSecret
        jqPathExpressions:
          - .spec.data[].remoteRef.conversionStrategy
          - .spec.data[].remoteRef.decodingStrategy
          - .spec.data[].remoteRef.metadataPolicy
          - .spec.target.creationPolicy
          - .spec.target.deletionPolicy

  gitea:
    enabled: true
    syncWave: "1"
    path: ocp/gitops/gitea
    retry: true
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    ignoreDifferences:
      # gitea-admin-credentials is generate-once via lookup; the repo-server
      # renders without cluster access, so the template re-randomizes every
      # render and .data can never converge.
      - group: ""
        kind: Secret
        jqPathExpressions:
          - .data

  aap:
    enabled: true
    syncWave: "1"
    name: aap
    path: ocp/gitops/aap
    retry: true
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    ignoreDifferences:
      - group: external-secrets.io
        kind: ExternalSecret
        jqPathExpressions:
          - .spec.data[].remoteRef.conversionStrategy
          - .spec.data[].remoteRef.decodingStrategy
          - .spec.data[].remoteRef.metadataPolicy
          - .spec.target.creationPolicy
          - .spec.target.deletionPolicy

  noobaa-tuning:
    enabled: false
    syncWave: "1"
    path: ocp/gitops/noobaa-tuning
    destination:
      namespace: openshift-storage
    manualSync: true
    retry: true
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
    ignoreDifferences:
      - group: noobaa.io
        kind: NooBaa
        name: noobaa
        jsonPointers:
          - /spec/coreResources
          - /spec/dbResources
          - /spec/endpoints

  local-users:
    enabled: false
    syncWave: "2"
    path: ocp/gitops/local-users
    syncOptions:
      - ServerSideApply=true

  user-projects:
    enabled: false
    syncWave: "2"
    path: ocp/gitops/user-projects
    syncOptions:
      - ServerSideApply=true

  shared-builds:
    enabled: true
    syncWave: "3"
    path: ocp/gitops/shared-builds
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    ignoreDifferences:
      - group: external-secrets.io
        kind: ExternalSecret
        jqPathExpressions:
          - .spec.data[].remoteRef.conversionStrategy
          - .spec.data[].remoteRef.decodingStrategy
          - .spec.data[].remoteRef.metadataPolicy
          - .spec.target.creationPolicy
          - .spec.target.deletionPolicy

  cluster-auth:
    enabled: true
    syncWave: "2"
    path: ocp/gitops/auth
    syncOptions:
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
      - Validate=false
    ignoreDifferences:
      - group: ""
        kind: Secret
        jqPathExpressions:
          - .data
      - group: external-secrets.io
        kind: ExternalSecret
        jqPathExpressions:
          - .spec.data[].remoteRef.conversionStrategy
          - .spec.data[].remoteRef.decodingStrategy
          - .spec.data[].remoteRef.metadataPolicy
          - .spec.target.creationPolicy
          - .spec.target.deletionPolicy

  sso-monitor:
    enabled: true
    syncWave: "2"
    path: ocp/gitops/sso-monitor
    destination:
      namespace: sso-monitor
    retry: true
    syncOptions:
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    ignoreDifferences:
      - group: external-secrets.io
        kind: ExternalSecret
        jqPathExpressions:
          - .spec.data[].remoteRef.conversionStrategy
          - .spec.data[].remoteRef.decodingStrategy
          - .spec.data[].remoteRef.metadataPolicy
          - .spec.target.creationPolicy
          - .spec.target.deletionPolicy

  devspaces:
    enabled: true
    path: ocp/gitops/devspaces
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    ignoreDifferences:
      - group: external-secrets.io
        kind: ExternalSecret
        jqPathExpressions:
          - .spec.data[].remoteRef.conversionStrategy
          - .spec.data[].remoteRef.decodingStrategy
          - .spec.data[].remoteRef.metadataPolicy
          - .spec.target.creationPolicy
          - .spec.target.deletionPolicy

  web-terminal:
    enabled: true
    path: ocp/gitops/web-terminal
    syncOptions:
      - ServerSideApply=true

  cert-manager:
    enabled: true
    syncWave: "1"
    path: ocp/gitops/cert-manager
    retry: true
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true

  ingress-certs:
    enabled: true
    syncWave: "3"
    path: ocp/gitops/ingress-certs
    retry: true
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true

  site:
    enabled: true
    syncWave: "3"
    path: ocp/gitops/site
    destination:
      namespace: site
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    ignoreDifferences:
      - group: ""
        kind: Secret
        jqPathExpressions:
          - .data
          - .stringData

  ansible-tools:
    enabled: true
    syncWave: "3"
    path: ocp/gitops/ansible-tools
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    ignoreDifferences:
      - group: ""
        kind: Secret
        jqPathExpressions:
          - .data
          - .stringData

  # Disabled until the build-time VITE_* AAP config, AAP OAuth client, AWS Vault
  # Images built in-cluster (shared-builds); gateway AWS creds reuse Vault
  # secret/aws; OAuth app + templates created via CaC. See ocp/gitops/vm-portal/README.md.
  vm-portal:
    enabled: true
    syncWave: "3"
    path: ocp/gitops/vm-portal
    destination:
      namespace: vm-portal
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    ignoreDifferences:
      - group: external-secrets.io
        kind: ExternalSecret
        jqPathExpressions:
          - .spec.data[].remoteRef.conversionStrategy
          - .spec.data[].remoteRef.decodingStrategy
          - .spec.data[].remoteRef.metadataPolicy
          - .spec.target.creationPolicy
          - .spec.target.deletionPolicy
