{{- $existing := lookup "v1" "Secret" "ansible-tools" "oauth2-proxy" }}
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy
  namespace: ansible-tools
  annotations:
    argocd.argoproj.io/sync-wave: "0"
type: Opaque
data:
  cookie-secret: {{ if and $existing $existing.data (index $existing.data "cookie-secret") }}{{ index $existing.data "cookie-secret" }}{{ else }}{{ randAlphaNum 32 | b64enc }}{{ end }}
  client-secret: {{ if and $existing $existing.data (index $existing.data "client-secret") }}{{ index $existing.data "client-secret" }}{{ else }}{{ randAlphaNum 32 | b64enc }}{{ end }}
