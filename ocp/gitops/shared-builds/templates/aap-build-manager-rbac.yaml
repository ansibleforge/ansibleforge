apiVersion: v1
kind: ServiceAccount
metadata:
  name: aap-build-manager
  namespace: {{ .Values.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aap-build-manager
  namespace: {{ .Values.namespace }}
rules:
  - apiGroups: ["build.openshift.io"]
    resources: ["buildconfigs/instantiate"]
    verbs: ["create"]
  - apiGroups: ["build.openshift.io"]
    resources: ["builds"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aap-build-manager
  namespace: {{ .Values.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: aap-build-manager
subjects:
  - kind: ServiceAccount
    name: aap-build-manager
    namespace: {{ .Values.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-token-creator
  namespace: {{ .Values.namespace }}
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    resourceNames: ["aap-build-manager"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-token-creator
  namespace: {{ .Values.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-token-creator
subjects:
  - kind: ServiceAccount
    name: vault
    namespace: vault
