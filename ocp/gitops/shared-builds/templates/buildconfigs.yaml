apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: bc-tools-ansibleforge
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  source:
    git:
      uri: {{ .Values.sourceRepo }}
      ref: {{ .Values.sourceRevision }}
    contextDir: containers/tools-ansibleforge
  strategy:
    type: Docker
    dockerStrategy:
      volumes:
      - name: etc-pki-entitlement
        mounts:
        - destinationPath: /etc/pki/entitlement
        source:
          type: Secret
          secret:
            secretName: etc-pki-entitlement
      - name: ansible-config
        mounts:
        - destinationPath: /tmp/anstmp
        source:
          type: Secret
          secret:
            secretName: ansible-config
      dockerfilePath: Containerfile
  output:
    to:
      kind: ImageStreamTag
      name: tools-ansibleforge:latest
  triggers:
  - type: ConfigChange
