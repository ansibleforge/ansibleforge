namespace: sso-monitor
clusterDomain: ""
clusterName: ""

image: registry.access.redhat.com/ubi9/python-311:latest

# Keycloak OIDC configuration
keycloak:
  realm: sso
  # Dedicated monitoring client with ROPC (Direct Access Grants) enabled
  clientId: sso-monitor

# Test user credentials — pulled from AWS Secrets Manager via ExternalSecret
testUser:
  username: sysadmin

# Services to validate tokens against after successful ROPC grant
services:
  gitlab:
    enabled: true
    validationPath: ""
  ocp:
    enabled: true
    validationPath: ""

# AWS SAML SSO validation — tests full Keycloak SAML -> AWS STS flow
aws:
  enabled: true
  roleArn: ""
  providerArn: ""

# Alerting
alerting:
  enabled: true
  # Fire alert after this many minutes of failure
  forDuration: 5m

# Enable User Workload Monitoring (creates ConfigMap in openshift-monitoring)
enableUserWorkloadMonitoring: true

# Scrape interval
scrapeInterval: 60s

# Probe interval (how often the exporter tests logins, in seconds)
probeIntervalSeconds: 300
