apiVersion: v1
kind: Service
metadata:
  name: sso-monitor
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app: sso-monitor
spec:
  selector:
    app: sso-monitor
  ports:
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP
