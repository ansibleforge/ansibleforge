apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: sso-monitor-credentials
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: sso-monitor-credentials
  data:
  - secretKey: test-user-password
    remoteRef:
      key: keycloak
      property: sysadmin-password
  - secretKey: client-secret
    remoteRef:
      key: keycloak
      property: sso-monitor-client-secret
  - secretKey: aws-bot-password
    remoteRef:
      key: keycloak
      property: aws-monitor-bot-password
