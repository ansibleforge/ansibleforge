apiVersion: v1
kind: ConfigMap
metadata:
  name: sso-monitor-script
  namespace: {{ .Values.namespace }}
data:
  exporter.py: |
    #!/usr/bin/env python3
    """SSO Login Health Exporter for Prometheus.

    Tests Keycloak OIDC (ROPC) and optionally SAML (IDP-initiated SSO to AWS)
    flows, exposing results as Prometheus metrics.
    """

    import json
    import logging
    import os
    import re
    import threading
    import time
    from html.parser import HTMLParser

    import requests
    import urllib3
    from prometheus_client import Gauge, start_http_server

    urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)
    logging.basicConfig(level=logging.INFO, format="%(asctime)s %(levelname)s %(message)s")
    log = logging.getLogger("sso-monitor")

    # --- Prometheus metrics ---
    LOGIN_SUCCESS = Gauge(
        "sso_login_success",
        "Whether Keycloak ROPC token grant succeeded (1=ok, 0=fail)",
        ["user"],
    )
    LOGIN_DURATION = Gauge(
        "sso_login_duration_seconds",
        "Time taken for Keycloak ROPC token grant",
        ["user"],
    )
    VALIDATION_SUCCESS = Gauge(
        "sso_validation_success",
        "Whether downstream service accepted the token (1=ok, 0=fail)",
        ["service", "user"],
    )

    # --- Configuration from environment ---
    KEYCLOAK_URL = os.environ["KEYCLOAK_URL"]
    REALM = os.environ["REALM"]
    CLIENT_ID = os.environ["CLIENT_ID"]
    CLIENT_SECRET = os.environ["CLIENT_SECRET"]
    TEST_USERNAME = os.environ["TEST_USERNAME"]
    TEST_PASSWORD = os.environ["TEST_PASSWORD"]
    SERVICES_JSON = os.environ["SERVICES_JSON"]
    PROBE_INTERVAL = int(os.environ.get("PROBE_INTERVAL", "300"))

    AWS_SAML_ENABLED = os.environ.get("AWS_SAML_ENABLED", "false").lower() == "true"
    AWS_ROLE_ARN = os.environ.get("AWS_ROLE_ARN", "")
    AWS_PROVIDER_ARN = os.environ.get("AWS_PROVIDER_ARN", "")
    # AWS uses a separate probe identity because the aws-admin-browser flow
    # requires the realm 'admins' role; the default TEST_USERNAME does not
    # have it and would always 401 at the admin gate.
    AWS_TEST_USERNAME = os.environ.get("AWS_TEST_USERNAME") or TEST_USERNAME
    AWS_TEST_PASSWORD = os.environ.get("AWS_TEST_PASSWORD") or TEST_PASSWORD

    TOKEN_URL = f"{KEYCLOAK_URL}/realms/{REALM}/protocol/openid-connect/token"
    SAML_IDP_URL = f"{KEYCLOAK_URL}/realms/{REALM}/protocol/saml/clients/urn:amazon:webservices"


    class SAMLResponseParser(HTMLParser):
        """Extract SAMLResponse from Keycloak's auto-submit form."""

        def __init__(self):
            super().__init__()
            self.saml_response = None

        def handle_starttag(self, tag, attrs):
            if tag == "input":
                attr_dict = dict(attrs)
                if attr_dict.get("name") == "SAMLResponse":
                    self.saml_response = attr_dict.get("value", "")


    def get_token():
        """Perform ROPC token grant and return (token, duration) or (None, duration)."""
        start = time.monotonic()
        try:
            resp = requests.post(
                TOKEN_URL,
                data={
                    "grant_type": "password",
                    "client_id": CLIENT_ID,
                    "client_secret": CLIENT_SECRET,
                    "username": TEST_USERNAME,
                    "password": TEST_PASSWORD,
                    "scope": "openid",
                },
                timeout=10,
                verify=False,
            )
            duration = time.monotonic() - start
            if resp.status_code == 200:
                return resp.json().get("access_token"), duration
            log.warning("Token grant failed: %s %s", resp.status_code, resp.text[:200])
            return None, duration
        except Exception as exc:
            duration = time.monotonic() - start
            log.error("Token grant exception: %s", exc)
            return None, duration


    def validate_service(service_url, validation_path, token):
        """Call downstream service API with Bearer token, return True if 2xx."""
        if not validation_path:
            return True
        url = f"{service_url}{validation_path}"
        try:
            resp = requests.get(
                url,
                headers={"Authorization": f"Bearer {token}"},
                timeout=10,
                verify=False,
            )
            if 200 <= resp.status_code < 300:
                return True
            log.warning("Validation failed for %s: %s", url, resp.status_code)
            return False
        except Exception as exc:
            log.error("Validation exception for %s: %s", url, exc)
            return False


    def probe_aws_saml():
        """Test full Keycloak SAML -> AWS STS AssumeRoleWithSAML flow."""
        import boto3

        start = time.monotonic()
        try:
            session = requests.Session()

            # Step 1: Hit SAML IDP-initiated SSO — redirects to Keycloak login
            resp = session.get(SAML_IDP_URL, verify=False, allow_redirects=True)
            if resp.status_code != 200:
                log.warning("AWS SAML: failed to get login page: %s", resp.status_code)
                return False, time.monotonic() - start

            # Step 2: Extract the login form action URL and submit credentials
            action_match = re.search(r'action="([^"]+)"', resp.text)
            if not action_match:
                log.warning("AWS SAML: no login form found in response")
                return False, time.monotonic() - start

            login_url = action_match.group(1).replace("&amp;", "&")
            resp = session.post(
                login_url,
                data={"username": AWS_TEST_USERNAME, "password": AWS_TEST_PASSWORD},
                verify=False,
                allow_redirects=True,
            )

            # Step 3: Parse SAMLResponse from the auto-submit form
            parser = SAMLResponseParser()
            parser.feed(resp.text)
            if not parser.saml_response:
                log.warning("AWS SAML: no SAMLResponse in login response (status=%s)", resp.status_code)
                return False, time.monotonic() - start

            # Step 4: Call AWS STS AssumeRoleWithSAML
            sts = boto3.client("sts", region_name="us-east-1")
            sts_resp = sts.assume_role_with_saml(
                RoleArn=AWS_ROLE_ARN,
                PrincipalArn=AWS_PROVIDER_ARN,
                SAMLAssertion=parser.saml_response,
            )
            duration = time.monotonic() - start

            if sts_resp.get("Credentials"):
                log.info("AWS SAML: STS AssumeRoleWithSAML succeeded (duration=%.2fs)", duration)
                return True, duration

            log.warning("AWS SAML: STS response missing credentials")
            return False, duration

        except Exception as exc:
            duration = time.monotonic() - start
            log.error("AWS SAML probe error: %s", exc)
            return False, duration


    def probe_all():
        """Run one round of probes."""
        services = json.loads(SERVICES_JSON)

        # Step 1: Test Keycloak token grant
        token, duration = get_token()
        LOGIN_DURATION.labels(user=TEST_USERNAME).set(duration)
        LOGIN_SUCCESS.labels(user=TEST_USERNAME).set(1 if token else 0)
        log.info("keycloak login=%s duration=%.2fs", "ok" if token else "FAIL", duration)

        # Step 2: Validate token against each downstream service
        for svc in services:
            name = svc["name"]
            service_url = svc.get("serviceUrl", "")
            validation_path = svc.get("validationPath", "")

            if token and validation_path:
                valid = validate_service(service_url, validation_path, token)
                VALIDATION_SUCCESS.labels(service=name, user=TEST_USERNAME).set(1 if valid else 0)
                log.info("validate service=%s result=%s", name, "ok" if valid else "FAIL")
            elif token and not validation_path:
                VALIDATION_SUCCESS.labels(service=name, user=TEST_USERNAME).set(1)
                log.info("validate service=%s result=skip (no validation path)", name)
            else:
                VALIDATION_SUCCESS.labels(service=name, user=TEST_USERNAME).set(0)
                log.info("validate service=%s result=FAIL (no token)", name)

        # Step 3: Test AWS SAML flow
        if AWS_SAML_ENABLED:
            aws_ok, aws_dur = probe_aws_saml()
            VALIDATION_SUCCESS.labels(service="aws", user=AWS_TEST_USERNAME).set(1 if aws_ok else 0)
            log.info("validate service=aws result=%s duration=%.2fs", "ok" if aws_ok else "FAIL", aws_dur)


    def probe_loop():
        """Background loop that runs probes on a fixed interval."""
        while True:
            try:
                probe_all()
            except Exception as exc:
                log.error("Probe loop error: %s", exc)
            time.sleep(PROBE_INTERVAL)


    if __name__ == "__main__":
        log.info("Starting SSO monitor exporter on :9090")
        start_http_server(9090)
        probe_thread = threading.Thread(target=probe_loop, daemon=True)
        probe_thread.start()
        probe_thread.join()
