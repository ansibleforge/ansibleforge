apiVersion: v1
kind: ConfigMap
metadata:
  name: sso-monitor-script
  namespace: {{ .Values.namespace }}
data:
  exporter.py: |
    #!/usr/bin/env python3
    """SSO Login Health Exporter for Prometheus.

    Periodically tests Keycloak OIDC ROPC token grants for each configured
    service client, optionally validates the token against downstream APIs,
    and exposes the results as Prometheus metrics.
    """

    import json
    import logging
    import os
    import threading
    import time

    import requests
    import urllib3
    from prometheus_client import Gauge, start_http_server

    urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)
    logging.basicConfig(level=logging.INFO, format="%(asctime)s %(levelname)s %(message)s")
    log = logging.getLogger("sso-monitor")

    # --- Prometheus metrics ---
    LOGIN_SUCCESS = Gauge(
        "sso_login_success",
        "Whether ROPC token grant succeeded (1=ok, 0=fail)",
        ["service", "user"],
    )
    LOGIN_DURATION = Gauge(
        "sso_login_duration_seconds",
        "Time taken for ROPC token grant",
        ["service", "user"],
    )
    VALIDATION_SUCCESS = Gauge(
        "sso_validation_success",
        "Whether downstream service accepted the token (1=ok, 0=fail)",
        ["service", "user"],
    )

    # --- Configuration from environment ---
    KEYCLOAK_URL = os.environ["KEYCLOAK_URL"]            # https://keycloak.<domain>
    REALM = os.environ["REALM"]                          # sso
    TEST_USERNAME = os.environ["TEST_USERNAME"]           # sysadmin
    TEST_PASSWORD = os.environ["TEST_PASSWORD"]           # from Secret
    SERVICES_JSON = os.environ["SERVICES_JSON"]           # JSON array of service configs
    PROBE_INTERVAL = int(os.environ.get("PROBE_INTERVAL", "300"))

    TOKEN_URL = f"{KEYCLOAK_URL}/realms/{REALM}/protocol/openid-connect/token"


    def load_services():
        """Parse service definitions from JSON env var."""
        return json.loads(SERVICES_JSON)


    def get_token(client_id, client_secret):
        """Perform ROPC token grant and return (token, duration) or (None, duration)."""
        start = time.monotonic()
        try:
            resp = requests.post(
                TOKEN_URL,
                data={
                    "grant_type": "password",
                    "client_id": client_id,
                    "client_secret": client_secret,
                    "username": TEST_USERNAME,
                    "password": TEST_PASSWORD,
                    "scope": "openid",
                },
                timeout=10,
                verify=False,
            )
            duration = time.monotonic() - start
            if resp.status_code == 200:
                return resp.json().get("access_token"), duration
            log.warning("Token grant failed for %s: %s %s", client_id, resp.status_code, resp.text[:200])
            return None, duration
        except Exception as exc:
            duration = time.monotonic() - start
            log.error("Token grant exception for %s: %s", client_id, exc)
            return None, duration


    def validate_service(service_url, validation_path, token):
        """Call downstream service API with Bearer token, return True if 2xx."""
        if not validation_path:
            return True  # no validation endpoint configured — skip
        url = f"{service_url}{validation_path}"
        try:
            resp = requests.get(
                url,
                headers={"Authorization": f"Bearer {token}"},
                timeout=10,
                verify=False,
            )
            if 200 <= resp.status_code < 300:
                return True
            log.warning("Validation failed for %s: %s", url, resp.status_code)
            return False
        except Exception as exc:
            log.error("Validation exception for %s: %s", url, exc)
            return False


    def probe_all():
        """Run one round of probes for all services."""
        services = load_services()
        for svc in services:
            name = svc["name"]
            client_id = svc["clientId"]
            client_secret_env = svc.get("clientSecretEnv", "")
            client_secret = os.environ.get(client_secret_env, "") if client_secret_env else ""
            service_url = svc.get("serviceUrl", "")
            validation_path = svc.get("validationPath", "")

            token, duration = get_token(client_id, client_secret)
            LOGIN_DURATION.labels(service=name, user=TEST_USERNAME).set(duration)

            if token:
                LOGIN_SUCCESS.labels(service=name, user=TEST_USERNAME).set(1)
                valid = validate_service(service_url, validation_path, token)
                VALIDATION_SUCCESS.labels(service=name, user=TEST_USERNAME).set(1 if valid else 0)
            else:
                LOGIN_SUCCESS.labels(service=name, user=TEST_USERNAME).set(0)
                VALIDATION_SUCCESS.labels(service=name, user=TEST_USERNAME).set(0)

            log.info(
                "probe service=%s login=%s duration=%.2fs validation=%s",
                name,
                "ok" if token else "FAIL",
                duration,
                "ok" if token and valid else ("skip" if token and not validation_path else "FAIL"),
            )


    def probe_loop():
        """Background loop that runs probes on a fixed interval."""
        while True:
            try:
                probe_all()
            except Exception as exc:
                log.error("Probe loop error: %s", exc)
            time.sleep(PROBE_INTERVAL)


    if __name__ == "__main__":
        log.info("Starting SSO monitor exporter on :9090")
        start_http_server(9090)
        # Run first probe immediately, then loop in background
        probe_thread = threading.Thread(target=probe_loop, daemon=True)
        probe_thread.start()
        # Keep main thread alive
        probe_thread.join()
