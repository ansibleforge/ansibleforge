apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: sso-monitor
  namespace: {{ .Values.namespace }}
  labels:
    app: sso-monitor
spec:
  selector:
    matchLabels:
      app: sso-monitor
  endpoints:
  - port: metrics
    interval: {{ .Values.scrapeInterval }}
    path: /metrics
