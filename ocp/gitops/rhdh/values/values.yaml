global:
  dynamic:
    plugins:
      - package: ./dynamic-plugins/dist/backstage-community-plugin-catalog-backend-module-keycloak-dynamic
        disabled: false
      # Ansible frontend plugin - sidebar and pages
      - package: http://plugin-registry:8080/ansible-plugin-backstage-rhaap-dynamic-2.1.1.tgz
        disabled: false
        integrity: sha512-1pZ+qjVEs5pouyjhufxzLBKcZ4frsZYhEZbUJcMgc9ukshLkFOOOIV/PXIfmUfCYQuwDlPxwK1OoU7vjMOiRYA==
        pluginConfig:
          dynamicPlugins:
            frontend:
              ansible.plugin-backstage-rhaap:
                appIcons:
                  - importName: AnsibleLogo
                    name: AnsibleLogo
                dynamicRoutes:
                  - importName: AnsiblePage
                    menuItem:
                      icon: AnsibleLogo
                      text: Ansible
                    path: /ansible
      # Ansible scaffolder backend - template actions for AAP
      - package: http://plugin-registry:8080/ansible-plugin-scaffolder-backend-module-backstage-rhaap-dynamic-2.1.1.tgz
        disabled: false
        integrity: sha512-0V3LJ5IFfMmsHUcybP9oA7YU8WheoVyrmE9YTyEiv4MDzg2wXFZODmqKDoPDm6Yp3+OWDbSaAP0obeogg0XVSA==
        pluginConfig:
          dynamicPlugins:
            backend:
              ansible.plugin-scaffolder-backend-module-backstage-rhaap: null
      # Ansible catalog backend - syncs AAP job templates
      - package: http://plugin-registry:8080/ansible-backstage-plugin-catalog-backend-module-rhaap-dynamic-2.1.1.tgz
        disabled: false
        integrity: sha512-JkR79YuPqx+/0wZWFPWdzoUzNzm0hqXR53DNdWNh6so/oBA3+yYqQM7onp9N/StJCpXZXpMoWUGxot7C1cnRJA==
        pluginConfig:
          dynamicPlugins:
            backend:
              ansible.backstage-plugin-catalog-backend-module-rhaap: null
      # Ansible auth backend - AAP authentication provider
      - package: http://plugin-registry:8080/ansible-backstage-plugin-auth-backend-module-rhaap-provider-dynamic-2.1.1.tgz
        disabled: false
        integrity: sha512-JJP1fCX+z8tStb9WCctuY5vTxWI4kaG2eduEK3wMMg7NXodo2snCVyWd3CH5Kf5kcsTza6q50dpRwwER1Cg8kg==
        pluginConfig:
          dynamicPlugins:
            backend:
              ansible.backstage-plugin-auth-backend-module-rhaap-provider: null
      # Ansible self-service UI
      - package: http://plugin-registry:8080/ansible-plugin-backstage-self-service-dynamic-2.1.1.tgz
        disabled: false
        integrity: sha512-ta8GLVlUsOYyUMccjocom1R308hrCBqjIDUO2oPmjO6GjhIWL6pbgxSQjDder7Al4hbK+mwW/wfFPAGyGaiyUA==
        pluginConfig:
          dynamicPlugins:
            frontend:
              ansible.plugin-backstage-self-service: null
upstream:
  backstage:
    extraEnvVars: []
    extraEnvVarsSecrets:
      - rhdh-keycloak-client-secret
    appConfig:
      auth:
        session:
          secret: ${BACKEND_SECRET}
        environment: production
        providers:
          oidc:
            production:
              clientId: rhdh
              clientSecret: ${client-secret}
              metadataUrl: ${KEYCLOAK_METADATA_URL}
              prompt: auto
              signIn:
                resolvers:
                  - resolver: preferredUsernameMatchingUserEntityName
      signInPage: oidc
      ansible:
        rhaap:
          baseUrl: https://aap-aap.apps.ocp.fire.ansibleforge.dev
          token: ${token}
          checkSSL: false
        creatorService:
          baseUrl: '127.0.0.1'
          port: '8000'
      catalog:
        locations:
          - type: url
            target: https://github.com/hfenner/ansibleforge/blob/main/catalog-info.yaml
            rules:
              - allow: [Component, System, Resource]
          - type: url
            target: https://github.com/ansible/ansible-rhdh-templates/blob/main/all.yaml
            rules:
              - allow: [Template]
        providers:
          keycloakOrg:
            default:
              baseUrl: ${KEYCLOAK_BASE_URL}
              loginRealm: sso
              realm: sso
              clientId: rhdh
              clientSecret: ${client-secret}
              schedule:
                frequency:
                  minutes: 5
                timeout:
                  minutes: 3
                initialDelay:
                  seconds: 15
          rhaap:
            default:
              baseUrl: https://aap-aap.apps.ocp.fire.ansibleforge.dev
              authorization: "Bearer ${token}"
              orgs: Default
              sync:
                orgsUsersTeams:
                  schedule:
                    frequency:
                      minutes: 60
                    timeout:
                      minutes: 15
                    initialDelay:
                      seconds: 30
                jobTemplates:
                  schedule:
                    frequency:
                      minutes: 60
                    timeout:
                      minutes: 15
                    initialDelay:
                      seconds: 30
  postgresql:
    auth:
      existingSecret: rhdh-postgresql
