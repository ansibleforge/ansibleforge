{{- $existing := lookup "v1" "Secret" "rhdh" "rhdh-auth" }}
apiVersion: v1
kind: Secret
metadata:
  name: rhdh-auth
  namespace: rhdh
type: Opaque
data:
  backend-secret: {{ if and $existing $existing.data (index $existing.data "backend-secret") }}{{ index $existing.data "backend-secret" }}{{ else }}{{ randAlphaNum 48 | b64enc }}{{ end }}
