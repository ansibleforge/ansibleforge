{{- $existing := lookup "v1" "Secret" "rhdh" "rhdh-postgresql" }}
apiVersion: v1
kind: Secret
metadata:
  name: rhdh-postgresql
  namespace: rhdh
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: ServerSideApply=false
type: Opaque
data:
  password: {{ if and $existing $existing.data (index $existing.data "password") }}{{ index $existing.data "password" }}{{ else }}{{ randAlphaNum 32 | b64enc }}{{ end }}
  postgres-password: {{ if and $existing $existing.data (index $existing.data "postgres-password") }}{{ index $existing.data "postgres-password" }}{{ else }}{{ randAlphaNum 32 | b64enc }}{{ end }}
