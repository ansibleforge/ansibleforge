{{- if and .Values.githubAppID .Values.githubAppInstallID }}
{{/* Deliver the GitHub App private key beside the generator... */}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: git-app-key
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: git-app-key
  data:
    - secretKey: privateKey
      remoteRef:
        key: git-app
        property: private_key
---
{{/* ...which mints 1h ghcr-valid installation tokens on demand... */}}
apiVersion: generators.external-secrets.io/v1alpha1
kind: GithubAccessToken
metadata:
  name: git-app-token
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  appID: {{ .Values.githubAppID | quote }}
  installID: {{ .Values.githubAppInstallID | quote }}
  auth:
    privateKey:
      secretRef:
        name: git-app-key
        key: privateKey
---
{{/* ...templated into a dockerconfigjson refreshed every 30m — always well
     inside the 1h token lifetime. Attached to the default SA so the app
     Deployment needs no imagePullSecrets change. */}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ghcr-pull
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: 30m
  target:
    name: ghcr-pull
    template:
      engineVersion: v2
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: {{`'{{ printf "{\"auths\":{\"ghcr.io\":{\"auth\":\"%s\"}}}" (printf "x-access-token:%s" .token | b64enc) }}'`}}
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: GithubAccessToken
          name: git-app-token
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: default
  namespace: {{ .Values.namespace }}
imagePullSecrets:
  - name: ghcr-pull
{{- end }}
