apiVersion: apps/v1
kind: Deployment
metadata:
  name: site
  namespace: site
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: site
  template:
    metadata:
      labels:
        app: site
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
          args:
            - --http-address=0.0.0.0:4180
            - --upstream=http://localhost:8080
            - --provider=oidc
            - --oidc-issuer-url=https://keycloak.{{ .Values.clusterDomain }}/realms/sso
            - --client-id=site
            - --cookie-secure=true
            - --cookie-samesite=lax
            - --email-domain=*
            - --skip-provider-button=true
            - --redirect-url=https://site.{{ .Values.clusterDomain }}/oauth2/callback
            - --ssl-insecure-skip-verify=true
            - --code-challenge-method=S256
            - --skip-jwt-bearer-tokens=true
          env:
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy
                  key: cookie-secret
          ports:
            - containerPort: 4180
              name: proxy
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 5
            periodSeconds: 10

        - name: httpd
          image: image-registry.openshift-image-registry.svc:5000/shared-builds/site-ansibleforge:latest
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
