{{/* ArgoCD repo-creds for all github.com/hfenner repos via the
     ansibleforge-git GitHub App. ArgoCD mints 1h installation tokens from
     the private key on demand — nothing stored here ever expires. The Vault
     path is seeded from the git-app-credentials secret (secrets namespace)
     by the vault config job. */}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: github-repo-creds
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: repo-creds-github-hfenner
    template:
      engineVersion: v2
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repo-creds
      data:
        type: git
        url: https://github.com/hfenner
        githubAppID: "{{`{{ .app_id }}`}}"
        githubAppInstallationID: "{{`{{ .installation_id }}`}}"
        githubAppPrivateKey: "{{`{{ .private_key }}`}}"
  data:
    - secretKey: app_id
      remoteRef:
        key: git-app
        property: app_id
    - secretKey: installation_id
      remoteRef:
        key: git-app
        property: installation_id
    - secretKey: private_key
      remoteRef:
        key: git-app
        property: private_key
---
{{/* Same App, second installation: covers every repo under the ansibleforge
     org (installation_id_ansibleforge in the seeded secret). */}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: github-repo-creds-ansibleforge
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: repo-creds-github-ansibleforge
    template:
      engineVersion: v2
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repo-creds
      data:
        type: git
        url: https://github.com/ansibleforge
        githubAppID: "{{`{{ .app_id }}`}}"
        githubAppInstallationID: "{{`{{ .installation_id_ansibleforge }}`}}"
        githubAppPrivateKey: "{{`{{ .private_key }}`}}"
  data:
    - secretKey: app_id
      remoteRef:
        key: git-app
        property: app_id
    - secretKey: installation_id_ansibleforge
      remoteRef:
        key: git-app
        property: installation_id_ansibleforge
    - secretKey: private_key
      remoteRef:
        key: git-app
        property: private_key
