{{- if .Values.clusterName }}
{{- $clusterDomain := .Values.clusterDomain }}
{{- if not $clusterDomain }}
{{- $ingressConfig := lookup "config.openshift.io/v1" "Ingress" "" "cluster" }}
{{- if and $ingressConfig $ingressConfig.spec }}
{{- $clusterDomain = $ingressConfig.spec.domain }}
{{- end }}
{{- end }}
apiVersion: batch/v1
kind: Job
metadata:
  name: aap-keycloak-sso
  namespace: aap
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: aap-keycloak-sso
      containers:
        - name: configure-sso
          image: registry.access.redhat.com/ubi9/ubi:latest
          env:
            - name: AAP_URL
              value: "https://aap-aap.{{ $clusterDomain }}"
            - name: KC_DOMAIN
              value: "keycloak.{{ $clusterDomain }}"
            - name: AAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aap-admin-password
                  key: password
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              # Read AAP client secret from keycloak namespace
              SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              CACERT="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
              AAP_CLIENT_SECRET=$(curl -sf --cacert "${CACERT}" \
                -H "Authorization: Bearer ${SA_TOKEN}" \
                "https://kubernetes.default.svc/api/v1/namespaces/keycloak/secrets/keycloak-aap-client-secret" \
                | python3 -c 'import json,sys,base64; d=json.load(sys.stdin); print(base64.b64decode(d["data"]["client-secret"]).decode())')
              echo "Retrieved AAP client secret from keycloak namespace"

              echo "=== Sync AAP admin password to Vault ==="
              VAULT_ADDR="http://vault.vault.svc:8200"

              # Authenticate to Vault via Kubernetes auth
              VAULT_TOKEN=$(curl -sf -X POST \
                "${VAULT_ADDR}/v1/auth/kubernetes/login" \
                -d "{\"role\":\"aap-controller\",\"jwt\":\"${SA_TOKEN}\"}" \
                | python3 -c "import json,sys; print(json.load(sys.stdin)['auth']['client_token'])")

              # Write AAP admin password to Vault (always update — password may rotate)
              curl -sf -X POST \
                -H "X-Vault-Token: ${VAULT_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{\"data\":{\"admin_password\":\"${AAP_ADMIN_PASSWORD}\"}}" \
                "${VAULT_ADDR}/v1/secret/data/aap" > /dev/null
              echo "AAP admin password synced to Vault at secret/data/aap"

              echo "=== Generate OCP cluster-admin token ==="
              OCP_TOKEN=$(curl -sf --cacert "${CACERT}" \
                -H "Authorization: Bearer ${SA_TOKEN}" \
                -H "Content-Type: application/json" \
                -X POST \
                "https://kubernetes.default.svc/api/v1/namespaces/aap/serviceaccounts/aap-cluster-admin/token" \
                -d '{"apiVersion":"authentication.k8s.io/v1","kind":"TokenRequest","spec":{"expirationSeconds":31536000}}' \
                | python3 -c "import json,sys; print(json.load(sys.stdin)['status']['token'])" 2>/dev/null || echo "")

              if [ -n "$OCP_TOKEN" ]; then
                curl -sf -X POST \
                  -H "X-Vault-Token: ${VAULT_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d "{\"data\":{\"bearer_token\":\"${OCP_TOKEN}\"}}" \
                  "${VAULT_ADDR}/v1/secret/data/ocp" > /dev/null
                echo "OCP cluster-admin token stored in Vault at secret/data/ocp"
              else
                echo "WARNING: Could not generate OCP token (aap-cluster-admin SA may not exist yet)"
              fi

              echo "Waiting for AAP Gateway..."
              for i in $(seq 1 60); do
                if curl -skf -u "admin:$AAP_ADMIN_PASSWORD" \
                  "$AAP_URL/api/gateway/v1/authenticators/" > /dev/null 2>&1; then
                  echo "AAP Gateway is ready"
                  break
                fi
                echo "  Attempt $i/60..."
                sleep 15
              done

              # Check if Keycloak authenticator already exists
              EXISTING=$(curl -sk -u "admin:$AAP_ADMIN_PASSWORD" \
                "$AAP_URL/api/gateway/v1/authenticators/" \
                | python3 -c "
              import json,sys
              data = json.load(sys.stdin)
              for a in data.get('results',[]):
                  if 'keycloak' in a.get('type',''):
                      print(a['id'])
                      break
              " 2>/dev/null || echo "")

              # Get Keycloak realm public key
              PUBLIC_KEY=$(curl -sk "https://$KC_DOMAIN/realms/sso" \
                | python3 -c "import json,sys; print(json.load(sys.stdin)['public_key'])")

              PAYLOAD=$(python3 -c "
              import json
              print(json.dumps({
                  'name': 'Keycloak SSO',
                  'enabled': True,
                  'create_objects': True,
                  'remove_users': False,
                  'type': 'ansible_base.authentication.authenticator_plugins.keycloak',
                  'configuration': {
                      'ACCESS_TOKEN_URL': 'https://$KC_DOMAIN/realms/sso/protocol/openid-connect/token',
                      'AUTHORIZATION_URL': 'https://$KC_DOMAIN/realms/sso/protocol/openid-connect/auth',
                      'KEY': 'aap',
                      'SECRET': '$AAP_CLIENT_SECRET',
                      'PUBLIC_KEY': '$PUBLIC_KEY',
                      'GROUPS_CLAIM': 'groups'
                  }
              }))
              ")

              if [ -n "$EXISTING" ]; then
                echo "Updating existing Keycloak authenticator (id=$EXISTING)..."
                curl -sk -X PUT -u "admin:$AAP_ADMIN_PASSWORD" \
                  "$AAP_URL/api/gateway/v1/authenticators/$EXISTING/" \
                  -H "Content-Type: application/json" \
                  -d "$PAYLOAD" | python3 -c "import json,sys; d=json.load(sys.stdin); print(f'Updated: id={d[\"id\"]} name={d[\"name\"]}')"
              else
                echo "Creating Keycloak authenticator..."
                curl -sk -X POST -u "admin:$AAP_ADMIN_PASSWORD" \
                  "$AAP_URL/api/gateway/v1/authenticators/" \
                  -H "Content-Type: application/json" \
                  -d "$PAYLOAD" | python3 -c "import json,sys; d=json.load(sys.stdin); print(f'Created: id={d[\"id\"]} name={d[\"name\"]}')"
              fi

              # Get the authenticator ID (whether just created or existing)
              AUTH_ID=$(curl -sk -u "admin:$AAP_ADMIN_PASSWORD" \
                "$AAP_URL/api/gateway/v1/authenticators/" \
                | python3 -c "
              import json,sys
              for a in json.load(sys.stdin).get('results',[]):
                  if 'keycloak' in a.get('type',''):
                      print(a['id']); break
              ")

              # Ensure admins -> superuser map exists
              MAP_EXISTS=$(curl -sk -u "admin:$AAP_ADMIN_PASSWORD" \
                "$AAP_URL/api/gateway/v1/authenticators/$AUTH_ID/authenticator_maps/" \
                | python3 -c "
              import json,sys
              for m in json.load(sys.stdin).get('results',[]):
                  if m.get('map_type') == 'is_superuser':
                      print(m['id']); break
              " 2>/dev/null || echo "")

              if [ -z "$MAP_EXISTS" ]; then
                echo "Creating admins -> superuser map..."
                curl -sk -X POST -u "admin:$AAP_ADMIN_PASSWORD" \
                  "$AAP_URL/api/gateway/v1/authenticator_maps/" \
                  -H "Content-Type: application/json" \
                  -d "{
                    \"name\": \"Admins are superusers\",
                    \"authenticator\": $AUTH_ID,
                    \"map_type\": \"is_superuser\",
                    \"triggers\": {\"groups\": {\"has_or\": [\"admins\"]}},
                    \"revoke\": true
                  }" | python3 -c "import json,sys; d=json.load(sys.stdin); print(f'Created map: {d[\"name\"]}')"
              else
                echo "Admins -> superuser map already exists (id=$MAP_EXISTS)"
              fi

              # Ensure allow map exists (without this, all SSO logins get AuthForbidden)
              ALLOW_EXISTS=$(curl -sk -u "admin:$AAP_ADMIN_PASSWORD" \
                "$AAP_URL/api/gateway/v1/authenticators/$AUTH_ID/authenticator_maps/" \
                | python3 -c "
              import json,sys
              for m in json.load(sys.stdin).get('results',[]):
                  if m.get('map_type') == 'allow':
                      print(m['id']); break
              " 2>/dev/null || echo "")

              if [ -z "$ALLOW_EXISTS" ]; then
                echo "Creating allow map for SSO users..."
                curl -sk -X POST -u "admin:$AAP_ADMIN_PASSWORD" \
                  "$AAP_URL/api/gateway/v1/authenticator_maps/" \
                  -H "Content-Type: application/json" \
                  -d "{
                    \"name\": \"Allow all SSO users\",
                    \"authenticator\": $AUTH_ID,
                    \"map_type\": \"allow\",
                    \"triggers\": {\"always\": {}},
                    \"order\": 1,
                    \"revoke\": false
                  }" | python3 -c "import json,sys; d=json.load(sys.stdin); print(f'Created map: {d[\"name\"]}')"
              else
                echo "Allow map already exists (id=$ALLOW_EXISTS)"
              fi

              echo "=== AAP Keycloak SSO configured ==="

              echo "=== Vault Lookup credential ==="

              # Get the HashiCorp Vault Secret Lookup credential type ID
              VAULT_CRED_TYPE=$(curl -sk -u "admin:$AAP_ADMIN_PASSWORD" \
                "$AAP_URL/api/controller/v2/credential_types/?name=HashiCorp+Vault+Secret+Lookup" \
                | python3 -c "import json,sys; print(json.load(sys.stdin)['results'][0]['id'])" 2>/dev/null || echo "")

              if [ -n "$VAULT_CRED_TYPE" ]; then
                VAULT_CRED_EXISTS=$(curl -sk -u "admin:$AAP_ADMIN_PASSWORD" \
                  "$AAP_URL/api/controller/v2/credentials/?name=Vault+Lookup" \
                  | python3 -c "
              import json,sys
              data = json.load(sys.stdin)
              if data['count'] > 0: print(data['results'][0]['id'])
              " 2>/dev/null || echo "")

                VAULT_PAYLOAD=$(python3 -c "
              import json
              print(json.dumps({
                  'name': 'Vault Lookup',
                  'credential_type': $VAULT_CRED_TYPE,
                  'organization': 1,
                  'inputs': {
                      'url': 'http://vault.vault.svc:8200',
                      'default_auth_path': 'kubernetes',
                      'kubernetes_role': 'aap-controller',
                      'api_version': 'v2'
                  }
              }))
              ")

                if [ -n "$VAULT_CRED_EXISTS" ]; then
                  echo "Vault Lookup credential already exists (id=$VAULT_CRED_EXISTS)"
                else
                  echo "Creating Vault Lookup credential..."
                  curl -sk -X POST -u "admin:$AAP_ADMIN_PASSWORD" \
                    "$AAP_URL/api/controller/v2/credentials/" \
                    -H "Content-Type: application/json" \
                    -d "$VAULT_PAYLOAD" | python3 -c "import json,sys; d=json.load(sys.stdin); print(f'Created: id={d[\"id\"]} name={d[\"name\"]}')"
                fi
              else
                echo "WARNING: HashiCorp Vault Secret Lookup credential type not found"
              fi

              echo "=== GitHub Token credential type ==="

              # Create custom credential type that injects GITHUB_TOKEN as env var
              GH_CRED_TYPE_ID=$(curl -sk -u "admin:$AAP_ADMIN_PASSWORD" \
                "$AAP_URL/api/controller/v2/credential_types/?name=GitHub+Token+%28env+inject%29" \
                | python3 -c "
              import json,sys
              data = json.load(sys.stdin)
              if data['count'] > 0: print(data['results'][0]['id'])
              " 2>/dev/null || echo "")

              if [ -z "$GH_CRED_TYPE_ID" ]; then
                GH_CRED_TYPE_ID=$(curl -sk -X POST -u "admin:$AAP_ADMIN_PASSWORD" \
                  "$AAP_URL/api/controller/v2/credential_types/" \
                  -H "Content-Type: application/json" \
                  -d '{
                    "name": "GitHub Token (env inject)",
                    "kind": "cloud",
                    "inputs": {
                      "fields": [
                        {"id": "token", "label": "GitHub Token", "type": "string", "secret": true}
                      ],
                      "required": ["token"]
                    },
                    "injectors": {
                      "env": {"GITHUB_TOKEN": "{{ "{{" }} token {{ "}}" }}"}
                    }
                  }' | python3 -c "import json,sys; print(json.load(sys.stdin)['id'])")
                echo "Created GitHub PAT credential type (id=$GH_CRED_TYPE_ID)"
              else
                echo "GitHub PAT credential type already exists (id=$GH_CRED_TYPE_ID)"
              fi

              # Create GitHub PAT credential with token from Vault
              if [ -n "$GH_CRED_TYPE_ID" ] && [ -n "$VAULT_CRED_EXISTS" ]; then
                GH_CRED_ID=$(curl -sk -u "admin:$AAP_ADMIN_PASSWORD" \
                  "$AAP_URL/api/controller/v2/credentials/?name=GitHub+PAT" \
                  | python3 -c "
              import json,sys
              data = json.load(sys.stdin)
              if data['count'] > 0: print(data['results'][0]['id'])
              " 2>/dev/null || echo "")

                if [ -z "$GH_CRED_ID" ]; then
                  GH_CRED_ID=$(curl -sk -X POST -u "admin:$AAP_ADMIN_PASSWORD" \
                    "$AAP_URL/api/controller/v2/credentials/" \
                    -H "Content-Type: application/json" \
                    -d "{
                      \"name\": \"GitHub PAT\",
                      \"credential_type\": $GH_CRED_TYPE_ID,
                      \"organization\": 1,
                      \"inputs\": {}
                    }" | python3 -c "import json,sys; print(json.load(sys.stdin)['id'])")
                  echo "Created GitHub PAT credential (id=$GH_CRED_ID)"

                  # Link token field to Vault
                  curl -sk -X POST -u "admin:$AAP_ADMIN_PASSWORD" \
                    "$AAP_URL/api/controller/v2/credentials/$GH_CRED_ID/input_sources/" \
                    -H "Content-Type: application/json" \
                    -d "{
                      \"input_field_name\": \"token\",
                      \"source_credential\": $VAULT_CRED_EXISTS,
                      \"metadata\": {
                        \"secret_path\": \"secret/github\",
                        \"secret_key\": \"token\",
                        \"secret_version\": \"\"
                      }
                    }" > /dev/null
                  echo "Linked GitHub PAT token to Vault Lookup"
                else
                  echo "GitHub PAT credential already exists (id=$GH_CRED_ID)"
                fi
              fi

              echo "=== AnsibleForge project ==="

              # Helper: idempotent create-or-get for API resources
              ensure_resource() {
                local endpoint="$1" name="$2" payload="$3"
                local id
                id=$(curl -sk -u "admin:$AAP_ADMIN_PASSWORD" \
                  "$AAP_URL/api/controller/v2/${endpoint}/?name=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${name}'))")" \
                  | python3 -c "
              import json,sys
              data = json.load(sys.stdin)
              if data['count'] > 0: print(data['results'][0]['id'])
              " 2>/dev/null || echo "")

                if [ -n "$id" ]; then
                  echo "$name already exists (id=$id)"
                else
                  id=$(curl -sk -X POST -u "admin:$AAP_ADMIN_PASSWORD" \
                    "$AAP_URL/api/controller/v2/${endpoint}/" \
                    -H "Content-Type: application/json" \
                    -d "$payload" \
                    | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['id'])")
                  echo "Created $name (id=$id)"
                fi
                echo "$id"
              }

              # Create the AnsibleForge project
              PROJECT_PAYLOAD=$(python3 -c "
              import json
              print(json.dumps({
                  'name': 'AnsibleForge',
                  'organization': 1,
                  'scm_type': 'git',
                  'scm_url': 'https://github.com/hfenner/ansibleforge.git',
                  'scm_branch': 'main',
                  'scm_clean': True,
                  'scm_update_on_launch': True
              }))
              ")
              PROJECT_ID=$(ensure_resource "projects" "AnsibleForge" "$PROJECT_PAYLOAD" | tail -1)

              # Create localhost inventory
              INV_PAYLOAD=$(python3 -c "
              import json
              print(json.dumps({
                  'name': 'Localhost',
                  'organization': 1
              }))
              ")
              INV_ID=$(ensure_resource "inventories" "Localhost" "$INV_PAYLOAD" | tail -1)

              # Add localhost host to the inventory (idempotent)
              HOST_EXISTS=$(curl -sk -u "admin:$AAP_ADMIN_PASSWORD" \
                "$AAP_URL/api/controller/v2/inventories/$INV_ID/hosts/?name=localhost" \
                | python3 -c "import json,sys; print(json.load(sys.stdin)['count'])" 2>/dev/null || echo "0")
              if [ "$HOST_EXISTS" = "0" ]; then
                curl -sk -X POST -u "admin:$AAP_ADMIN_PASSWORD" \
                  "$AAP_URL/api/controller/v2/hosts/" \
                  -H "Content-Type: application/json" \
                  -d "{\"name\":\"localhost\",\"inventory\":$INV_ID,\"variables\":\"{\\\"ansible_connection\\\": \\\"local\\\"}\"}" > /dev/null
                echo "Created localhost host in inventory"
              fi

              echo "=== AAP Controller Admin credential ==="

              # Create an AAP credential with password sourced from Vault
              AAP_CRED_TYPE=$(curl -sk -u "admin:$AAP_ADMIN_PASSWORD" \
                "$AAP_URL/api/controller/v2/credential_types/?name=Red+Hat+Ansible+Automation+Platform" \
                | python3 -c "import json,sys; print(json.load(sys.stdin)['results'][0]['id'])" 2>/dev/null || echo "")

              if [ -n "$AAP_CRED_TYPE" ] && [ -n "$VAULT_CRED_EXISTS" ]; then
                AAP_CRED_PAYLOAD=$(python3 -c "
              import json
              print(json.dumps({
                  'name': 'AAP Controller Admin',
                  'credential_type': $AAP_CRED_TYPE,
                  'organization': 1,
                  'inputs': {
                      'host': '$AAP_URL',
                      'username': 'admin',
                      'verify_ssl': False
                  }
              }))
              ")
                AAP_CRED_ID=$(ensure_resource "credentials" "AAP Controller Admin" "$AAP_CRED_PAYLOAD" | tail -1)

                # Add Vault input_source for the password field
                SOURCE_EXISTS=$(curl -sk -u "admin:$AAP_ADMIN_PASSWORD" \
                  "$AAP_URL/api/controller/v2/credentials/$AAP_CRED_ID/input_sources/" \
                  | python3 -c "import json,sys; print(json.load(sys.stdin)['count'])" 2>/dev/null || echo "0")

                if [ "$SOURCE_EXISTS" = "0" ]; then
                  curl -sk -X POST -u "admin:$AAP_ADMIN_PASSWORD" \
                    "$AAP_URL/api/controller/v2/credentials/$AAP_CRED_ID/input_sources/" \
                    -H "Content-Type: application/json" \
                    -d "{
                      \"input_field_name\": \"password\",
                      \"source_credential\": $VAULT_CRED_EXISTS,
                      \"metadata\": {
                        \"secret_path\": \"secret/aap\",
                        \"secret_key\": \"admin_password\",
                        \"secret_version\": \"\"
                      }
                    }" > /dev/null
                  echo "Linked password field to Vault Lookup (secret/aap -> admin_password)"
                else
                  echo "Vault input_source already configured"
                fi
              else
                echo "WARNING: Could not create AAP Controller Admin credential (missing cred type or Vault Lookup)"
              fi

              echo "=== Community EE ==="

              EE_PAYLOAD=$(python3 -c "
              import json
              print(json.dumps({
                  'name': 'Community EE',
                  'organization': 1,
                  'image': 'image-registry.openshift-image-registry.svc:5000/shared-builds/ee-ansibleforge:latest',
                  'pull': 'missing'
              }))
              ")
              EE_ID=$(ensure_resource "execution_environments" "Community EE" "$EE_PAYLOAD" | tail -1)

              # Ensure the EE image is up to date (patch in case it was created with a different image)
              curl -sk -X PATCH -u "admin:$AAP_ADMIN_PASSWORD" \
                "$AAP_URL/api/controller/v2/execution_environments/$EE_ID/" \
                -H "Content-Type: application/json" \
                -d '{"image":"image-registry.openshift-image-registry.svc:5000/shared-builds/ee-ansibleforge:latest"}' > /dev/null 2>&1
              echo "Ensured EE image is ee-ansibleforge"

              echo "=== CaC Dispatch job template ==="

              # Create the dispatch job template
              JT_PAYLOAD=$(python3 -c "
              import json
              print(json.dumps({
                  'name': 'CaC - Apply Controller Configuration',
                  'job_type': 'run',
                  'organization': 1,
                  'project': $PROJECT_ID,
                  'playbook': 'controller_config/dispatch.yml',
                  'inventory': $INV_ID,
                  'execution_environment': $EE_ID,
                  'ask_variables_on_launch': True,
                  'extra_vars': json.dumps({
                      'cluster_domain': '{{ $clusterDomain }}'
                  })
              }))
              ")
              JT_ID=$(ensure_resource "job_templates" "CaC - Apply Controller Configuration" "$JT_PAYLOAD" | tail -1)

              # Ensure job template uses the community EE (patch in case it was created before the EE)
              curl -sk -X PATCH -u "admin:$AAP_ADMIN_PASSWORD" \
                "$AAP_URL/api/controller/v2/job_templates/$JT_ID/" \
                -H "Content-Type: application/json" \
                -d "{\"execution_environment\": $EE_ID}" > /dev/null 2>&1
              echo "Ensured Community EE on dispatch job template"

              # Attach AAP Controller Admin credential to the dispatch job template
              if [ -n "$AAP_CRED_ID" ]; then
                curl -sk -X POST -u "admin:$AAP_ADMIN_PASSWORD" \
                  "$AAP_URL/api/controller/v2/job_templates/$JT_ID/credentials/" \
                  -H "Content-Type: application/json" \
                  -d "{\"id\": $AAP_CRED_ID}" > /dev/null 2>&1 || true
                echo "Attached AAP Controller Admin credential to dispatch job template"
              fi

              echo "=== AAP post-deploy configuration complete ==="
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aap-keycloak-sso
  namespace: aap
{{- end }}
