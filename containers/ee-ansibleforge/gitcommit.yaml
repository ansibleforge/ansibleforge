---
- name: Update Execution Environment Build
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    ansible_python_interpreter: /usr/bin/python3.9
    github_token: "{{ lookup('env', 'GITHUB_TOKEN') }}"
    git_user: ansible_automation_platform
    git_user_email: ansible_automation_platform@ansibleforge.dev
    commit_message: "Create context dir for execution environment"
    git_repo: https://github.com/hfenner/ansibleforge.git
    git_dir: /tmp/ansibleforge
    ee_subdir: containers/ee-ansibleforge
    buildconfig: bc-ee-ansibleforge
    build_namespace: shared-builds
    vault_addr: "http://vault.vault.svc:8200"
    vault_k8s_role: aap-controller

  pre_tasks:
    - name: Validate GitHub token is available
      ansible.builtin.assert:
        that:
          - github_token | length > 0
        fail_msg: >-
          GITHUB_TOKEN is empty. Attach a credential that injects
          GITHUB_TOKEN or pass github_token as an extra var.

    - name: Get dynamic OCP token from Vault Kubernetes secrets engine
      ansible.builtin.set_fact:
        _ocp_token: "{{ lookup('community.hashi_vault.vault_write',
          'kubernetes/creds/aap-build-manager',
          data={'kubernetes_namespace': build_namespace},
          url=vault_addr,
          auth_method='kubernetes',
          role_id=vault_k8s_role
        ).data.service_account_token }}"
      # no_log: true

  tasks:
    - name: Git checkout
      ansible.builtin.git: # noqa: latest
        repo: "https://{{ github_token }}@{{ git_repo | regex_replace('^https?://', '') }}"
        dest: "{{ git_dir }}"
        depth: 1

    - name: Use Ansible builder to create EE blueprint
      ansible.builtin.command:
      args:
        cmd: "ansible-builder create"
        chdir: "{{ git_dir }}/{{ ee_subdir }}"
      register: ansible_builder_output
      changed_when: ansible_builder_output.rc != 0

    - name: Add context directory for possible commits
      ansible.builtin.command: # noqa: command-instead-of-module
      args:
        cmd: "git add -f context/"
        chdir: "{{ git_dir }}/{{ ee_subdir }}"
      register: git_add_output
      changed_when: git_add_output.rc != 0

    - name: Detect if staging area has changes
      ansible.builtin.command: # noqa: command-instead-of-module
        cmd: git diff --cached
        chdir: "{{ git_dir }}/{{ ee_subdir }}"
      register: git_diff_output
      changed_when: git_diff_output.stdout | length > 0

    - name: Commit any changes
      ansible.builtin.command: # noqa: command-instead-of-module
      args:
        cmd: "git -c user.name={{ git_user }} -c user.email={{ git_user_email }} commit -m '{{ commit_message }}'"
        chdir: "{{ git_dir }}"
      register: git_commit_output
      changed_when: git_commit_output.rc != 1
      failed_when: git_commit_output.rc not in [0, 1]

    - name: Push updates (if any)
      ansible.builtin.command: # noqa: command-instead-of-module
      args:
        cmd: "git push"
        chdir: "{{ git_dir }}"
      register: git_push_output
      changed_when: git_push_output.rc != 0

    - name: Start build from build config
      redhat.openshift.openshift_build:
        namespace: "{{ build_namespace }}"
        build_config_name: "{{ buildconfig }}"
        api_key: "{{ _ocp_token }}"
        host: "https://kubernetes.default.svc"
        validate_certs: false
