---
version: 3
images:
  base_image:
    name: registry.access.redhat.com/ubi9/ubi:latest
dependencies:
  ansible_core:
    package_pip: ansible-core>=2.17
  ansible_runner:
    package_pip: ansible-runner
  galaxy: requirements.yml
  python: requirements.txt
  exclude:
    system:
      - openshift-clients
  system:
    - git
    - python3.11-pip
    - python3.11-setuptools
    - systemd-devel
    - openldap-devel
    - gcc
    - gcc-c++
    - python3.11-devel
    - terraform
additional_build_files:
  - src: hashicorp.repo
    dest: configs
additional_build_steps:
  prepend_base:
    - ARG PYCMD=/usr/bin/python3.11
    - RUN dnf install -y python3.11 python3.11-pip python3.11-devel && ln -sf /usr/bin/python3.11 /usr/bin/python3 && dnf clean all
  prepend_galaxy:
    - RUN dnf install -y git && dnf clean all
  prepend_builder:
    - ADD _build/configs/hashicorp.repo /etc/yum.repos.d/hashicorp.repo
  prepend_final:
    - ADD _build/configs/hashicorp.repo /etc/yum.repos.d/hashicorp.repo
    - RUN curl -sL https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux.tar.gz | tar -xz -C /usr/local/bin oc kubectl
