name: "Cluster: DNS Setup"

on:
  workflow_dispatch:
    inputs:
      cluster_name:
        description: "Cluster name (e.g. fire)"
        required: true
        default: "fire"

permissions:
  id-token: write
  contents: read
  secrets: write

jobs:
  oidc-bootstrap:
    name: "1. OIDC Bootstrap"
    uses: ./.github/workflows/aws-oidc-bootstrap.yml
    secrets: inherit

  tfstate-backend:
    name: "2. Terraform State Backend"
    needs: oidc-bootstrap
    uses: ./.github/workflows/tfstate-backend.yml
    with:
      role_arn: ${{ needs.oidc-bootstrap.outputs.role_arn }}
    secrets: inherit

  dns-delegation:
    name: "3. DNS Delegation"
    needs: [oidc-bootstrap, tfstate-backend]
    uses: ./.github/workflows/dns-manage.yml
    with:
      cluster_name: ${{ inputs.cluster_name }}
      action: apply
      role_arn: ${{ needs.oidc-bootstrap.outputs.role_arn }}
    secrets: inherit
