name: "DNS: Manage Cluster Delegation"

on:
  workflow_dispatch:
    inputs:
      cluster_name:
        description: "Cluster name (e.g. fire)"
        required: true
        type: string
        default: "fire"
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
  workflow_call:
    inputs:
      cluster_name:
        type: string
        required: true
      action:
        type: string
        default: "apply"

permissions:
  id-token: write
  contents: read

env:
  TF_DIR: ocp/terraform/dns
  TF_VAR_cluster_name: ${{ inputs.cluster_name }}
  TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  AWS_ROLE_ARN: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActions-${{ github.repository_owner }}-${{ github.event.repository.name }}

jobs:
  terraform:
    name: "Terraform ${{ inputs.action }} (${{ inputs.cluster_name }})"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -backend-config="key=dns/${{ inputs.cluster_name }}/terraform.tfstate"

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        run: terraform plan ${{ inputs.action == 'destroy' && '-destroy' || '' }} -out=tfplan

      - name: Terraform Apply
        if: inputs.action == 'apply' || inputs.action == 'destroy'
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply tfplan
