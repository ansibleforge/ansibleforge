name: "OCP: Destroy Cluster"

on:
  workflow_dispatch:
    inputs:
      cluster_name:
        description: "Cluster name"
        required: true
        type: string
        default: fire
      aws_region:
        description: "AWS region"
        required: false
        type: string
        default: us-east-2

jobs:
  destroy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActions-${{ github.repository_owner }}-${{ github.event.repository.name }}
          aws-region: ${{ inputs.aws_region }}

      - name: Download openshift-install
        run: |
          curl -L https://mirror.openshift.com/pub/openshift-v4/clients/ocp/latest/openshift-install-linux.tar.gz -o oi.tgz
          tar -xzf oi.tgz
          sudo mv openshift-install /usr/local/bin/openshift-install

      - name: Download metadata.json from S3
        run: |
          mkdir -p install-dir
          aws s3 cp \
            s3://ansibleforge-tfstate/clusters/${{ inputs.cluster_name }}/metadata.json \
            install-dir/metadata.json

      - name: Destroy cluster
        run: openshift-install destroy cluster --dir=install-dir --log-level=info 2>&1

      - name: Upload destroy logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: destroy-logs
          path: install-dir/.openshift_install.log
          retention-days: 7
