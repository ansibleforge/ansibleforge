name: "AWS: OIDC Bootstrap"

on:
  workflow_dispatch:
    inputs:
      stack_name:
        description: "CloudFormation stack name"
        required: true
        default: "github-oidc-ansibleforge"
  workflow_call:
    inputs:
      stack_name:
        type: string
        default: "github-oidc-ansibleforge"
    outputs:
      role_arn:
        description: "IAM Role ARN for OIDC"
        value: ${{ jobs.bootstrap.outputs.role_arn }}

jobs:
  bootstrap:
    name: Deploy OIDC Provider + IAM Role
    runs-on: ubuntu-latest
    outputs:
      role_arn: ${{ steps.get-role.outputs.role_arn }}
    permissions:
      contents: read
      secrets: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (bootstrap)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --stack-name "${{ inputs.stack_name }}" \
            --template-file infra/aws/github-oidc-bootstrap.yaml \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              GitHubOrg="${{ github.repository_owner }}" \
              GitHubRepo="${{ github.event.repository.name }}" \
            --no-fail-on-empty-changeset

      - name: Get Role ARN
        id: get-role
        run: |
          ROLE_ARN=$(aws cloudformation describe-stacks \
            --stack-name "${{ inputs.stack_name }}" \
            --query "Stacks[0].Outputs[?OutputKey=='RoleArn'].OutputValue" \
            --output text)
          echo "role_arn=${ROLE_ARN}" >> "$GITHUB_OUTPUT"

      - name: Save AWS_ROLE_ARN secret
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh secret set AWS_ROLE_ARN --body "${{ steps.get-role.outputs.role_arn }}"
