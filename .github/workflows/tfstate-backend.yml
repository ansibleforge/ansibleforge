name: "DNS: Deploy Terraform State Backend"

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      role_arn:
        type: string
        description: "IAM Role ARN (passed from caller; falls back to AWS_ROLE_ARN secret)"
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy CloudFormation Stack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role_arn || vars.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Deploy tfstate-backend stack
        run: |
          aws cloudformation deploy \
            --stack-name tfstate-backend \
            --template-file ocp/terraform/dns/tfstate-backend.cfn.yaml \
            --no-fail-on-empty-changeset
