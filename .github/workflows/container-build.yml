name: "Container: Build and Push"

on:
  push:
    branches: [main]
    paths:
      - "containers/ee-community-ansibleforge/**"
      - "containers/tools-ansibleforge/**"
      - ".github/workflows/container-build.yml"
  workflow_dispatch:
    inputs:
      image:
        description: "Image to build"
        required: true
        type: choice
        options:
          - ee-community-ansibleforge
          - tools-ansibleforge
          - all

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  detect-changes:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      ee-community-ansibleforge: ${{ steps.changes.outputs.ee-community-ansibleforge }}
      tools-ansibleforge: ${{ steps.changes.outputs.tools-ansibleforge }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            ee-community-ansibleforge:
              - 'containers/ee-community-ansibleforge/**'
            tools-ansibleforge:
              - 'containers/tools-ansibleforge/**'

  build-ee-community-ansibleforge:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' && (inputs.image == 'ee-community-ansibleforge' || inputs.image == 'all') ||
      github.event_name == 'push' && needs.detect-changes.outputs.ee-community-ansibleforge == 'true'
    needs: [detect-changes]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ee-community-ansibleforge
        uses: docker/build-push-action@v5
        with:
          context: containers/ee-community-ansibleforge/context
          file: containers/ee-community-ansibleforge/context/Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ee-community-ansibleforge:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ee-community-ansibleforge:${{ github.sha }}

  build-tools-ansibleforge:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' && (inputs.image == 'tools-ansibleforge' || inputs.image == 'all') ||
      github.event_name == 'push' && needs.detect-changes.outputs.tools-ansibleforge == 'true'
    needs: [detect-changes]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Red Hat registry
        uses: docker/login-action@v3
        with:
          registry: registry.redhat.io
          username: ${{ secrets.REDHAT_REGISTRY_USERNAME }}
          password: ${{ secrets.REDHAT_REGISTRY_PASSWORD }}

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push tools-ansibleforge
        uses: docker/build-push-action@v5
        with:
          context: containers/tools-ansibleforge
          file: containers/tools-ansibleforge/Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/tools-ansibleforge:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/tools-ansibleforge:${{ github.sha }}
