name: "Container: Build and Push"

on:
  push:
    branches: [main]
    paths:
      - "containers/ee-community-ansibleforge/**"
      - "containers/tools-community-ansibleforge/**"
      - "keycloak-extensions/github-org-mapper/**"
      - "containers/devfile-registry/**"
      - "devfile.yaml"
      - ".github/workflows/container-build.yml"
  workflow_dispatch:
    inputs:
      image:
        description: "Image to build"
        required: true
        type: choice
        options:
          - ee-community-ansibleforge
          - tools-community-ansibleforge
          - keycloak-github-org-mapper
          - devfile-registry
          - all

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  detect-changes:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      ee-community-ansibleforge: ${{ steps.changes.outputs.ee-community-ansibleforge }}
      tools-community-ansibleforge: ${{ steps.changes.outputs.tools-community-ansibleforge }}
      keycloak-github-org-mapper: ${{ steps.changes.outputs.keycloak-github-org-mapper }}
      devfile-registry: ${{ steps.changes.outputs.devfile-registry }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            ee-community-ansibleforge:
              - 'containers/ee-community-ansibleforge/**'
            tools-community-ansibleforge:
              - 'containers/tools-community-ansibleforge/**'
            keycloak-github-org-mapper:
              - 'keycloak-extensions/github-org-mapper/**'
            devfile-registry:
              - 'containers/devfile-registry/**'
              - 'devfile.yaml'

  build-ee-community-ansibleforge:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: >-
      always() && !failure() && (
        github.event_name == 'workflow_dispatch' && (inputs.image == 'ee-community-ansibleforge' || inputs.image == 'all') ||
        github.event_name == 'push' && needs.detect-changes.outputs.ee-community-ansibleforge == 'true'
      )
    steps:
      - uses: actions/checkout@v6

      - name: Install ansible-builder
        run: pip install ansible-builder

      - name: Generate build context
        working-directory: containers/ee-community-ansibleforge
        run: ansible-builder create --file execution-environment.yaml

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ee-community-ansibleforge
        uses: docker/build-push-action@v7
        with:
          context: containers/ee-community-ansibleforge/context
          file: containers/ee-community-ansibleforge/context/Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ee-community-ansibleforge:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ee-community-ansibleforge:${{ github.sha }}

  build-tools-community-ansibleforge:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: >-
      always() && !failure() && (
        github.event_name == 'workflow_dispatch' && (inputs.image == 'tools-community-ansibleforge' || inputs.image == 'all') ||
        github.event_name == 'push' && needs.detect-changes.outputs.tools-community-ansibleforge == 'true'
      )
    steps:
      - uses: actions/checkout@v6

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push tools-community-ansibleforge
        uses: docker/build-push-action@v7
        with:
          context: containers/tools-community-ansibleforge
          file: containers/tools-community-ansibleforge/Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/tools-community-ansibleforge:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/tools-community-ansibleforge:${{ github.sha }}

  build-keycloak-github-org-mapper:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: >-
      always() && !failure() && (
        github.event_name == 'workflow_dispatch' && (inputs.image == 'keycloak-github-org-mapper' || inputs.image == 'all') ||
        github.event_name == 'push' && needs.detect-changes.outputs.keycloak-github-org-mapper == 'true'
      )
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Maven build
        working-directory: keycloak-extensions/github-org-mapper
        run: mvn -B clean package -DskipTests

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push keycloak-github-org-mapper
        uses: docker/build-push-action@v7
        with:
          context: keycloak-extensions/github-org-mapper
          file: keycloak-extensions/github-org-mapper/Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/keycloak-github-org-mapper:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/keycloak-github-org-mapper:${{ github.sha }}

  build-devfile-registry:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: >-
      always() && !failure() && (
        github.event_name == 'workflow_dispatch' && (inputs.image == 'devfile-registry' || inputs.image == 'all') ||
        github.event_name == 'push' && needs.detect-changes.outputs.devfile-registry == 'true'
      )
    steps:
      - uses: actions/checkout@v6

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push devfile-registry
        uses: docker/build-push-action@v7
        with:
          context: containers/devfile-registry
          file: containers/devfile-registry/Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/devfile-registry:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/devfile-registry:${{ github.sha }}
