name: "OCP: Bootstrap GitOps"

on:
  workflow_dispatch:
    inputs:
      cluster_name:
        description: "Cluster name (must match DNS delegation)"
        required: true
        type: string
        default: spark
      base_domain:
        description: "Base DNS domain"
        required: false
        type: string
        default: ansibleforge.dev
      gitops_repo_url:
        description: "GitOps repo URL"
        required: false
        type: string
        default: https://github.com/hfenner/ansibleforge.git
      gitops_repo_branch:
        description: "GitOps repo branch"
        required: false
        type: string
        default: main
  workflow_call:
    inputs:
      cluster_name:
        type: string
        required: true
      base_domain:
        type: string
        default: ansibleforge.dev
      gitops_repo_url:
        type: string
        default: https://github.com/hfenner/ansibleforge.git
      gitops_repo_branch:
        type: string
        default: main

permissions:
  id-token: write
  contents: read

jobs:
  bootstrap:
    name: "Bootstrap GitOps (${{ inputs.cluster_name }})"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Fetch kubeconfig from Secrets Manager
        run: |
          aws secretsmanager get-secret-value \
            --secret-id "/ocp/clusters/${{ inputs.cluster_name }}/kubeconfig" \
            --query SecretString --output text > /tmp/kubeconfig
          echo "::add-mask::$(cat /tmp/kubeconfig)"
          echo "KUBECONFIG=/tmp/kubeconfig" >> "$GITHUB_ENV"

      - name: Download oc
        run: |
          curl -sL https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux.tar.gz | tar -xz -C /usr/local/bin oc kubectl

      - name: Verify cluster access
        run: oc cluster-info

      - name: Install OpenShift GitOps Operator
        run: |
          cat <<'EOF' | oc apply -f -
          apiVersion: v1
          kind: Namespace
          metadata:
            name: openshift-gitops-operator
          ---
          apiVersion: operators.coreos.com/v1
          kind: OperatorGroup
          metadata:
            name: openshift-gitops
            namespace: openshift-gitops-operator
          spec:
            upgradeStrategy: Default
          ---
          apiVersion: operators.coreos.com/v1alpha1
          kind: Subscription
          metadata:
            name: openshift-gitops-operator
            namespace: openshift-gitops-operator
          spec:
            channel: latest
            name: openshift-gitops-operator
            source: redhat-operators
            sourceNamespace: openshift-marketplace
            installPlanApproval: Automatic
          EOF

      - name: Wait for GitOps operator
        run: |
          echo "Waiting for ArgoCD server pod..."
          until oc get pods -n openshift-gitops -l app.kubernetes.io/name=openshift-gitops-server 2>/dev/null | grep -q Running; do
            echo "  waiting..."
            sleep 15
          done
          echo "GitOps operator is running"

      - name: Grant cluster-admin to ArgoCD
        run: |
          cat <<'EOF' | oc apply -f -
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: openshift-gitops-controller-cluster-admin
          subjects:
            - kind: ServiceAccount
              name: openshift-gitops-argocd-application-controller
              namespace: openshift-gitops
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: cluster-admin
          EOF

      - name: Configure ArgoCD for OpenShift types
        run: |
          oc patch configmap argocd-cm -n openshift-gitops --type merge -p '{
            "data": {
              "resource.customizations.knownTypeFields.build.openshift.io_BuildConfig": "[{\"field\": \"spec\", \"type\": \"build.openshift.io/v1/BuildConfigSpec\"}]",
              "resource.customizations.knownTypeFields.image.openshift.io_ImageStream": "[{\"field\": \"spec\", \"type\": \"image.openshift.io/v1/ImageStreamSpec\"}]"
            }
          }'

      - name: Create AAP IAM user and push secrets to cluster
        env:
          RHSM_USERNAME: ${{ secrets.RHSM_USERNAME }}
          RHSM_PASSWORD: ${{ secrets.RHSM_PASSWORD }}
          AUTOMATIONHUB_TOKEN: ${{ secrets.AUTOMATIONHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEVSPACES_OAUTH_ID: ${{ secrets.DEVSPACES_OAUTH_ID }}
          DEVSPACES_OAUTH_SECRET: ${{ secrets.DEVSPACES_OAUTH_SECRET }}
        run: |
          oc create namespace secrets --dry-run=client -o yaml | oc apply -f -
          oc create secret generic rhsm-credentials \
            --namespace=secrets \
            --from-literal=username="${RHSM_USERNAME}" \
            --from-literal=password="${RHSM_PASSWORD}" \
            --dry-run=client -o yaml | oc apply -f -
          oc create secret generic automationhub-token \
            --namespace=secrets \
            --from-literal=token="${AUTOMATIONHUB_TOKEN}" \
            --dry-run=client -o yaml | oc apply -f -
          oc create secret generic openai-api-key \
            --namespace=secrets \
            --from-literal=api_key="${OPENAI_API_KEY}" \
            --dry-run=client -o yaml | oc apply -f -
          if [ -n "${DEVSPACES_OAUTH_ID}" ] && [ -n "${DEVSPACES_OAUTH_SECRET}" ]; then
            oc create secret generic github-devspaces-oauth \
              --namespace=secrets \
              --from-literal=id="${DEVSPACES_OAUTH_ID}" \
              --from-literal=secret="${DEVSPACES_OAUTH_SECRET}" \
              --dry-run=client -o yaml | oc apply -f -
          fi

          # Create IAM user for AAP automation (idempotent)
          IAM_USER="aap-automation-${{ inputs.cluster_name }}"
          aws iam create-user --user-name "${IAM_USER}" 2>/dev/null || true
          aws iam attach-user-policy --user-name "${IAM_USER}" \
            --policy-arn arn:aws:iam::aws:policy/PowerUserAccess 2>/dev/null || true

          # Rotate: delete old keys, create new
          OLD_KEYS=$(aws iam list-access-keys --user-name "${IAM_USER}" \
            --query 'AccessKeyMetadata[*].AccessKeyId' --output text)
          for KEY in $OLD_KEYS; do
            aws iam delete-access-key --user-name "${IAM_USER}" --access-key-id "$KEY"
          done
          NEW_KEY=$(aws iam create-access-key --user-name "${IAM_USER}" --output json)
          AAP_AWS_ACCESS_KEY=$(echo "$NEW_KEY" | python3 -c "import sys,json; print(json.load(sys.stdin)['AccessKey']['AccessKeyId'])")
          AAP_AWS_SECRET_KEY=$(echo "$NEW_KEY" | python3 -c "import sys,json; print(json.load(sys.stdin)['AccessKey']['SecretAccessKey'])")
          echo "::add-mask::${AAP_AWS_ACCESS_KEY}"
          echo "::add-mask::${AAP_AWS_SECRET_KEY}"

          oc create secret generic aws-credentials \
            --namespace=secrets \
            --from-literal=access_key="${AAP_AWS_ACCESS_KEY}" \
            --from-literal=secret_key="${AAP_AWS_SECRET_KEY}" \
            --dry-run=client -o yaml | oc apply -f -

      - name: Discover cluster domain and Route53 zone
        run: |
          CLUSTER_DOMAIN=$(oc get ingress.config.openshift.io cluster -o jsonpath='{.spec.domain}')
          echo "CLUSTER_DOMAIN=${CLUSTER_DOMAIN}" >> "$GITHUB_ENV"

          ZONE_NAME="${{ inputs.cluster_name }}.${{ inputs.base_domain }}."
          HOSTED_ZONE_ID=$(aws route53 list-hosted-zones-by-name \
            --dns-name "$ZONE_NAME" \
            --query "HostedZones[?Name=='${ZONE_NAME}'] | [0].Id" \
            --output text | sed 's|/hostedzone/||')
          echo "HOSTED_ZONE_ID=${HOSTED_ZONE_ID}" >> "$GITHUB_ENV"

          echo "Cluster domain: ${CLUSTER_DOMAIN}"
          echo "Route53 zone: ${HOSTED_ZONE_ID}"

      - name: Create bootstrap Application
        run: |
          cat <<EOF | oc apply -f -
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: cluster-bootstrap
            namespace: openshift-gitops
          spec:
            project: default
            source:
              repoURL: ${{ inputs.gitops_repo_url }}
              targetRevision: ${{ inputs.gitops_repo_branch }}
              path: ocp/gitops/bootstrap
              helm:
                valueFiles:
                  - values-aws.yaml
                parameters:
                  - name: clusterDomain
                    value: "${CLUSTER_DOMAIN}"
                  - name: clusterName
                    value: "${{ inputs.cluster_name }}"
                  - name: "components.ingress-certs.helm.parameters[0].name"
                    value: route53.hostedZoneID
                  - name: "components.ingress-certs.helm.parameters[0].value"
                    value: "${HOSTED_ZONE_ID}"
            destination:
              server: https://kubernetes.default.svc
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - ServerSideApply=true
          EOF

      - name: Show ArgoCD URL
        run: |
          echo "## GitOps Bootstrap Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          ROUTE=$(oc get route openshift-gitops-server -n openshift-gitops -o jsonpath='{.spec.host}' 2>/dev/null || echo "pending")
          echo "ArgoCD URL: https://${ROUTE}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Cluster: ${{ inputs.cluster_name }}.${{ inputs.base_domain }}" >> "$GITHUB_STEP_SUMMARY"
