name: "OCP: Provision Cluster"

on:
  workflow_dispatch:
    inputs:
      cluster_name:
        description: "Cluster name"
        required: true
        type: string
        default: spark
      base_domain:
        description: "Base DNS domain"
        required: false
        type: string
        default: ansibleforge.dev
      aws_region:
        description: "AWS region"
        required: false
        type: string
        default: us-east-2
      ocp_version:
        description: "OpenShift version"
        required: false
        type: choice
        default: "4.20"
        options:
          - "4.20"
          - "4.21"
      debug_install_config:
        description: "Print install-config.yaml to logs (secrets will be masked)"
        required: false
        type: boolean
        default: false
      topology:
        description: "Cluster topology"
        required: true
        type: choice
        default: sno
        options:
          - sno
          - compact
          - standard
      control_plane_type:
        description: "Control plane instance type"
        required: false
        type: string
        default: m5a.4xlarge
      worker_type:
        description: "Worker instance type (standard topology only)"
        required: false
        type: string
        default: m5a.4xlarge
      worker_count:
        description: "Number of workers (standard topology only)"
        required: false
        type: string
        default: "0"
      credentials_mode:
        description: "Credentials mode"
        required: false
        type: choice
        default: mint
        options:
          - mint
          - sts
      bootstrap_mode:
        description: "Post-provision bootstrap"
        required: false
        type: choice
        default: gitops
        options:
          - gitops
          - none

permissions:
  id-token: write
  contents: read

env:
  CCOCTL_NAME: ocp-${{ inputs.cluster_name }}

jobs:
  provision:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Download openshift-install + oc
        run: |
          OCP_MIRROR="https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable-${{ inputs.ocp_version }}"
          curl -sL "${OCP_MIRROR}/openshift-install-linux.tar.gz" | tar -xz -C /usr/local/bin openshift-install
          curl -sL "${OCP_MIRROR}/openshift-client-linux.tar.gz" | tar -xz -C /usr/local/bin oc kubectl
          openshift-install version

      - name: Verify Route 53 zone exists
        run: |
          ZONE_NAME="${{ inputs.cluster_name }}.${{ inputs.base_domain }}."
          ZONE_ID=$(aws route53 list-hosted-zones-by-name \
            --dns-name "$ZONE_NAME" \
            --query "HostedZones[?Name=='${ZONE_NAME}'] | [0].Id" \
            --output text)

          if [ -z "$ZONE_ID" ] || [ "$ZONE_ID" = "None" ]; then
            echo "::error::No Route 53 zone found for ${ZONE_NAME} — run the DNS delegation workflow first"
            exit 1
          fi

          echo "Found zone ${ZONE_NAME} -> ${ZONE_ID}"

      - name: Generate install-config.yaml
        env:
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
          PULL_SECRET: ${{ secrets.OCP_PULL_SECRET }}
          TOPOLOGY: ${{ inputs.topology }}
          CONTROL_PLANE_TYPE: ${{ inputs.control_plane_type }}
          WORKER_TYPE: ${{ inputs.worker_type }}
          WORKER_COUNT: ${{ inputs.worker_count }}
          CREDS_MODE: ${{ inputs.credentials_mode }}
        run: |
          case "$TOPOLOGY" in
            sno)     CP_REPLICAS=1; WORKER_REPLICAS=0 ;;
            compact) CP_REPLICAS=3; WORKER_REPLICAS=0 ;;
            standard) CP_REPLICAS=3; WORKER_REPLICAS=${WORKER_COUNT} ;;
          esac

          case "$CREDS_MODE" in
            mint) CREDS_MODE_VALUE="Mint" ;;
            sts)  CREDS_MODE_VALUE="Manual" ;;
          esac

          mkdir -p install-dir
          cat > install-dir/install-config.yaml <<EOF
          apiVersion: v1
          baseDomain: ${{ inputs.cluster_name }}.${{ inputs.base_domain }}
          metadata:
            name: ocp
          compute:
            - name: worker
              architecture: amd64
              hyperthreading: Enabled
              replicas: ${WORKER_REPLICAS}
              platform:
                aws:
                  type: ${WORKER_TYPE}
          controlPlane:
            name: master
            replicas: ${CP_REPLICAS}
            architecture: amd64
            hyperthreading: Enabled
            platform:
              aws:
                type: ${CONTROL_PLANE_TYPE}
          networking:
            networkType: OVNKubernetes
          platform:
            aws:
              region: ${{ inputs.aws_region }}
          pullSecret: '${PULL_SECRET}'
          sshKey: |
            ${SSH_PUBLIC_KEY}
          credentialsMode: ${CREDS_MODE_VALUE}
          EOF
          sed -i 's/^          //' install-dir/install-config.yaml

      - name: Show install-config.yaml
        if: inputs.debug_install_config
        run: cat install-dir/install-config.yaml

      - name: Create STS credentials (STS only)
        if: inputs.credentials_mode == 'sts'
        run: |
          # Extract credential requests from release image
          oc adm release extract \
            --credentials-requests \
            --cloud=aws \
            --to=credreqs \
            "$(openshift-install version | grep 'release image' | awk '{print $3}')"

          pip install pyyaml

          # Generate OIDC provider, IAM roles, PKCS8 signing key, and credential manifests
          # Do NOT run create manifests first — it caches PKCS1 key in state file
          # create cluster will generate manifests itself and find our tls/ and manifests/
          ./infra/aws/ccoctl-replacement.sh \
            --name="${CCOCTL_NAME}" \
            --region=${{ inputs.aws_region }} \
            --credentials-requests-dir=credreqs \
            --output-dir=install-dir

      - name: Check if cluster already exists
        id: check_cluster
        run: |
          if aws secretsmanager get-secret-value \
            --secret-id "/ocp/clusters/${{ inputs.cluster_name }}/kubeconfig" \
            --query SecretString --output text > /tmp/kubeconfig 2>/dev/null; then
            echo "::add-mask::$(cat /tmp/kubeconfig)"
            export KUBECONFIG=/tmp/kubeconfig
            if oc cluster-info &>/dev/null; then
              echo "Cluster already exists and is reachable — skipping provision"
              echo "exists=true" >> "$GITHUB_OUTPUT"
            else
              echo "::error::Kubeconfig found in Secrets Manager but cluster is unreachable"
              exit 1
            fi
          else
            echo "No existing cluster found — provisioning"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Provision cluster
        if: steps.check_cluster.outputs.exists != 'true'
        run: openshift-install create cluster --dir=install-dir --log-level=info 2>&1

      - name: Store cluster credentials in Secrets Manager
        if: steps.check_cluster.outputs.exists != 'true'
        run: |
          KUBECONFIG_VAL=$(cat install-dir/auth/kubeconfig)
          KUBEADMIN_VAL=$(cat install-dir/auth/kubeadmin-password)
          echo "::add-mask::$KUBECONFIG_VAL"
          echo "::add-mask::$KUBEADMIN_VAL"
          for SECRET_NAME in kubeconfig kubeadmin-password; do
            if [ "$SECRET_NAME" = "kubeconfig" ]; then
              VAL="$KUBECONFIG_VAL"
            else
              VAL="$KUBEADMIN_VAL"
            fi
            aws secretsmanager put-secret-value \
              --secret-id "/ocp/clusters/${{ inputs.cluster_name }}/${SECRET_NAME}" \
              --secret-string "$VAL" 2>/dev/null || \
            aws secretsmanager create-secret \
              --name "/ocp/clusters/${{ inputs.cluster_name }}/${SECRET_NAME}" \
              --secret-string "$VAL"
          done

      - name: Upload metadata to S3
        if: always()
        run: |
          aws s3 cp install-dir/metadata.json \
            s3://ansibleforge-tfstate/clusters/${{ inputs.cluster_name }}/metadata.json 2>/dev/null || true
          if [ -f install-dir/oidc-metadata.json ]; then
            aws s3 cp install-dir/oidc-metadata.json \
              s3://ansibleforge-tfstate/clusters/${{ inputs.cluster_name }}/oidc-metadata.json
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: install-dir
          path: |
            install-dir/metadata.json
            install-dir/oidc-metadata.json
          retention-days: 7

      - name: Upload bootstrap log bundle on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: bootstrap-logs
          path: install-dir/log-bundle-*.tar.gz
          retention-days: 7

  bootstrap-gitops:
    needs: provision
    if: inputs.bootstrap_mode == 'gitops'
    uses: ./.github/workflows/ocp-bootstrap-gitops.yml
    with:
      cluster_name: ${{ inputs.cluster_name }}
      base_domain: ${{ inputs.base_domain }}
    secrets: inherit

  destroy-on-failure:
    runs-on: ubuntu-latest
    needs: provision
    if: ${{ always() && needs.provision.result != 'success' }}

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Download openshift-install
        run: |
          curl -sL https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable-${{ inputs.ocp_version }}/openshift-install-linux.tar.gz | tar -xz -C /usr/local/bin openshift-install

      - name: Download install-dir artifact
        uses: actions/download-artifact@v8
        with:
          name: install-dir
          path: install-dir

      - name: Destroy cluster
        run: openshift-install destroy cluster --dir=install-dir --log-level=info 2>&1
