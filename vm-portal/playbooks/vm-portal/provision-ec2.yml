---
# Self-Service Portal — Provision a new EC2 instance.
#
# Launches a real instance via amazon.aws.ec2_instance and ALWAYS tags it
# Name=<vm_name>, ManagedBy=ansible, Owner=<owner>. The ManagedBy tag is the
# gate the start/stop/terminate playbooks require, so anything provisioned here
# is immediately manageable (and terminable) from the portal.
- name: Provision EC2 instance
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    aws_region: "{{ region | default('us-east-2') }}"

  tasks:
    - name: Validate launch payload
      ansible.builtin.assert:
        that:
          - vm_name is defined and vm_name | length > 0
          - vm_name is match('^[a-zA-Z0-9-]+$')
          - instance_type is defined and instance_type | length > 0
          - image_id is defined and image_id is match('^ami-[0-9a-f]+$')
          - owner is defined and owner | length > 0
          - subnet_id is defined and subnet_id is match('^subnet-[0-9a-f]+$')
        fail_msg: >-
          vm_name, instance_type, image_id (ami-...), owner, and subnet_id
          (subnet-...) are required. This account has no default VPC, so a
          subnet must be selected explicitly.

    # Resize the root volume only when asked. Look up the AMI's actual root
    # device name so we resize the root rather than attaching a stray volume.
    - name: Look up AMI root device
      amazon.aws.ec2_ami_info:
        region: "{{ aws_region }}"
        image_ids:
          - "{{ image_id }}"
      register: ami_lookup
      when: volume_size_gb is defined

    - name: Build optional root volume override
      ansible.builtin.set_fact:
        root_volume:
          - device_name: "{{ ami_lookup.images[0].root_device_name }}"
            ebs:
              volume_size: "{{ volume_size_gb | int }}"
              delete_on_termination: true
      when:
        - volume_size_gb is defined
        - ami_lookup.images | default([]) | length == 1

    - name: Provision instance
      amazon.aws.ec2_instance:
        name: "{{ vm_name }}"
        region: "{{ aws_region }}"
        instance_type: "{{ instance_type }}"
        image_id: "{{ image_id }}"
        key_name: "{{ key_name | default(omit) }}"
        vpc_subnet_id: "{{ subnet_id | default(omit) }}"
        security_groups: "{{ security_group_ids | default(omit) }}"
        volumes: "{{ root_volume | default(omit) }}"
        tags:
          Name: "{{ vm_name }}"
          ManagedBy: ansible
          Owner: "{{ owner }}"
        state: started
        wait: true
        wait_timeout: 300
      register: provisioned

    - name: Defensive — exactly one instance should result
      ansible.builtin.assert:
        that:
          - provisioned.instances | length == 1
        fail_msg: "Expected exactly one instance from the provision, got {{ provisioned.instances | length }}."

    - name: Publish the new instance id as a job artifact
      ansible.builtin.set_stats:
        aggregate: false
        data:
          provisioned_instance_id: "{{ provisioned.instances[0].instance_id }}"
          provisioned_vm_name: "{{ vm_name }}"

    - name: Report
      ansible.builtin.debug:
        msg: >-
          Provisioned {{ vm_name }} as {{ provisioned.instances[0].instance_id }}
          ({{ instance_type }}) in {{ aws_region }}.
