server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 16m;

    # ----- AAP reverse proxy -----------------------------------------------
    # The portal talks to AAP via same-origin /api/* and /o/* so the browser
    # never sees a cross-origin request. Upstream is the AAP gateway on the
    # same VM. The cert there is self-signed for aap1.local, so we disable
    # verification — fine for a sandbox install, replace with proper CA
    # validation before exposing this beyond your laptop.

    location /api/ {
        proxy_pass         https://host.containers.internal/api/;
        proxy_set_header   Host              aap1.local;
        proxy_ssl_name     aap1.local;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Always claim HTTPS upstream — AAP gateway returns 426 otherwise.
        proxy_set_header   X-Forwarded-Proto https;
        proxy_ssl_verify   off;
        proxy_ssl_server_name on;
        # AAP gateway (envoy) requires HTTP/1.1.
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_read_timeout 120s;
    }

    # OAuth2 token exchange and revocation. Note: /o/authorize/ is NOT
    # proxied — the user must hit AAP directly so they get the gateway's
    # login UI; we then come back here at /oauth/callback.
    location ~ ^/o/(token|revoke_token)/ {
        proxy_pass         https://host.containers.internal;
        proxy_set_header   Host              aap1.local;
        proxy_ssl_name     aap1.local;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Always claim HTTPS upstream — AAP gateway returns 426 otherwise.
        proxy_set_header   X-Forwarded-Proto https;
        proxy_ssl_verify   off;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
    }

    # ----- In-browser SSH terminal gateway ---------------------------------
    # WebSocket upgrade proxied to the vm-portal-gateway container. The OAuth
    # token travels in the first WS message (not headers), so the browser needs
    # no custom headers. The long read timeout keeps idle interactive shells
    # alive; the gateway enforces its own idle/absolute caps. proxy_buffering is
    # off for interactive latency.
    location /ws/terminal {
        proxy_pass         http://host.containers.internal:8091;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering    off;
    }

    # ----- Static assets ---------------------------------------------------

    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: any unknown route returns index.html so client routing
    # (including /oauth/callback) works.
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
