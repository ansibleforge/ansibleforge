AWSTemplateFormatVersion: "2010-09-09"
Description: GitHub Actions OIDC provider + IAM role for OCP IPI, Terraform DNS, and state management

Parameters:
  GitHubOrg:
    Type: String
    Description: GitHub org or user (e.g. hfenner)
  GitHubRepo:
    Type: String
    Description: GitHub repo name (e.g. ansibleforge)
  GitRef:
    Type: String
    Default: "refs/heads/main"
    Description: Allowed ref (e.g. refs/heads/main or refs/tags/*)
  StateBucketName:
    Type: String
    Default: ansibleforge-tfstate
    Description: S3 bucket name for Terraform state
  LockTableName:
    Type: String
    Default: tfstate-lock
    Description: DynamoDB table name for Terraform state locking
  ClusterPrefix:
    Type: String
    Default: "ocp-"
    Description: Prefix for cluster-created IAM roles/policies/instance-profiles
  BootstrapBucketPrefix:
    Type: String
    Default: "openshift-bootstrap-data-"
    Description: Prefix used by openshift-install for bootstrap S3 bucket

Resources:
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: "https://token.actions.githubusercontent.com"
      ClientIdList:
        - "sts.amazonaws.com"
      ThumbprintList:
        - "6938fd4d98bab03faadb97b34396831e3780aea1"

  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "GitHubActions-${GitHubOrg}-${GitHubRepo}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: GitHubOIDCTrust
            Effect: Allow
            Principal:
              Federated: !Ref GitHubOidcProvider
            Action: "sts:AssumeRoleWithWebIdentity"
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: "sts.amazonaws.com"
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/${GitHubRepo}:ref:${GitRef}"

      Policies:
        # ── Terraform state + DNS ──────────────────────────────────────
        - PolicyName: TerraformDnsAndState
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: TfStateS3
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::${StateBucketName}"
                  - !Sub "arn:aws:s3:::${StateBucketName}/*"

              - Sid: TfStateDynamoDB
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                Resource: !Sub "arn:aws:dynamodb:*:${AWS::AccountId}:table/${LockTableName}"

              - Sid: Route53Zones
                Effect: Allow
                Action:
                  - route53:CreateHostedZone
                  - route53:DeleteHostedZone
                  - route53:GetHostedZone
                  - route53:ListHostedZones
                  - route53:ListHostedZonesByName
                  - route53:GetChange
                  - route53:ChangeTagsForResource
                  - route53:ListTagsForResource
                  - route53:ListResourceRecordSets
                  - route53:ChangeResourceRecordSets
                  - route53:AssociateVPCWithHostedZone
                  - route53:DisassociateVPCFromHostedZone
                Resource: "*"

              - Sid: CloudFormation
                Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:GetTemplate
                  - cloudformation:CreateChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:ListChangeSets
                  - cloudformation:TagResource
                  - cloudformation:UntagResource
                Resource: "*"

              - Sid: CfnS3Create
                Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:PutBucketVersioning
                  - s3:PutEncryptionConfiguration
                  - s3:PutBucketPublicAccessBlock
                  - s3:PutBucketTagging
                  - s3:PutBucketPolicy
                  - s3:PutBucketOwnershipControls
                  - s3:GetBucketVersioning
                  - s3:GetEncryptionConfiguration
                  - s3:GetBucketPublicAccessBlock
                  - s3:GetBucketPolicy
                  - s3:GetBucketTagging
                  - s3:GetBucketOwnershipControls
                Resource: !Sub "arn:aws:s3:::${StateBucketName}"

              - Sid: CfnDynamoDBCreate
                Effect: Allow
                Action:
                  - dynamodb:CreateTable
                  - dynamodb:DeleteTable
                  - dynamodb:DescribeTable
                  - dynamodb:DescribeTimeToLive
                  - dynamodb:UpdateTimeToLive
                  - dynamodb:ListTagsOfResource
                  - dynamodb:TagResource
                  - dynamodb:UntagResource
                  - dynamodb:DescribeContinuousBackups
                Resource: !Sub "arn:aws:dynamodb:*:${AWS::AccountId}:table/${LockTableName}"

        # ── OCP IPI provisioning ───────────────────────────────────────
        - PolicyName: OpenShiftIpiProvisioning
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadOnlyDiscovery
                Effect: Allow
                Action:
                  - ec2:Describe*
                  - elasticloadbalancing:Describe*
                  - autoscaling:Describe*
                  - route53:List*
                  - route53:Get*
                  - iam:Get*
                  - iam:List*
                  - cloudformation:Describe*
                  - cloudformation:Get*
                  - cloudformation:List*
                  - tag:GetResources
                  - tag:GetTagKeys
                  - tag:GetTagValues
                  - sts:GetCallerIdentity
                  - s3:ListAllMyBuckets
                  - s3:GetBucketLocation
                Resource: "*"

              - Sid: IamRolesAndPoliciesByPrefix
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:UpdateAssumeRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                  - iam:ListRolePolicies
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:ListAttachedRolePolicies
                  - iam:CreatePolicy
                  - iam:DeletePolicy
                  - iam:GetPolicy
                  - iam:GetPolicyVersion
                  - iam:CreatePolicyVersion
                  - iam:DeletePolicyVersion
                  - iam:ListPolicyVersions
                  - iam:TagPolicy
                  - iam:UntagPolicy
                Resource:
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/${ClusterPrefix}*"
                  - !Sub "arn:aws:iam::${AWS::AccountId}:policy/${ClusterPrefix}*"

              - Sid: IamInstanceProfilesByPrefix
                Effect: Allow
                Action:
                  - iam:CreateInstanceProfile
                  - iam:DeleteInstanceProfile
                  - iam:GetInstanceProfile
                  - iam:AddRoleToInstanceProfile
                  - iam:RemoveRoleFromInstanceProfile
                  - iam:TagInstanceProfile
                  - iam:UntagInstanceProfile
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:instance-profile/${ClusterPrefix}*"

              - Sid: IamPassRoleByPrefix
                Effect: Allow
                Action: iam:PassRole
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/${ClusterPrefix}*"

              - Sid: IamOidcProviderForCcoctl
                Effect: Allow
                Action:
                  - iam:CreateOpenIDConnectProvider
                  - iam:DeleteOpenIDConnectProvider
                  - iam:GetOpenIDConnectProvider
                  - iam:TagOpenIDConnectProvider
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:oidc-provider/*"

              - Sid: CloudFrontForCcoctl
                Effect: Allow
                Action:
                  - cloudfront:CreateDistribution
                  - cloudfront:DeleteDistribution
                  - cloudfront:GetDistribution
                  - cloudfront:ListDistributions
                  - cloudfront:UpdateDistribution
                  - cloudfront:TagResource
                  - cloudfront:UntagResource
                  - cloudfront:ListTagsForResource
                  - cloudfront:CreateCloudFrontOriginAccessIdentity
                  - cloudfront:DeleteCloudFrontOriginAccessIdentity
                  - cloudfront:GetCloudFrontOriginAccessIdentity
                  - cloudfront:ListCloudFrontOriginAccessIdentities
                Resource: "*"

              - Sid: AllowServiceLinkedRoles
                Effect: Allow
                Action: iam:CreateServiceLinkedRole
                Resource: "*"
                Condition:
                  StringLike:
                    iam:AWSServiceName:
                      - elasticloadbalancing.amazonaws.com
                      - autoscaling.amazonaws.com
                      - spot.amazonaws.com

              - Sid: Ec2VpcAndCompute
                Effect: Allow
                Action:
                  - ec2:CreateVpc
                  - ec2:DeleteVpc
                  - ec2:ModifyVpcAttribute
                  - ec2:CreateSubnet
                  - ec2:DeleteSubnet
                  - ec2:ModifySubnetAttribute
                  - ec2:CreateRouteTable
                  - ec2:DeleteRouteTable
                  - ec2:CreateRoute
                  - ec2:ReplaceRoute
                  - ec2:DeleteRoute
                  - ec2:AssociateRouteTable
                  - ec2:DisassociateRouteTable
                  - ec2:CreateInternetGateway
                  - ec2:DeleteInternetGateway
                  - ec2:AttachInternetGateway
                  - ec2:DetachInternetGateway
                  - ec2:CreateNatGateway
                  - ec2:DeleteNatGateway
                  - ec2:AllocateAddress
                  - ec2:ReleaseAddress
                  - ec2:AssociateAddress
                  - ec2:DisassociateAddress
                  - ec2:CreateSecurityGroup
                  - ec2:DeleteSecurityGroup
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:AuthorizeSecurityGroupEgress
                  - ec2:RevokeSecurityGroupIngress
                  - ec2:RevokeSecurityGroupEgress
                  - ec2:CreateTags
                  - ec2:DeleteTags
                  - ec2:RunInstances
                  - ec2:TerminateInstances
                  - ec2:StartInstances
                  - ec2:StopInstances
                  - ec2:RebootInstances
                  - ec2:CreateLaunchTemplate
                  - ec2:DeleteLaunchTemplate
                  - ec2:CreateLaunchTemplateVersion
                  - ec2:DeleteLaunchTemplateVersions
                  - ec2:ModifyLaunchTemplate
                  - ec2:CreateVolume
                  - ec2:DeleteVolume
                  - ec2:AttachVolume
                  - ec2:DetachVolume
                  - ec2:CreateVpcEndpoint
                  - ec2:DeleteVpcEndpoints
                  - ec2:ModifyVpcEndpoint
                  - ec2:CreateDhcpOptions
                  - ec2:DeleteDhcpOptions
                  - ec2:AssociateDhcpOptions
                  - ec2:DetachNetworkInterface
                  - ec2:DeleteNetworkInterface
                Resource: "*"

              - Sid: ElbForIpi
                Effect: Allow
                Action:
                  - elasticloadbalancing:CreateLoadBalancer
                  - elasticloadbalancing:DeleteLoadBalancer
                  - elasticloadbalancing:ModifyLoadBalancerAttributes
                  - elasticloadbalancing:SetIpAddressType
                  - elasticloadbalancing:SetSecurityGroups
                  - elasticloadbalancing:SetSubnets
                  - elasticloadbalancing:CreateListener
                  - elasticloadbalancing:DeleteListener
                  - elasticloadbalancing:ModifyListener
                  - elasticloadbalancing:CreateTargetGroup
                  - elasticloadbalancing:DeleteTargetGroup
                  - elasticloadbalancing:ModifyTargetGroup
                  - elasticloadbalancing:ModifyTargetGroupAttributes
                  - elasticloadbalancing:RegisterTargets
                  - elasticloadbalancing:DeregisterTargets
                  - elasticloadbalancing:AddTags
                  - elasticloadbalancing:RemoveTags
                Resource: "*"

              - Sid: AutoScalingForIpi
                Effect: Allow
                Action:
                  - autoscaling:CreateAutoScalingGroup
                  - autoscaling:UpdateAutoScalingGroup
                  - autoscaling:DeleteAutoScalingGroup
                  - autoscaling:SetDesiredCapacity
                  - autoscaling:TerminateInstanceInAutoScalingGroup
                  - autoscaling:AttachLoadBalancerTargetGroups
                  - autoscaling:DetachLoadBalancerTargetGroups
                  - autoscaling:CreateOrUpdateTags
                  - autoscaling:DeleteTags
                Resource: "*"

              - Sid: S3BootstrapAndOidcBuckets
                Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:PutBucketTagging
                  - s3:GetBucketTagging
                  - s3:PutBucketVersioning
                  - s3:GetBucketVersioning
                  - s3:PutEncryptionConfiguration
                  - s3:GetEncryptionConfiguration
                  - s3:PutPublicAccessBlock
                  - s3:GetPublicAccessBlock
                  - s3:PutBucketPolicy
                  - s3:GetBucketPolicy
                  - s3:DeleteBucketPolicy
                  - s3:PutBucketOwnershipControls
                  - s3:GetBucketOwnershipControls
                  - s3:ListBucketVersions
                  - s3:ListBucketMultipartUploads
                  - s3:PutBucketAcl
                  - s3:GetBucketAcl
                Resource:
                  - !Sub "arn:aws:s3:::${BootstrapBucketPrefix}*"
                  - !Sub "arn:aws:s3:::${ClusterPrefix}*"

              - Sid: S3BootstrapAndOidcObjects
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectAcl
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:AbortMultipartUpload
                Resource:
                  - !Sub "arn:aws:s3:::${BootstrapBucketPrefix}*"
                  - !Sub "arn:aws:s3:::${BootstrapBucketPrefix}*/*"
                  - !Sub "arn:aws:s3:::${ClusterPrefix}*"
                  - !Sub "arn:aws:s3:::${ClusterPrefix}*/*"

        # ── Secrets Manager for cluster credentials ────────────────────
        - PolicyName: SecretsManager
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ClusterCredentials
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:PutSecretValue
                  - secretsmanager:CreateSecret
                  - secretsmanager:UpdateSecret
                Resource: !Sub "arn:aws:secretsmanager:*:${AWS::AccountId}:secret:/ocp/*"

              - Sid: PullSecret
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:*:${AWS::AccountId}:secret:ocp-pull-secret*"

Outputs:
  RoleArn:
    Description: Role ARN to use in GitHub Actions (role-to-assume)
    Value: !GetAtt GitHubActionsRole.Arn
  OidcProviderArn:
    Description: IAM OIDC Provider ARN
    Value: !Ref GitHubOidcProvider
