---
- name: Apply AAP Configuration (Controller + Gateway)
  hosts: localhost
  connection: local
  gather_facts: false
  # The ansible.controller modules read request_timeout straight from these env
  # vars, which the runner injects as empty strings (""). Newer
  # infra.aap_configuration (pulled in by the AAP 2.6->2.7 bump) no longer
  # tolerates that — the module fails to cast "" to float ("cannot be converted
  # to a float") in the controller_credential_types async wait, aborting the
  # whole apply. Override them with a numeric default here at the play level so
  # every module call (including the async ones) sees a real timeout.
  environment:
    CONTROLLER_REQUEST_TIMEOUT: "{{ lookup('env', 'CONTROLLER_REQUEST_TIMEOUT') | default('', true) or '10' }}"
    AAP_REQUEST_TIMEOUT: "{{ lookup('env', 'AAP_REQUEST_TIMEOUT') | default('', true) or '10' }}"
    TOWER_REQUEST_TIMEOUT: "{{ lookup('env', 'TOWER_REQUEST_TIMEOUT') | default('', true) or '10' }}"
    # AAP 2.7 moved OAuth tokens to the gateway, so the EE's ansible.controller
    # modules 404 trying to self-mint one at the controller's old endpoint. Hand
    # them a gateway token (minted in pre_tasks below) so they skip that path.
    # Empty until the pre_task sets the fact; the modules then prefer it over
    # username/password.
    CONTROLLER_OAUTH_TOKEN: "{{ _cac_gateway_oauth_token | default('') }}"
    TOWER_OAUTH_TOKEN: "{{ _cac_gateway_oauth_token | default('') }}"
  vars:
    cluster_domain: "{{ lookup('env', 'CONTROLLER_HOST') | default('', true) | regex_replace('^https?://aap-aap\\.', '') }}"
    controller_hostname: "{{ lookup('env', 'CONTROLLER_HOST') | default('https://aap-aap.' ~ cluster_domain, true) }}"
    controller_username: "{{ lookup('env', 'CONTROLLER_USERNAME') | default('admin', true) }}"
    controller_password: "{{ lookup('env', 'CONTROLLER_PASSWORD') }}"
    controller_validate_certs: false
    aap_hostname: "{{ controller_hostname }}"
    aap_username: "{{ controller_username }}"
    aap_password: "{{ controller_password }}"
    aap_validate_certs: "{{ controller_validate_certs }}"
    dir_orgs_vars: "{{ playbook_dir }}/env"
    orgs: "{{ target_org | default('Default') }}"
    assign_default_ee_to_jt: false
    assign_galaxy_credentials_to_org: false
    force_rhdh_token: false
    force_mcp_token: false
    k8s_host: "{{ lookup('env', 'K8S_HOST') | default('https://kubernetes.default.svc', true) }}"
    k8s_token: "{{ lookup('env', 'K8S_TOKEN') | default('', true) }}"
    # Skip gateway_role_user_assignments in the dispatcher; we run it ourselves
    # in a custom task AFTER building team_id_by_name / org_id_by_name lookup
    # dicts, so per-org YAML can reference team and org IDs by name without
    # racing the team's creation in the same run.
    # Also skip controller_applications: AAP 2.5+ removed the
    # ansible.controller.application module, so that role can't even load on the
    # current EE (unresolvable module) and aborts the whole dispatcher loop. The
    # dispatcher includes it regardless of an empty var, so it must be filtered
    # out here. OAuth apps are handled by gateway_applications (aap_applications).
    aap_configuration_dispatcher_roles: >-
      {{ (gateway_configuration_dispatcher_roles
          + hub_configuration_dispatcher_roles
          + controller_configuration_dispatcher_roles
          + eda_configuration_dispatcher_roles)
         | rejectattr('role', 'equalto', 'gateway_role_user_assignments')
         | rejectattr('role', 'equalto', 'controller_applications') | list }}
  pre_tasks:
    - name: Validate controller connection
      ansible.builtin.assert:
        that:
          - controller_hostname | length > 0
          - controller_username | length > 0
          - controller_password | length > 0
        fail_msg: >-
          Controller connection not configured. Either attach an
          "AAP Controller Admin" credential or pass controller_password
          as an extra var.

    # AAP 2.7 relocated OAuth token management from the controller to the
    # gateway (/api/gateway/v1/tokens/). The ansible.controller modules in the
    # EE still try to self-mint a token at the controller's old /api/v2/tokens/
    # when authenticating by username/password — now a 404 ("Failed to get
    # token: HTTP Error 404") that aborts every controller role. Mint a gateway
    # token here and feed it to the modules via CONTROLLER_OAUTH_TOKEN (set in
    # the play environment above) so they use it directly and skip the 404 path.
    - name: Mint a gateway OAuth token for the controller modules
      ansible.builtin.uri:
        url: "{{ aap_hostname }}/api/gateway/v1/tokens/"
        method: POST
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: true
        validate_certs: "{{ aap_validate_certs }}"
        body_format: json
        body:
          scope: write
          description: "infra.aap_configuration CaC run"
        status_code: [201]
      register: _cac_gateway_token
      no_log: true

    - name: Expose the gateway token to the controller modules
      ansible.builtin.set_fact:
        # Referenced by CONTROLLER_OAUTH_TOKEN/TOWER_OAUTH_TOKEN in the play
        # environment. Field name matches the controller token response the
        # EDA pre-task below already consumes (.json.token).
        _cac_gateway_oauth_token: "{{ _cac_gateway_token.json.token }}"
      no_log: true

    # Gateway OAuth applications (aap_applications) are NOT scanned by
    # infra.controller_configuration.filetree_read (it only handles controller_*
    # objects), so load them here — same find/include_vars/flatten approach used
    # for the EDA vars below — into the aap_applications list that the dispatcher's
    # gateway_applications role consumes.
    - name: Find gateway application config files
      ansible.builtin.find:
        paths:
          - "{{ playbook_dir }}/env/Default/env/common/aap_applications.d"
        file_type: file
        patterns: "*.yml,*.yaml"
      register: _aap_app_files

    - name: Load each gateway application file
      ansible.builtin.include_vars:
        file: "{{ _aap_app_file.path }}"
      loop: "{{ _aap_app_files.files }}"
      loop_control:
        loop_var: _aap_app_file
        label: "{{ _aap_app_file.path | basename }}"
      register: _aap_app_contents

    - name: Concatenate gateway application lists across all loaded files
      ansible.builtin.set_fact:
        aap_applications: >-
          {{ _aap_app_contents.results
             | rejectattr('ansible_facts.aap_applications', 'undefined')
             | map(attribute='ansible_facts.aap_applications')
             | ansible.builtin.flatten }}

    # EDA filetree load. include_vars with `dir:` overwrites same-named vars
    # across files, so for directories that may contain multiple files that
    # each define the same list variable (e.g. eda_rulebook_activations),
    # load each file separately and flatten. Mirrors the concatenation
    # pattern used by infra.controller_configuration.filetree_read.
    - name: Init EDA list variables
      ansible.builtin.set_fact:
        eda_projects: []
        eda_decision_environments: []
        eda_rulebook_activations: []
        eda_credentials: []
        eda_event_streams: []

    - name: Find EDA config files
      ansible.builtin.find:
        paths:
          - "{{ playbook_dir }}/env/Default/env/common/eda_decision_environments.d"
          - "{{ playbook_dir }}/env/Default/env/common/eda_projects.d"
          - "{{ playbook_dir }}/env/Default/env/common/eda_rulebook_activations.d"
          - "{{ playbook_dir }}/env/Default/env/common/eda_event_streams.d"
          - "{{ playbook_dir }}/env/Default/env/dev/eda_credentials.d"
        file_type: file
        patterns: "*.yml,*.yaml"
      register: _eda_files

    - name: Load each EDA config file
      ansible.builtin.include_vars:
        file: "{{ _eda_file.path }}"
      loop: "{{ _eda_files.files }}"
      loop_control:
        loop_var: _eda_file
        label: "{{ _eda_file.path | basename }}"
      register: _eda_file_contents

    - name: Concatenate EDA lists across all loaded files
      ansible.builtin.set_fact:
        eda_projects: >-
          {{ _eda_file_contents.results
             | rejectattr('ansible_facts.eda_projects', 'undefined')
             | map(attribute='ansible_facts.eda_projects')
             | ansible.builtin.flatten }}
        eda_decision_environments: >-
          {{ _eda_file_contents.results
             | rejectattr('ansible_facts.eda_decision_environments', 'undefined')
             | map(attribute='ansible_facts.eda_decision_environments')
             | ansible.builtin.flatten }}
        eda_rulebook_activations: >-
          {{ _eda_file_contents.results
             | rejectattr('ansible_facts.eda_rulebook_activations', 'undefined')
             | map(attribute='ansible_facts.eda_rulebook_activations')
             | ansible.builtin.flatten }}
        eda_credentials: >-
          {{ _eda_file_contents.results
             | rejectattr('ansible_facts.eda_credentials', 'undefined')
             | map(attribute='ansible_facts.eda_credentials')
             | ansible.builtin.flatten }}
        eda_event_streams: >-
          {{ _eda_file_contents.results
             | rejectattr('ansible_facts.eda_event_streams', 'undefined')
             | map(attribute='ansible_facts.eda_event_streams')
             | ansible.builtin.flatten }}

    # Patch the IIS Auto-Heal activation's IIS_HEALTH_URL from IIS_HOST env var
    # (injected by the "IIS Demo Secrets" credential attached to this JT). The
    # rulebook polls that URL every 10s. Skipped if the credential isn't
    # attached or the host is still the placeholder.
    - name: Patch IIS Auto-Heal activation with health URL
      vars:
        _iis_host: "{{ lookup('env', 'IIS_HOST') }}"
      when:
        - _iis_host | length > 0
        - _iis_host != "unprovisioned.invalid"
      ansible.builtin.set_fact:
        eda_rulebook_activations: >-
          {{ (eda_rulebook_activations
              | rejectattr('name', 'equalto', 'IIS Auto-Heal')
              | list)
             + [(eda_rulebook_activations
                 | selectattr('name', 'equalto', 'IIS Auto-Heal')
                 | first)
                | combine({'extra_vars':
                    (eda_rulebook_activations
                     | selectattr('name', 'equalto', 'IIS Auto-Heal')
                     | first).extra_vars | default({})
                    | combine({
                        'IIS_HEALTH_URL': 'http://' ~ _iis_host ~ '/health.aspx',
                      })
                 })]
          }}

    # Patch the ServiceNow activation's extra_vars with SN_HOST/USERNAME/PASSWORD.
    # The EDA rulebook's source plugin references {{ SN_HOST }} etc., which EDA
    # resolves against activation-scoped vars, not env. We source the values
    # from the "ServiceNow" Controller credential, which Controller injects as
    # env vars for the duration of this job (attach that credential to this
    # CaC job template). Non-fatal: if the env vars aren't present the rest
    # of CaC still applies.
    - name: Patch ServiceNow activation with SN_* env vars
      vars:
        _sn_host: "{{ lookup('env', 'SN_HOST') }}"
        _sn_username: "{{ lookup('env', 'SN_USERNAME') }}"
        _sn_password: "{{ lookup('env', 'SN_PASSWORD') }}"
      when:
        - _sn_host | length > 0
        - _sn_username | length > 0
        - _sn_password | length > 0
      ansible.builtin.set_fact:
        eda_rulebook_activations: >-
          {{ (eda_rulebook_activations
              | rejectattr('name', 'equalto', 'ServiceNow VM Provision')
              | list)
             + [(eda_rulebook_activations
                 | selectattr('name', 'equalto', 'ServiceNow VM Provision')
                 | first)
                | combine({'extra_vars':
                    (eda_rulebook_activations
                     | selectattr('name', 'equalto', 'ServiceNow VM Provision')
                     | first).extra_vars | default({})
                    | combine({
                        'SN_HOST': _sn_host,
                        'SN_USERNAME': _sn_username,
                        'SN_PASSWORD': _sn_password,
                      })
                 })]
          }}
      no_log: true

    - name: Ensure EDA controller token exists
      ansible.builtin.uri:
        url: "{{ controller_hostname }}/api/eda/v1/users/me/awx-tokens/"
        method: GET
        user: "{{ controller_username }}"
        password: "{{ controller_password }}"
        force_basic_auth: true
        validate_certs: "{{ controller_validate_certs }}"
        return_content: true
      register: _eda_tokens

    - name: Create EDA controller token if missing
      when: (_eda_tokens.json.count | default(0)) == 0
      block:
        - name: Generate controller personal access token for EDA
          ansible.builtin.uri:
            url: "{{ controller_hostname }}/api/controller/v2/tokens/"
            method: POST
            user: "{{ controller_username }}"
            password: "{{ controller_password }}"
            force_basic_auth: true
            validate_certs: "{{ controller_validate_certs }}"
            body_format: json
            body:
              scope: write
              description: EDA to Controller
            status_code: [201]
          register: _controller_token

        - name: Register controller token with EDA
          ansible.builtin.uri:
            url: "{{ controller_hostname }}/api/eda/v1/users/me/awx-tokens/"
            method: POST
            user: "{{ controller_username }}"
            password: "{{ controller_password }}"
            force_basic_auth: true
            validate_certs: "{{ controller_validate_certs }}"
            body_format: json
            body:
              name: EDA to Controller
              token: "{{ _controller_token.json.token }}"
            status_code: [200, 201]
    # The ansible.eda.rulebook_activation module declares extra_vars as
    # type=str. If we pass a dict Ansible renders it with Python repr (e.g.
    # "{'k': 'v'}") which the EDA API can't parse — "dictionary requested,
    # could not parse JSON or key=value". Serialize to JSON first.
    - name: Serialize activation extra_vars dicts to JSON
      ansible.builtin.set_fact:
        _eda_ra_serialized: >-
          {{ (_eda_ra_serialized | default([]))
             + [ __item | combine({'extra_vars': __item.extra_vars | to_json})
                 if (__item.extra_vars is defined and __item.extra_vars is mapping)
                 else __item ] }}
      loop: "{{ eda_rulebook_activations }}"
      loop_control:
        loop_var: __item
        label: "{{ __item.name }}"

    - name: Swap in the serialized activations list
      ansible.builtin.set_fact:
        eda_rulebook_activations: "{{ _eda_ra_serialized }}"

    # Refresh the EDA project(s) before reconciling activations. Unlike the
    # controller project, the EDA project does NOT auto-sync on CaC runs, so when
    # a rulebook is added/changed the EDA project goes stale and activation
    # creation fails with "Rulebook <name> not found for project". Sync every EDA
    # project and wait for the import so activations see current rulebooks.
    - name: List EDA projects to refresh
      ansible.builtin.uri:
        url: "{{ controller_hostname }}/api/eda/v1/projects/?page_size=100"
        method: GET
        user: "{{ controller_username }}"
        password: "{{ controller_password }}"
        force_basic_auth: true
        validate_certs: "{{ controller_validate_certs }}"
      register: _eda_projects_state

    - name: Trigger EDA project sync
      ansible.builtin.uri:
        url: "{{ controller_hostname }}/api/eda/v1/projects/{{ item.id }}/sync/"
        method: POST
        user: "{{ controller_username }}"
        password: "{{ controller_password }}"
        force_basic_auth: true
        validate_certs: "{{ controller_validate_certs }}"
        status_code: [200, 202, 409]
      loop: "{{ _eda_projects_state.json.results | default([]) }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Wait for EDA project imports to complete
      ansible.builtin.uri:
        url: "{{ controller_hostname }}/api/eda/v1/projects/{{ item.id }}/"
        method: GET
        user: "{{ controller_username }}"
        password: "{{ controller_password }}"
        force_basic_auth: true
        validate_certs: "{{ controller_validate_certs }}"
      register: _eda_project_import
      until: _eda_project_import.json.import_state in ['completed', 'failed']
      retries: 30
      delay: 5
      loop: "{{ _eda_projects_state.json.results | default([]) }}"
      loop_control:
        label: "{{ item.name }}"

    # The ansible.eda.rulebook_activation module refuses to update a running
    # activation, so drifted activations must be deleted for the role to
    # recreate them. But recreating unconditionally churns activation IDs
    # and drops event delivery on every apply — so compare desired vs live
    # (rulebook content hash, rendered extra_vars, enabled, decision
    # environment) and delete only what actually changed. Unchanged
    # activations keep their IDs and the role no-ops them. Not compared
    # (rare, will surface as a role failure if ever changed in place):
    # eda credential and event-stream attachments, restart_policy.
    - name: List existing EDA activations
      ansible.builtin.uri:
        url: "{{ controller_hostname }}/api/eda/v1/activations/?page_size=100"
        method: GET
        user: "{{ controller_username }}"
        password: "{{ controller_password }}"
        force_basic_auth: true
        validate_certs: "{{ controller_validate_certs }}"
      register: _existing_activations
      no_log: true

    - name: List current EDA rulebooks
      ansible.builtin.uri:
        url: "{{ controller_hostname }}/api/eda/v1/rulebooks/?page_size=200"
        method: GET
        user: "{{ controller_username }}"
        password: "{{ controller_password }}"
        force_basic_auth: true
        validate_certs: "{{ controller_validate_certs }}"
      register: _eda_rulebooks
      no_log: true

    - name: List EDA decision environments
      ansible.builtin.uri:
        url: "{{ controller_hostname }}/api/eda/v1/decision-environments/?page_size=100"
        method: GET
        user: "{{ controller_username }}"
        password: "{{ controller_password }}"
        force_basic_auth: true
        validate_certs: "{{ controller_validate_certs }}"
      register: _eda_des
      no_log: true

    - name: Build activation drift lookup maps
      ansible.builtin.set_fact:
        _rulebook_hashes: >-
          {{ dict(_eda_rulebooks.json.results | map(attribute='name')
             | zip(_eda_rulebooks.json.results | map(attribute='rulesets')
                   | map('hash', 'sha256'))) }}
        _de_names: >-
          {{ dict(_eda_des.json.results | map(attribute='id') | map('string')
             | zip(_eda_des.json.results | map(attribute='name'))) }}
        _desired_activations_by_name: >-
          {{ dict(eda_rulebook_activations | map(attribute='name')
             | zip(eda_rulebook_activations)) }}

    - name: Determine drifted activations
      ansible.builtin.set_fact:
        _drifted_activations: >-
          {{ (_drifted_activations | default([]))
             + ([item] if _is_drifted | bool else []) }}
      vars:
        _d: "{{ _desired_activations_by_name[item.name] }}"
        _sm_live: "{{ item.source_mappings | default('', true) }}"
        # regex_search returns None (not '') on no match and raises when a
        # capture group is requested — test for a match before extracting.
        _hash_live: >-
          {{ (_sm_live | regex_search('rulebook_hash: ([a-f0-9]+)', '\\1') | first)
             if _sm_live is search('rulebook_hash')
             else '' }}
        _hash_want: "{{ _rulebook_hashes[_d.rulebook] | default('') }}"
        _ev_live: "{{ ((item.extra_var | default('', true)) or '{}') | from_yaml }}"
        _ev_want: "{{ _d.extra_vars | default({}) }}"
        _de_live: "{{ _de_names[item.decision_environment_id | string] | default('') }}"
        _is_drifted: >-
          {{ _hash_live != _hash_want
             or _ev_live != _ev_want
             or (item.is_enabled | bool) != (_d.enabled | default(true) | bool)
             or _de_live != (_d.decision_environment | default('')) }}
      loop: >-
        {{ _existing_activations.json.results
           | selectattr('name', 'in', eda_rulebook_activations | map(attribute='name') | list)
           | list }}
      loop_control:
        label: "{{ item.name }} (id={{ item.id }})"

    - name: Force-delete drifted activations so the role can recreate them
      ansible.builtin.uri:
        url: "{{ controller_hostname }}/api/eda/v1/activations/{{ item.id }}/?force=True"
        method: DELETE
        user: "{{ controller_username }}"
        password: "{{ controller_password }}"
        force_basic_auth: true
        validate_certs: "{{ controller_validate_certs }}"
        status_code: [204, 404]
      loop: "{{ _drifted_activations | default([]) }}"
      loop_control:
        label: "{{ item.name }} (id={{ item.id }})"
    # GitHub webhook HMAC token — get-or-create in a k8s secret so every
    # dispatch resolves the same value (value-preserving, like the MCP token
    # pattern above). Consumed by eda_credentials.d/github_webhook.yml and by
    # whoever registers the webhook on the GitHub repo.
    - name: Check for GitHub webhook token secret
      ansible.builtin.uri:
        url: "{{ k8s_host }}/api/v1/namespaces/aap/secrets/eda-github-webhook"
        method: GET
        headers:
          Authorization: "Bearer {{ k8s_token }}"
        validate_certs: false
        status_code: [200, 404]
      register: _gh_webhook_secret
      when: k8s_token | length > 0

    - name: Create GitHub webhook token secret
      ansible.builtin.uri:
        url: "{{ k8s_host }}/api/v1/namespaces/aap/secrets"
        method: POST
        headers:
          Authorization: "Bearer {{ k8s_token }}"
        validate_certs: false
        body_format: json
        body:
          apiVersion: v1
          kind: Secret
          metadata:
            name: eda-github-webhook
            namespace: aap
          type: Opaque
          stringData:
            token: "{{ lookup('ansible.builtin.password', '/dev/null chars=ascii_letters,digits length=48') }}"
        status_code: [201]
      register: _gh_webhook_created
      when:
        - k8s_token | length > 0
        - _gh_webhook_secret.status | default(0) == 404
      no_log: true

    - name: Resolve github_webhook_token fact
      ansible.builtin.set_fact:
        github_webhook_token: >-
          {{ (_gh_webhook_created.json.data.token
              if (_gh_webhook_created is not skipped and _gh_webhook_created.json is defined)
              else _gh_webhook_secret.json.data.token | default('')) | b64decode }}
      when:
        - k8s_token | length > 0
        - (_gh_webhook_secret.status | default(0) == 200) or (_gh_webhook_created is not skipped)
      no_log: true

    - name: Check for Alertmanager EDA token secret
      ansible.builtin.uri:
        url: "{{ k8s_host }}/api/v1/namespaces/aap/secrets/eda-alertmanager-token"
        method: GET
        headers:
          Authorization: "Bearer {{ k8s_token }}"
        validate_certs: false
        status_code: [200, 404]
      register: _am_secret
      when: k8s_token | length > 0

    - name: Create Alertmanager EDA token secret
      ansible.builtin.uri:
        url: "{{ k8s_host }}/api/v1/namespaces/aap/secrets"
        method: POST
        headers:
          Authorization: "Bearer {{ k8s_token }}"
        validate_certs: false
        body_format: json
        body:
          apiVersion: v1
          kind: Secret
          metadata:
            name: eda-alertmanager-token
            namespace: aap
          type: Opaque
          stringData:
            token: "{{ lookup('ansible.builtin.password', '/dev/null chars=ascii_letters,digits length=48') }}"
        status_code: [201]
      register: _am_created
      when:
        - k8s_token | length > 0
        - _am_secret.status | default(0) == 404
      no_log: true

    - name: Resolve alertmanager_eda_token fact
      ansible.builtin.set_fact:
        alertmanager_eda_token: >-
          {{ (_am_created.json.data.token
              if (_am_created is not skipped and _am_created.json is defined)
              else _am_secret.json.data.token | default('')) | b64decode }}
      when:
        - k8s_token | length > 0
        - (_am_secret.status | default(0) == 200) or (_am_created is not skipped)
      no_log: true

  roles:
    - infra.controller_configuration.filetree_read
    - infra.aap_configuration.dispatch

  tasks:
    - name: Build org_id_by_name lookup map
      ansible.builtin.set_fact:
        org_id_by_name: >-
          {{ dict(_orgs | map(attribute='name') | zip(_orgs | map(attribute='id'))) }}
      vars:
        _orgs: >-
          {{ query('ansible.platform.gateway_api', 'organizations',
                   host=aap_hostname, username=aap_username,
                   password=aap_password, verify_ssl=aap_validate_certs) }}

    - name: Build team_id_by_name lookup map
      ansible.builtin.set_fact:
        team_id_by_name: >-
          {{ dict(_teams | map(attribute='name') | zip(_teams | map(attribute='id'))) }}
      vars:
        _teams: >-
          {{ query('ansible.platform.gateway_api', 'teams',
                   host=aap_hostname, username=aap_username,
                   password=aap_password, verify_ssl=aap_validate_certs) }}

    - name: Ensure custom AAP role definitions
      ansible.platform.role_definition:
        name: "{{ item.name }}"
        description: "{{ item.description | default(omit) }}"
        content_type: "{{ item.content_type }}"
        permissions: "{{ item.permissions }}"
        state: "{{ item.state | default('present') }}"
        gateway_hostname: "{{ aap_hostname }}"
        gateway_username: "{{ aap_username }}"
        gateway_password: "{{ aap_password }}"
        gateway_validate_certs: "{{ aap_validate_certs }}"
      loop: "{{ aap_role_definitions | default([]) }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Ensure user role assignments
      ansible.platform.role_user_assignment:
        user: "{{ item.user | default(omit) }}"
        user_ansible_id: "{{ item.user_ansible_id | default(omit) }}"
        role_definition: "{{ item.role_definition }}"
        object_id: "{{ item.object_id | default(omit) }}"
        object_ansible_id: "{{ item.object_ansible_id | default(omit) }}"
        state: "{{ item.state | default('present') }}"
        gateway_hostname: "{{ aap_hostname }}"
        gateway_username: "{{ aap_username }}"
        gateway_password: "{{ aap_password }}"
        gateway_validate_certs: "{{ aap_validate_certs }}"
      loop: "{{ gateway_role_user_assignments | default([]) }}"
      loop_control:
        label: "{{ item.role_definition }} -> {{ item.user | default(item.user_ansible_id) }}"

    - name: Ensure team role assignments
      ansible.platform.role_team_assignment:
        team: "{{ item.team | default(omit) }}"
        team_ansible_id: "{{ item.team_ansible_id | default(omit) }}"
        role_definition: "{{ item.role_definition }}"
        assignment_objects: "{{ item.assignment_objects | default(omit) }}"
        state: "{{ item.state | default('present') }}"
        gateway_hostname: "{{ aap_hostname }}"
        gateway_username: "{{ aap_username }}"
        gateway_password: "{{ aap_password }}"
        gateway_validate_certs: "{{ aap_validate_certs }}"
      loop: "{{ aap_role_team_assignments | default([]) }}"
      loop_control:
        label: "{{ item.role_definition }} -> {{ item.team | default(item.team_ansible_id) }}"

  post_tasks:
    # The filetree-loaded eda_credentials template does not reliably see the
    # github_webhook_token play fact, so the credential can land on its
    # changeme default. Re-assert the real value from the k8s secret after
    # every apply so the GitHub webhook HMAC always validates.
    # The GitHub App lookup credential is an external credential — AAP
    # forbids feeding its inputs from another lookup ("Target must be a
    # non-external credential"), so deliver the private key directly from
    # the git-app-credentials k8s secret, same re-assert pattern as the
    # webhook secret above.
    - name: Re-assert GitHub App private key on the lookup credential
      when: k8s_token | length > 0
      block:
        - name: Read git-app-credentials secret
          ansible.builtin.uri:
            url: "{{ k8s_host }}/api/v1/namespaces/secrets/secrets/git-app-credentials"
            method: GET
            headers:
              Authorization: "Bearer {{ k8s_token }}"
            validate_certs: false
            status_code: [200, 404]
          register: _git_app_secret
          no_log: true

        - name: Patch GitHub App lookup credential private key
          when: _git_app_secret.status == 200
          vars:
            _ga_key: "{{ _git_app_secret.json.data.private_key | b64decode }}"
          block:
            - name: Look up GitHub App credential id
              ansible.builtin.uri:
                url: "{{ controller_hostname }}/api/controller/v2/credentials/?name=GitHub+App+-+AnsibleForge+Git"
                method: GET
                user: "{{ controller_username }}"
                password: "{{ controller_password }}"
                force_basic_auth: true
                validate_certs: "{{ controller_validate_certs }}"
              register: _ga_cred

            - name: Patch private_rsa_key input
              ansible.builtin.uri:
                url: "{{ controller_hostname }}/api/controller/v2/credentials/{{ _ga_cred.json.results[0].id }}/"
                method: PATCH
                user: "{{ controller_username }}"
                password: "{{ controller_password }}"
                force_basic_auth: true
                validate_certs: "{{ controller_validate_certs }}"
                body_format: json
                body:
                  inputs:
                    github_api_url: https://api.github.com
                    app_or_client_id: "4350345"
                    install_id: "147896123"
                    private_rsa_key: "{{ _ga_key }}"
                status_code: [200]
              when: _ga_cred.json.results | length > 0
              no_log: true

    - name: Re-assert Alertmanager EDA credential token and publish receiver config
      when:
        - alertmanager_eda_token is defined
        - alertmanager_eda_token | length > 0
      block:
        - name: Look up Alertmanager Event Stream Credential id
          ansible.builtin.uri:
            url: "{{ controller_hostname }}/api/eda/v1/eda-credentials/?name=Alertmanager+Event+Stream+Credential"
            method: GET
            user: "{{ controller_username }}"
            password: "{{ controller_password }}"
            force_basic_auth: true
            validate_certs: "{{ controller_validate_certs }}"
          register: _am_cred

        - name: Patch Alertmanager Event Stream Credential token
          ansible.builtin.uri:
            url: "{{ controller_hostname }}/api/eda/v1/eda-credentials/{{ _am_cred.json.results[0].id }}/"
            method: PATCH
            user: "{{ controller_username }}"
            password: "{{ controller_password }}"
            force_basic_auth: true
            validate_certs: "{{ controller_validate_certs }}"
            body_format: json
            body:
              inputs:
                token: "{{ alertmanager_eda_token }}"
            status_code: [200]
          when: _am_cred.json.results | length > 0
          no_log: true

        - name: Read Alertmanager event stream URL
          ansible.builtin.uri:
            url: "{{ controller_hostname }}/api/eda/v1/event-streams/?name=Alertmanager"
            method: GET
            user: "{{ controller_username }}"
            password: "{{ controller_password }}"
            force_basic_auth: true
            validate_certs: "{{ controller_validate_certs }}"
          register: _am_stream

        # Published into the secrets namespace so the vault config job seeds
        # secret/alertmanager-eda, from which the alertmanager chart renders
        # the receiver into openshift-monitoring/alertmanager-main. Uses the
        # k8s API via uri + K8S_TOKEN like every other k8s call in this play
        # (kubernetes.core.k8s has no auth wired in this context).
        - name: Check for published receiver config
          ansible.builtin.uri:
            url: "{{ k8s_host }}/api/v1/namespaces/secrets/secrets/alertmanager-eda"
            method: GET
            headers:
              Authorization: "Bearer {{ k8s_token }}"
            validate_certs: false
            status_code: [200, 404]
          register: _am_published
          when: _am_stream.json.results | length > 0

        - name: Publish Alertmanager receiver config to secrets namespace
          ansible.builtin.uri:
            url: >-
              {{ k8s_host }}/api/v1/namespaces/secrets/secrets{{ '' if _am_published.status == 404 else '/alertmanager-eda' }}
            method: "{{ 'POST' if _am_published.status == 404 else 'PUT' }}"
            headers:
              Authorization: "Bearer {{ k8s_token }}"
            validate_certs: false
            body_format: json
            body:
              apiVersion: v1
              kind: Secret
              metadata:
                name: alertmanager-eda
                namespace: secrets
              type: Opaque
              stringData:
                url: "{{ _am_stream.json.results[0].url }}"
                token: "{{ alertmanager_eda_token }}"
            status_code: [200, 201]
          when: _am_stream.json.results | length > 0
          no_log: true

    - name: Re-assert GitHub webhook credential secret
      when:
        - github_webhook_token is defined
        - github_webhook_token | length > 0
      block:
        - name: Look up GitHub Webhook Credential id
          ansible.builtin.uri:
            url: "{{ controller_hostname }}/api/eda/v1/eda-credentials/?name=GitHub+Webhook+Credential"
            method: GET
            user: "{{ controller_username }}"
            password: "{{ controller_password }}"
            force_basic_auth: true
            validate_certs: "{{ controller_validate_certs }}"
          register: _gh_cred

        - name: Patch GitHub Webhook Credential secret
          ansible.builtin.uri:
            url: "{{ controller_hostname }}/api/eda/v1/eda-credentials/{{ _gh_cred.json.results[0].id }}/"
            method: PATCH
            user: "{{ controller_username }}"
            password: "{{ controller_password }}"
            force_basic_auth: true
            validate_certs: "{{ controller_validate_certs }}"
            body_format: json
            body:
              inputs:
                secret: "{{ github_webhook_token }}"
            status_code: [200]
          when: _gh_cred.json.results | length > 0
          no_log: true
    - name: Check if RHDH AAP token secret exists
      ansible.builtin.uri:
        url: "{{ k8s_host }}/api/v1/namespaces/rhdh/secrets/rhdh-aap-token"
        method: GET
        headers:
          Authorization: "Bearer {{ k8s_token }}"
        validate_certs: false
        status_code: [200, 404]
      register: _rhdh_secret
      when: k8s_token | length > 0

    - name: Create RHDH service token in AAP
      when: >-
        k8s_token | length > 0 and
        (_rhdh_secret.status == 404 or force_rhdh_token | bool)
      block:
        - name: Generate AAP personal token
          ansible.builtin.uri:
            url: "{{ controller_hostname }}/api/controller/v2/tokens/"
            method: POST
            user: "{{ controller_username }}"
            password: "{{ controller_password }}"
            force_basic_auth: true
            validate_certs: "{{ controller_validate_certs }}"
            body_format: json
            body:
              scope: read
              description: RHDH catalog sync
            status_code: [201]
          register: _rhdh_token

        - name: Store RHDH token as k8s secret
          ansible.builtin.uri:
            url: "{{ k8s_host }}/api/v1/namespaces/rhdh/secrets"
            method: POST
            headers:
              Authorization: "Bearer {{ k8s_token }}"
              Content-Type: application/json
            validate_certs: false
            body_format: json
            body:
              apiVersion: v1
              kind: Secret
              metadata:
                name: rhdh-aap-token
                namespace: rhdh
              type: Opaque
              data:
                token: "{{ _rhdh_token.json.token | b64encode }}"
            status_code: [201]

    # MCP service token issuance — runs only on per-org dispatch (not the
    # platform-wide Default sync). Authenticates as the org's MCP user (whose
    # password came from <ORG>_MCP_PASSWORD env var earlier in this run) and
    # issues a personal access token, then stores it in aap-mcp namespace.
    - name: Check if MCP token secret exists for this org
      ansible.builtin.uri:
        url: "{{ k8s_host }}/api/v1/namespaces/aap-mcp/secrets/{{ orgs | lower }}-mcp-token"
        method: GET
        headers:
          Authorization: "Bearer {{ k8s_token }}"
        validate_certs: false
        status_code: [200, 404]
      register: _mcp_secret
      when:
        - k8s_token | length > 0
        - orgs | lower != 'default'
        - orgs | lower != 'shared'

    - name: Create MCP service token in AAP and store as k8s secret
      when:
        - k8s_token | length > 0
        - orgs | lower != 'default'
        - orgs | lower != 'shared'
        - _mcp_secret is defined
        - (_mcp_secret.status == 404 or force_mcp_token | bool)
      vars:
        _mcp_username: "{{ orgs | lower }}-mcp"
        _mcp_password: "{{ lookup('env', (orgs | upper) ~ '_MCP_PASSWORD') | default('CHANGE_ME', true) }}"
      block:
        - name: Generate MCP personal token
          ansible.builtin.uri:
            url: "{{ controller_hostname }}/api/controller/v2/tokens/"
            method: POST
            user: "{{ _mcp_username }}"
            password: "{{ _mcp_password }}"
            force_basic_auth: true
            validate_certs: "{{ controller_validate_certs }}"
            body_format: json
            body:
              scope: write
              description: "MCP service token for {{ orgs }}"
            status_code: [201]
          register: _mcp_token
          no_log: true

        - name: Store MCP token as k8s secret
          ansible.builtin.uri:
            url: "{{ k8s_host }}/api/v1/namespaces/aap-mcp/secrets"
            method: POST
            headers:
              Authorization: "Bearer {{ k8s_token }}"
              Content-Type: application/json
            validate_certs: false
            body_format: json
            body:
              apiVersion: v1
              kind: Secret
              metadata:
                name: "{{ orgs | lower }}-mcp-token"
                namespace: aap-mcp
                labels:
                  ansibleforge.dev/org: "{{ orgs | lower }}"
                  ansibleforge.dev/purpose: aap-mcp
              type: Opaque
              data:
                token: "{{ _mcp_token.json.token | b64encode }}"
            status_code: [201]
          no_log: true
