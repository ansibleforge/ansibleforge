---
controller_credentials:
  - name: PAH Registry
    credential_type: Container Registry
    organization: Default
    input_sources:
      - source_credential: Vault Lookup
        target: host
        metadata:
          secret_path: "secret/pah"
          secret_key: "registry_url"
          secret_version: ""
      - source_credential: Vault Lookup
        target: username
        metadata:
          secret_path: "secret/pah"
          secret_key: "username"
          secret_version: ""
      - source_credential: Vault Lookup
        target: password
        metadata:
          secret_path: "secret/pah"
          secret_key: "password"
          secret_version: ""
