---
controller_credential_types:
  - name: IIS Demo Secrets (env inject)
    kind: cloud
    inputs:
      fields:
        - id: IIS_HOST
          type: string
          label: Demo Host IP
        - id: IIS_ADMIN_PASSWORD
          type: string
          label: Administrator Password
          secret: true
      required:
        - IIS_HOST
        - IIS_ADMIN_PASSWORD
    injectors:
      env:
        IIS_HOST: "{{ '{{' }} IIS_HOST {{ '}}' }}"
        IIS_ADMIN_PASSWORD: "{{ '{{' }} IIS_ADMIN_PASSWORD {{ '}}' }}"
