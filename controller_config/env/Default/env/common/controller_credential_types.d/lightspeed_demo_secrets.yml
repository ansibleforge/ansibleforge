---
controller_credential_types:
  - name: Lightspeed Demo Secrets (extra_vars inject)
    kind: cloud
    inputs:
      fields:
        - id: rh_console_offline_token
          type: string
          label: console.redhat.com Service Account offline token
          secret: true
        - id: slack_webhook_url
          type: string
          label: Slack incoming webhook URL (optional)
          secret: true
      required:
        - rh_console_offline_token
    injectors:
      extra_vars:
        rh_console_offline_token: "{{ '{{' }} rh_console_offline_token {{ '}}' }}"
        slack_webhook_url: "{{ '{{' }} slack_webhook_url {{ '}}' }}"
