---
controller_templates:
  - name: "VM Provision - EC2"
    job_type: run
    organization: Default
    project: AnsibleForge
    playbook: playbooks/vm-provision/provision_ec2.yml
    inventory: Localhost
    execution_environment: "Default execution environment"
    credentials:
      - "AWS - AnsibleForge"
      - "ServiceNow"
    ask_variables_on_launch: true
    extra_vars:
      aws_region: us-east-2
      subnet_id: "subnet-0048b1b310a720c5b"
      security_group_id: "sg-0b7cc52861cdcd8a1"
    description: "Provision an EC2 instance from a ServiceNow catalog request"

  - name: "VM Deprovision - EC2"
    job_type: run
    organization: Default
    project: AnsibleForge
    playbook: playbooks/vm-provision/deprovision_ec2.yml
    inventory: Localhost
    execution_environment: "Default execution environment"
    credentials:
      - "AWS - AnsibleForge"
      - "ServiceNow"
    ask_variables_on_launch: true
    extra_vars:
      aws_region: us-east-2
    description: "Terminate an EC2 instance and retire its CMDB CI"

  - name: "VM Request Provision"
    job_type: run
    organization: Default
    project: AnsibleForge
    playbook: playbooks/vm-provision/request_provision.yml
    inventory: Localhost
    execution_environment: "Default execution environment"
    credentials:
      - "ServiceNow"
    ask_variables_on_launch: true
    extra_vars:
      vm_name: ""
      operating_system: rhel9
      cpu_cores: "2"
      memory_gb: "4"
      disk_size_gb: "50"
      vm_environment: dev
      business_justification: ""
    description: "Submit a ServiceNow catalog request to provision a new VM"
