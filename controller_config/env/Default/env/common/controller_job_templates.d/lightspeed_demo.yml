---
controller_templates:
  - name: "Lightspeed - Apply remediation playbook"
    job_type: run
    organization: Default
    project: AnsibleForge
    playbook: playbooks/lightspeed-demo/apply_remediation.yml
    inventory: Localhost
    execution_environment: "EE AnsibleForge"
    description: >-
      Pull and apply the Ansible remediation generated by Red Hat Lightspeed
      for a given Insights issue. Invoked by the lightspeed-self-heal rulebook
      on Rule 1 (critical CVE, non-prod). Requires a "Lightspeed Demo Secrets"
      credential (rh_console_offline_token + optional slack_webhook_url).
    extra_vars:
      cleanup_temp: true
    job_tags: "remediate,verify"
    ask_variables_on_launch: true
