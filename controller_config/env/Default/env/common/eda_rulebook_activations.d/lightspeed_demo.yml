---
# Disabled by default. Before flipping enabled: true:
#   1. Set vault var lightspeed_webhook_token (any long random string —
#      `openssl rand -hex 32`). The dispatch playbook substitutes it into the
#      extra_vars below so the rulebook can validate inbound webhook POSTs.
#   2. Make the activation listener (port 5000) reachable from console.redhat.com,
#      either via an OCP Route or — recommended — an AAP Event Stream.
#   3. Populate the "Lightspeed Demo Secrets" credential (rh_console_offline_token,
#      slack_webhook_url) with real values.
# See playbooks/lightspeed-demo/README.md for the full walkthrough.
eda_rulebook_activations:
  - name: Lightspeed Self-Heal
    description: Reacts to Lightspeed (Insights) events and dispatches remediation JTs.
    organization: Default
    project: AnsibleForge
    rulebook: lightspeed-self-heal.yml
    decision_environment: Default Decision Environment
    restart_policy: on-failure
    enabled: false
    eda_credentials:
      - AAP Controller Admin
    extra_vars:
      LIGHTSPEED_WEBHOOK_TOKEN: "{{ lightspeed_webhook_token | default('changeme-set-vault-lightspeed_webhook_token') }}"
