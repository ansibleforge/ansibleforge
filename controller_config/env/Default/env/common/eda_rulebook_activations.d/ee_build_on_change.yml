---
eda_rulebook_activations:
  - name: GitHub Push Handler
    description: Handles GitHub push events — triggers EE builds and CaC dispatch based on changed paths
    organization: Default
    project: AnsibleForge
    rulebook: ee-build-on-change.yml
    decision_environment: Default Decision Environment
    eda_credentials:
      - AAP Controller Admin
    event_streams:
      - event_stream: GitHub
        source_index: 0
    restart_policy: always
    enabled: true
