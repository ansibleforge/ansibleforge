---
controller_inventories:
  - name: "SCCM Lab"
    organization: Default
    description: "Windows SCCM patching lab on AWS"
    variables:
      ansible_connection: winrm
      ansible_winrm_transport: ntlm
      ansible_winrm_server_cert_validation: ignore
      ansible_port: 5986
      domain_name: sccmlab.local
      domain_netbios: SCCMLAB
      dc_private_ip: 10.0.1.10
      sccm_site_code: AF1
      sccm_site_name: AnsibleForge Lab
