---
controller_credential_input_sources:
  - source_credential: Vault Lookup
    target_credential: PAH Registry
    input_field_name: host
    metadata:
      secret_path: "secret/pah"
      secret_key: "registry_url"
      secret_version: ""
  - source_credential: Vault Lookup
    target_credential: PAH Registry
    input_field_name: username
    metadata:
      secret_path: "secret/pah"
      secret_key: "username"
      secret_version: ""
  - source_credential: Vault Lookup
    target_credential: PAH Registry
    input_field_name: password
    metadata:
      secret_path: "secret/pah"
      secret_key: "password"
      secret_version: ""
