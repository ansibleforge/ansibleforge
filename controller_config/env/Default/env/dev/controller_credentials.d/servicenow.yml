---
controller_credentials:
  - name: ServiceNow
    credential_type: ServiceNow (env inject)
    organization: Default
    inputs: {}
    input_sources:
      - source_credential: Vault Lookup
        target: SN_HOST
        metadata:
          secret_path: "secret/servicenow"
          secret_key: "host"
          secret_version: ""
      - source_credential: Vault Lookup
        target: SN_USERNAME
        metadata:
          secret_path: "secret/servicenow"
          secret_key: "username"
          secret_version: ""
      - source_credential: Vault Lookup
        target: SN_PASSWORD
        metadata:
          secret_path: "secret/servicenow"
          secret_key: "password"
          secret_version: ""
