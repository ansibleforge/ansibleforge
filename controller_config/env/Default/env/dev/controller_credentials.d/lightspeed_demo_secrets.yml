---
# Placeholder values to make CaC creation succeed. Replace via the AAP UI
# (or update this file from a vault) before enabling the Lightspeed Self-Heal
# EDA activation:
#   rh_console_offline_token — console.redhat.com → My User Access →
#     Service Accounts → grant remediations:read + inventory:read → copy the
#     offline (refresh) token.
#   slack_webhook_url — optional; Slack app incoming webhook URL.
controller_credentials:
  - name: Lightspeed Demo Secrets
    credential_type: Lightspeed Demo Secrets (extra_vars inject)
    organization: Default
    inputs:
      rh_console_offline_token: "placeholder"
      slack_webhook_url: ""
