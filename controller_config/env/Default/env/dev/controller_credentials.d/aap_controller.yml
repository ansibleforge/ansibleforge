---
controller_credentials:
  - name: AAP Controller Admin
    credential_type: Red Hat Ansible Automation Platform
    organization: Default
    inputs:
      host: "https://aap-aap.{{ cluster_domain }}"
      username: admin
      verify_ssl: false
      # The RHAAP credential type injects aap_request_timeout as an extra_var
      # (highest precedence). Left unset it injects "", which newer
      # infra.aap_configuration rejects at role arg-spec validation ("cannot
      # be converted to a float") — killing every CaC run using this credential.
      request_timeout: "10"
    input_sources:
      - source_credential: Vault Lookup
        target: password
        metadata:
          secret_path: "secret/aap"
          secret_key: "admin_password"
          secret_version: ""
