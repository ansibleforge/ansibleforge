---
controller_credentials:
  - name: AAP Controller Admin
    credential_type: Red Hat Ansible Automation Platform
    organization: Default
    inputs:
      host: "https://aap-aap.{{ cluster_domain }}"
      username: admin
      verify_ssl: false
    input_sources:
      - source_credential: Vault Lookup
        target: password
        metadata:
          secret_path: "secret/aap"
          secret_key: "admin_password"
          secret_version: ""
