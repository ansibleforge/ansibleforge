---
# The real inputs are populated by the "IIS Demo - Provision" and "IIS Demo -
# Rotate Password" JTs at runtime via the Controller API. CaC must not reset
# them: the CaC JT has this credential attached, so its current values are
# injected into the run as IIS_HOST / IIS_ADMIN_PASSWORD env vars — template
# them back in so every apply preserves whatever provision last wrote. The
# defaults only apply on first-ever creation, before the credential exists.
controller_credentials:
  - name: IIS Demo Secrets
    credential_type: IIS Demo Secrets (env inject)
    organization: Default
    inputs:
      IIS_HOST: "{{ lookup('env', 'IIS_HOST') | default('unprovisioned.invalid', true) }}"
      IIS_ADMIN_PASSWORD: "{{ lookup('env', 'IIS_ADMIN_PASSWORD') | default('placeholder', true) }}"
