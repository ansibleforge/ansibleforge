---
# The inputs are populated by the "IIS Demo - Provision" JT at runtime via
# the Controller API (using the attached AAP Controller Admin credential).
# The placeholder values here just make CaC creation succeed; they get
# overwritten when provision runs.
controller_credentials:
  - name: IIS Demo Secrets
    credential_type: IIS Demo Secrets (env inject)
    organization: Default
    inputs:
      IIS_HOST: "unprovisioned.invalid"
      IIS_ADMIN_PASSWORD: "placeholder"
