---
# Per-org CaC sync JT. EDA dispatches to this JT when files under
# controller_config/env/storage/ change on main.
controller_templates:
  - name: Sync Storage CaC
    organization: Storage
    project: Storage Platform
    playbook: controller_config/dispatch.yml
    inventory: Demo Inventory
    job_type: run
    credentials:
      - Storage Cancel Admin
    extra_vars:
      target_org: storage
    ask_variables_on_launch: false
    survey_enabled: false
    state: present
