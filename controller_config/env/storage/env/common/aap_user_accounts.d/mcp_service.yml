---
# MCP service account — token issued separately for the aap-mcp endpoint.
# Keep this user distinct from human accounts so its token can be rotated independently.
aap_user_accounts:
  - username: storage-mcp
    first_name: Storage
    last_name: MCP
    email: storage-mcp@example.com
    password: "{{ lookup('env', 'STORAGE_MCP_PASSWORD') | default('CHANGE_ME', true) }}"
    is_superuser: false
    state: present
