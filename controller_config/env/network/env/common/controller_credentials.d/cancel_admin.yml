---
# Service token used by the Cancel Network Job JT. Pre-attached to the JT
# (no prompt) so Operators can launch the JT without holding 'use_credential'
# on this credential. Token is sourced from Vault at apply time via the
# Network Vault Lookup input source — this credential carries no plaintext
# secret in git or in AAP.
#
# Required Vault path:
#   secret/aap/network/cancel-admin
# Required key:
#   token  (an AAP OAuth token with admin permission on the Network org)
controller_credentials:
  - name: Network Cancel Admin
    description: Service token for the Cancel Network Job JT. Sourced from Vault.
    organization: Network
    credential_type: Red Hat Ansible Automation Platform
    inputs:
      host: "{{ controller_hostname }}"
      verify_ssl: false
    input_sources:
      - source_credential: Network Vault Lookup
        target: oauth_token
        metadata:
          secret_path: "secret/aap/network/cancel-admin"
          secret_key: "token"
          secret_version: ""
    state: present
