---
# MCP service account — token issued separately for the aap-mcp endpoint.
# Keep this user distinct from human accounts so its token can be rotated independently.
aap_user_accounts:
  - username: security-mcp
    first_name: Security
    last_name: MCP
    email: security-mcp@example.com
    password: "{{ lookup('env', 'SECURITY_MCP_PASSWORD') | default('CHANGE_ME', true) }}"
    is_superuser: false
    state: present
