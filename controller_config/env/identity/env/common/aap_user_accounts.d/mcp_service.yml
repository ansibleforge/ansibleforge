---
# MCP service account — token issued separately for the aap-mcp endpoint.
# Keep this user distinct from human accounts so its token can be rotated independently.
aap_user_accounts:
  - username: identity-mcp
    first_name: Identity
    last_name: MCP
    email: identity-mcp@example.com
    password: "{{ lookup('env', 'IDENTITY_MCP_PASSWORD') | default('CHANGE_ME', true) }}"
    is_superuser: false
    state: present
