---
# GitHub push handler, fed by the "GitHub" EDA event stream. Forwarded
# events wrap the webhook body under event.payload; event.meta carries
# eda_event_stream_name (no HTTP headers) — verified via a debug activation.
- name: GitHub push event handler
  hosts: all
  sources:
    - ansible.eda.pg_listener:
        dsn: "{{ EDA_PG_DSN }}"
        channels:
          - github
  rules:
    - name: Push to main — run ansible-lint
      condition: >-
        event.meta.eda_event_stream_name == "GitHub" and
        event.payload.ref == "refs/heads/main" and
        event.payload.after is defined and
        event.payload.deleted == false
      action:
        run_job_template:
          name: "CI - Ansible Lint"
          organization: Default
          job_args:
            extra_vars:
              git_ref: "{{ event.payload.after }}"

    - name: EE files changed — trigger build workflow
      condition: >-
        event.payload.ref == "refs/heads/main" and
        event.payload.commits is defined and
        (
          event.payload.commits is selectattr("modified", "search", "containers/ee-ansibleforge/")
            or
          event.payload.commits is selectattr("added", "search", "containers/ee-ansibleforge/")
        )
      throttle:
        once_within: 5 minutes
        group_by_attributes:
          - event.payload.ref
      action:
        run_workflow_template:
          name: "EE - Build AnsibleForge"
          organization: Default

    - name: CaC files changed — trigger dispatch
      condition: >-
        event.payload.ref == "refs/heads/main" and
        event.payload.commits is defined and
        (
          event.payload.commits is selectattr("modified", "search", "controller_config/")
            or
          event.payload.commits is selectattr("added", "search", "controller_config/")
            or
          event.payload.commits is selectattr("removed", "search", "controller_config/")
        )
      throttle:
        once_within: 5 minutes
        group_by_attributes:
          - event.payload.ref
      action:
        run_job_template:
          name: "CaC - Apply Controller Configuration"
          organization: Default
