---
# GitHub push handler, fed by the "GitHub" EDA event stream. Event-stream
# events carry the webhook payload at the event top level (no payload/meta
# wrapper, headers stripped) — condition on payload shape, not headers.
- name: GitHub push event handler
  hosts: all
  sources:
    - ansible.eda.pg_listener:
        dsn: "{{ EDA_PG_DSN }}"
        channels:
          - github
  rules:
    - name: Push to main — run ansible-lint
      condition: >-
        event.ref == "refs/heads/main" and
        event.after is defined and
        event.deleted == false
      action:
        run_job_template:
          name: "CI - Ansible Lint"
          organization: Default
          job_args:
            extra_vars:
              git_ref: "{{ event.after }}"

    - name: EE files changed — trigger build workflow
      condition: >-
        event.ref == "refs/heads/main" and
        event.commits is defined and
        (
          event.commits is selectattr("modified", "search", "containers/ee-ansibleforge/")
            or
          event.commits is selectattr("added", "search", "containers/ee-ansibleforge/")
        )
      throttle:
        once_within: 5 minutes
        group_by_attributes:
          - event.ref
      action:
        run_workflow_template:
          name: "EE - Build AnsibleForge"
          organization: Default

    - name: CaC files changed — trigger dispatch
      condition: >-
        event.ref == "refs/heads/main" and
        event.commits is defined and
        (
          event.commits is selectattr("modified", "search", "controller_config/")
            or
          event.commits is selectattr("added", "search", "controller_config/")
            or
          event.commits is selectattr("removed", "search", "controller_config/")
        )
      throttle:
        once_within: 5 minutes
        group_by_attributes:
          - event.ref
      action:
        run_job_template:
          name: "CaC - Apply Controller Configuration"
          organization: Default
