---
# Cluster alert intake, fed by the "Alertmanager" EDA event stream.
# Event-stream events wrap the webhook body under event.payload:
#   {status: firing|resolved, alerts: [...], commonLabels: {...}, ...}
# Today this logs every notification group (visible in the activation log
# and rule audit); add routing/remediation rules per alertname as needs
# emerge — the IIS auto-heal and Lightspeed rulebooks are the pattern.
- name: Cluster alerts
  hosts: all
  sources:
    - ansible.eda.pg_listener:
        dsn: "{{ EDA_PG_DSN }}"
        channels:
          - alertmanager
  rules:
    # SNO-structural alerts: written for multi-node topologies (failover
    # headroom, per-node reservations) with no actionable remediation on a
    # single-node cluster. Logged as informational and excluded from the
    # main firing rule so they never read as actionable.
    - name: SNO-structural (informational)
      condition: >-
        event.meta.eda_event_stream_name == "Alertmanager" and
        event.payload.status == "firing" and
        event.payload.groupLabels.alertname in
          ["HighOverallControlPlaneMemory"]
      action:
        debug:
          msg: >-
            INFO (SNO-structural) {{ event.payload.groupLabels }} —
            multi-node guidance, not actionable on single-node

    - name: Firing alerts
      condition: >-
        event.meta.eda_event_stream_name == "Alertmanager" and
        event.payload.status == "firing" and
        event.payload.groupLabels.alertname not in
          ["HighOverallControlPlaneMemory"]
      action:
        debug:
          msg: >-
            FIRING {{ event.payload.groupLabels }} —
            {{ event.payload.alerts | length }} alert(s):
            {{ event.payload.alerts | map(attribute='labels.alertname') | list }}

    - name: Resolved alerts
      condition: >-
        event.meta.eda_event_stream_name == "Alertmanager" and
        event.payload.status == "resolved"
      action:
        debug:
          msg: >-
            RESOLVED {{ event.payload.groupLabels }}
