---
- name: Rebuild EE when execution-environment.yaml changes
  hosts: all
  sources:
    - ansible.eda.url_check:
        urls:
          - "https://api.github.com/repos/hfenner/ansibleforge/commits?path=containers/ee-ansibleforge/execution-environment.yaml&sha=main&per_page=1"
          - "https://api.github.com/repos/hfenner/ansibleforge/commits?path=containers/ee-ansibleforge/requirements.yaml&sha=main&per_page=1"
          - "https://api.github.com/repos/hfenner/ansibleforge/commits?path=containers/ee-ansibleforge/requirements.txt&sha=main&per_page=1"
        delay: 60
  rules:
    - name: EE files changed — trigger build workflow
      condition: event.url_check.status == "up" and event.url_check.status_changed == true
      throttle:
        once_within: 5 minutes
        group_by_attributes:
          - event.url_check.status
      action:
        run_workflow_template:
          name: "EE - Build AnsibleForge"
          organization: Default
