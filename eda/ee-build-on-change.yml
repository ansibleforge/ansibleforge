---
- name: Rebuild EE when execution-environment.yaml changes
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000
      filters:
        - ansible.eda.json_filter:
            exclude_keys:
              - sender
              - enterprise
        - ansible.eda.dashes_to_underscores:
  rules:
    - name: EE files changed — trigger build workflow
      condition: >-
        event.meta.headers.X_GitHub_Event == "push" and
        event.payload.ref == "refs/heads/main" and
        event.payload.commits is defined and
        (
          event.payload.commits is selectattr("modified", "search", "containers/ee-ansibleforge/")
            or
          event.payload.commits is selectattr("added", "search", "containers/ee-ansibleforge/")
        )
      throttle:
        once_within: 5 minutes
        group_by_attributes:
          - event.payload.ref
      action:
        run_workflow_template:
          name: "EE - Build AnsibleForge"
          organization: Default
