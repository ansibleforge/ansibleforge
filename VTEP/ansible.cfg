[defaults]
inventory = inventory.example.yml
filter_plugins = ./filter_plugins
host_key_checking = False
# For a 500-device fan-out, raise forks (AAP Job Template also has its own
# "Forks" / "Job slicing" controls that override this).
forks = 50
stdout_callback = yaml

[persistent_connection]
command_timeout = 60
connect_timeout = 30
