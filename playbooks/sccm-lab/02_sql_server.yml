---
- name: Configure SQL Server
  hosts: sql_servers
  gather_facts: true

  vars:
    sql_media_bucket: ansibleforge-tfstate
    sql_media_key: media/SQL2025-SSEI-EntDev.exe

  tasks:
    - name: Wait for WinRM
      ansible.builtin.wait_for_connection:
        timeout: 600

    - name: Set hostname
      ansible.windows.win_hostname:
        name: "{{ inventory_hostname }}"
      register: _hostname

    - name: Set DNS to domain controller
      ansible.windows.win_dns_client:
        adapter_names: "*"
        dns_servers:
          - "{{ dc_private_ip }}"

    - name: Regenerate WinRM HTTPS cert for new hostname
      ansible.windows.win_shell: |
        $thumb = (New-SelfSignedCertificate -DnsName "{{ inventory_hostname }}" -CertStoreLocation Cert:\LocalMachine\My).Thumbprint
        winrm delete winrm/config/listener?Address=*+Transport=HTTPS 2>$null
        winrm create winrm/config/listener?Address=*+Transport=HTTPS "@{Hostname=`"{{ inventory_hostname }}`";CertificateThumbprint=`"$thumb`"}"
        Restart-Service WinRM
      when: _hostname.reboot_required

    - name: Reboot after hostname/DNS change
      ansible.windows.win_reboot:
      when: _hostname.reboot_required

    - name: Join domain
      microsoft.ad.membership:
        dns_domain_name: "{{ domain_name }}"
        domain_admin_user: "{{ domain_netbios }}\\Administrator"
        domain_admin_password: "{{ ansible_password }}"
        hostname: "{{ inventory_hostname }}"
        domain_ou_path: "OU=Servers,DC={{ domain_name.split('.') | join(',DC=') }}"
        state: domain
        reboot: true

    - name: Wait after domain join
      ansible.builtin.wait_for_connection:
        timeout: 600
        delay: 15

    - name: Create SQL install directory
      ansible.windows.win_file:
        path: C:\SQLInstall
        state: directory

    - name: Download SQL Server bootstrapper from S3
      ansible.windows.win_shell: |
        Read-S3Object -BucketName {{ sql_media_bucket }} -Key {{ sql_media_key }} -File C:\SQLInstall\SQL2025-SSEI-EntDev.exe
      args:
        creates: C:\SQLInstall\SQL2025-SSEI-EntDev.exe

    - name: Download SQL Server media via bootstrapper
      ansible.windows.win_shell: |
        Start-Process -FilePath C:\SQLInstall\SQL2025-SSEI-EntDev.exe `
          -ArgumentList "/Action=Download", "/MediaPath=C:\SQLInstall", "/MediaType=ISO", "/Quiet" `
          -Wait -NoNewWindow
      args:
        creates: C:\SQLInstall\Media\setup.exe

    - name: Find downloaded SQL Server ISO
      ansible.windows.win_find:
        paths: C:\SQLInstall
        patterns: "*.iso"
      register: _sql_iso

    - name: Verify ISO was downloaded
      ansible.builtin.assert:
        that: _sql_iso.matched > 0
        fail_msg: "No ISO found in C:\\SQLInstall after bootstrapper download"

    - name: Mount SQL Server ISO and copy media
      ansible.windows.win_shell: "{{ mount_iso_script }}"
      vars:
        iso_path: "{{ _sql_iso.files[0].path }}"
        mount_iso_script: >-
          $iso = Mount-DiskImage -ImagePath '{{ iso_path }}' -PassThru;
          $drive = ($iso | Get-Volume).DriveLetter;
          $src = $drive + [char]58 + [char]92;
          Copy-Item -Path $src -Destination C:\SQLInstall\Media -Recurse -Force;
          Dismount-DiskImage -ImagePath '{{ iso_path }}'
      args:
        creates: C:\SQLInstall\Media\setup.exe

    - name: Install SQL Server
      ansible.windows.win_package:
        path: C:\SQLInstall\Media\setup.exe
        arguments:
          - /Q
          - /ACTION=Install
          - /FEATURES=SQLENGINE
          - /INSTANCENAME=MSSQLSERVER
          - /SQLSYSADMINACCOUNTS={{ domain_netbios }}\Domain Admins
          - /SQLSVCACCOUNT={{ domain_netbios }}\svc_sql
          - /SQLSVCPASSWORD={{ ansible_password }}
          - /AGTSVCACCOUNT={{ domain_netbios }}\svc_sql
          - /AGTSVCPASSWORD={{ ansible_password }}
          - /TCPENABLED=1
          - /SECURITYMODE=SQL
          - /SAPWD={{ ansible_password }}
          - /IACCEPTSQLSERVERLICENSETERMS
          - /UPDATEENABLED=False
        product_id: '{skip}'
        expected_return_code: [0, 3010]
      no_log: true
      register: _sql_install
      ignore_errors: true

    - name: Fetch SQL setup log on failure
      ansible.windows.win_shell: |
        $log = Get-ChildItem -Path C:\Program` Files\Microsoft` SQL` Server\*\Setup` Bootstrap\Log -Filter Summary.txt -Recurse | Sort-Object LastWriteTime -Descending | Select-Object -First 1
        if ($log) { Get-Content $log.FullName -Tail 50 } else { "No summary.txt found" }
      register: _sql_log
      when: _sql_install is failed

    - name: Show SQL setup log
      ansible.builtin.debug:
        var: _sql_log.stdout_lines
      when: _sql_install is failed

    - name: Fail if SQL install failed
      ansible.builtin.fail:
        msg: "SQL Server installation failed - see log above"
      when: _sql_install is failed

    - name: Open SQL firewall port
      community.windows.win_firewall_rule:
        name: SQL Server
        localport: 1433
        protocol: tcp
        direction: in
        action: allow
        state: present
        enabled: true

    - name: Enable WMI through Windows Firewall
      ansible.windows.win_shell: |
        Enable-NetFirewallRule -DisplayGroup "Windows Management Instrumentation (WMI)"

    - name: Enable File and Printer Sharing through Windows Firewall
      ansible.windows.win_shell: |
        Enable-NetFirewallRule -DisplayGroup "File and Printer Sharing"

    - name: Enable Remote Service Management through Windows Firewall
      ansible.windows.win_shell: |
        Enable-NetFirewallRule -DisplayGroup "Remote Service Management"

    - name: Configure SQL max memory (12GB)
      ansible.windows.win_shell: |
        Invoke-Sqlcmd -Query "EXEC sp_configure 'show advanced options', 1; RECONFIGURE;"
        Invoke-Sqlcmd -Query "EXEC sp_configure 'max server memory', 12288; RECONFIGURE;"
      changed_when: false
