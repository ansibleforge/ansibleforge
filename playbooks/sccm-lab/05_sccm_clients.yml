---
- name: Configure SCCM Client Machines
  hosts: sccm_clients
  gather_facts: true

  tasks:
    - name: Wait for WinRM
      ansible.builtin.wait_for_connection:
        timeout: 600

    - name: Set hostname
      ansible.windows.win_hostname:
        name: "{{ inventory_hostname }}"
      register: _hostname

    - name: Set DNS to domain controller
      ansible.windows.win_dns_client:
        adapter_names: "*"
        dns_servers:
          - "{{ dc_private_ip }}"

    - name: Ensure WinRM HTTPS cert matches hostname
      ansible.windows.win_shell: |
        $listener = winrm enumerate winrm/config/listener 2>$null
        $current = ($listener | Select-String 'Hostname\s*=\s*(.+)').Matches.Groups[1].Value.Trim()
        if ($current -eq "{{ inventory_hostname }}") {
          Write-Output "CERT_OK"
          exit 0
        }
        $thumb = (New-SelfSignedCertificate -DnsName "{{ inventory_hostname }}" -CertStoreLocation Cert:\LocalMachine\My).Thumbprint
        winrm delete winrm/config/listener?Address=*+Transport=HTTPS 2>$null
        winrm create winrm/config/listener?Address=*+Transport=HTTPS "@{Hostname=`"{{ inventory_hostname }}`";CertificateThumbprint=`"$thumb`"}"
        Restart-Service WinRM
        Write-Output "CERT_REGENERATED"
      register: _cert_result
      changed_when: "'CERT_REGENERATED' in _cert_result.stdout"

    - name: Reboot after hostname/DNS change
      ansible.windows.win_reboot:
      when: _hostname.reboot_required

    - name: Join domain
      microsoft.ad.membership:
        dns_domain_name: "{{ domain_name }}"
        domain_admin_user: "{{ domain_netbios }}\\Administrator"
        domain_admin_password: "{{ ansible_password }}"
        hostname: "{{ inventory_hostname }}"
        domain_ou_path: "OU=Clients,DC={{ domain_name.split('.') | join(',DC=') }}"
        state: domain
        reboot: true
        reboot_timeout: 900

    - name: Wait after domain join
      ansible.builtin.wait_for_connection:
        timeout: 900
        delay: 15

    - name: Create Temp directory
      ansible.windows.win_file:
        path: C:\Temp
        state: directory

    - name: Copy and install SCCM client
      ansible.windows.win_shell: |
        $ErrorActionPreference = "Stop"
        $server = "{{ groups['sccm_servers'][0] }}.{{ domain_name }}"
        $share = "\\\\$server\SMS_{{ sccm_site_code }}"
        $source = "$share\Client\ccmsetup.exe"

        Write-Output "Mounting share $share"
        $netResult = net use $share /user:{{ domain_netbios }}\{{ ansible_user }} "{{ ansible_password }}" 2>&1
        if ($LASTEXITCODE -ne 0) { throw "net use failed: $netResult" }

        Write-Output "Copying ccmsetup.exe"
        Copy-Item $source C:\Temp\ccmsetup.exe -Force
        if (-not (Test-Path C:\Temp\ccmsetup.exe)) { throw "Copy failed - ccmsetup.exe not found in C:\Temp" }

        net use $share /delete 2>&1 | Out-Null

        Write-Output "Running ccmsetup.exe"
        $proc = Start-Process -FilePath C:\Temp\ccmsetup.exe -ArgumentList "/mp:$server", "SMSSITECODE={{ sccm_site_code }}" -Wait -NoNewWindow -PassThru
        Write-Output "ccmsetup exit code: $($proc.ExitCode)"
        Write-Output "INSTALLED"
      args:
        creates: C:\Windows\ccmsetup\ccmsetup.exe
      register: _ccm_install
      changed_when: "'INSTALLED' in _ccm_install.stdout"
      no_log: true

    - name: Register SCCM client
      block:
        - name: Wait for SCCM client to register
          ansible.windows.win_shell: |
            $client = Get-WmiObject -Namespace "root\ccm" -Class SMS_Client -ErrorAction SilentlyContinue
            if ($client) {
              Write-Output "SiteCode: $($client.GetAssignedSite().sSiteCode)"
            } else {
              Write-Output "NOT_REGISTERED"
              exit 1
            }
          register: _client_check
          retries: 40
          delay: 30
          until: _client_check.rc == 0
      rescue:
        - name: Gather SCCM client install diagnostics
          ansible.windows.win_shell: |
            $logPaths = @(
              "C:\Windows\ccmsetup\Logs\ccmsetup.log",
              "C:\Windows\ccmsetup\Logs\ccmsetup-ccmeval.log",
              "C:\Windows\Temp\ccmsetup.log"
            )
            foreach ($p in $logPaths) {
              if (Test-Path $p) {
                Write-Output "=== $p ==="
                Get-Content $p -Tail 50
                Write-Output ""
              }
            }
            Write-Output "=== ccmsetup directory ==="
            if (Test-Path C:\Windows\ccmsetup) {
              Get-ChildItem C:\Windows\ccmsetup -Recurse | Select-Object FullName,Length,LastWriteTime | Format-Table -AutoSize
            } else {
              Write-Output "C:\Windows\ccmsetup does not exist"
            }
            Write-Output "=== C:\Temp ==="
            if (Test-Path C:\Temp) { Get-ChildItem C:\Temp | Format-Table Name,Length,LastWriteTime -AutoSize }
            Write-Output "=== SCCM services ==="
            Get-Service ccm* -ErrorAction SilentlyContinue | Format-Table Status,Name,DisplayName -AutoSize
          register: _ccm_diag

        - name: Display SCCM client diagnostics
          ansible.builtin.debug:
            var: _ccm_diag.stdout_lines

        - name: Fail with registration error
          ansible.builtin.fail:
            msg: "SCCM client failed to register after 40 retries. See diagnostics above."
