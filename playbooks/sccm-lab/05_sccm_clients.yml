---
- name: Configure SCCM Client Machines
  hosts: sccm_clients
  gather_facts: true

  tasks:
    - name: Wait for WinRM
      ansible.builtin.wait_for_connection:
        timeout: 600

    - name: Set hostname
      ansible.windows.win_hostname:
        name: "{{ inventory_hostname }}"
      register: _hostname

    - name: Set DNS to domain controller
      ansible.windows.win_dns_client:
        adapter_names: "*"
        dns_servers:
          - "{{ dc_private_ip }}"

    - name: Ensure WinRM HTTPS cert matches hostname
      ansible.windows.win_shell: |
        $listener = winrm enumerate winrm/config/listener 2>$null
        $current = ($listener | Select-String 'Hostname\s*=\s*(.+)').Matches.Groups[1].Value.Trim()
        if ($current -eq "{{ inventory_hostname }}") {
          Write-Output "CERT_OK"
          exit 0
        }
        $thumb = (New-SelfSignedCertificate -DnsName "{{ inventory_hostname }}" -CertStoreLocation Cert:\LocalMachine\My).Thumbprint
        winrm delete winrm/config/listener?Address=*+Transport=HTTPS 2>$null
        winrm create winrm/config/listener?Address=*+Transport=HTTPS "@{Hostname=`"{{ inventory_hostname }}`";CertificateThumbprint=`"$thumb`"}"
        Restart-Service WinRM
        Write-Output "CERT_REGENERATED"
      register: _cert_result
      changed_when: "'CERT_REGENERATED' in _cert_result.stdout"

    - name: Reboot after hostname/DNS change
      ansible.windows.win_reboot:
      when: _hostname.reboot_required

    - name: Join domain
      microsoft.ad.membership:
        dns_domain_name: "{{ domain_name }}"
        domain_admin_user: "{{ domain_netbios }}\\Administrator"
        domain_admin_password: "{{ ansible_password }}"
        hostname: "{{ inventory_hostname }}"
        domain_ou_path: "OU=Clients,DC={{ domain_name.split('.') | join(',DC=') }}"
        state: domain
        reboot: true
        reboot_timeout: 900

    - name: Wait after domain join
      ansible.builtin.wait_for_connection:
        timeout: 900
        delay: 15

    - name: Create Temp directory
      ansible.windows.win_file:
        path: C:\Temp
        state: directory

    - name: Copy and install SCCM client
      ansible.windows.win_shell: |
        $source = "\\\\{{ groups['sccm_servers'][0] }}.{{ domain_name }}\SMS_{{ sccm_site_code }}\Client\ccmsetup.exe"
        net use "\\\\{{ groups['sccm_servers'][0] }}.{{ domain_name }}\SMS_{{ sccm_site_code }}" /user:{{ domain_netbios }}\{{ ansible_user }} "{{ ansible_password }}" 2>&1 | Out-Null
        Copy-Item $source C:\Temp\ccmsetup.exe -Force
        net use "\\\\{{ groups['sccm_servers'][0] }}.{{ domain_name }}\SMS_{{ sccm_site_code }}" /delete 2>&1 | Out-Null
        Start-Process -FilePath C:\Temp\ccmsetup.exe -ArgumentList "/mp:{{ groups['sccm_servers'][0] }}.{{ domain_name }}", "SMSSITECODE={{ sccm_site_code }}" -Wait -NoNewWindow
        Write-Output "INSTALLED"
      args:
        creates: C:\Windows\ccmsetup\ccmsetup.exe
      register: _ccm_install
      changed_when: "'INSTALLED' in _ccm_install.stdout"
      no_log: true

    - name: Register SCCM client
      block:
        - name: Wait for SCCM client to register
          ansible.windows.win_shell: |
            $client = Get-WmiObject -Namespace "root\ccm" -Class SMS_Client -ErrorAction SilentlyContinue
            if ($client) {
              Write-Output "SiteCode: $($client.GetAssignedSite().sSiteCode)"
            } else {
              Write-Output "NOT_REGISTERED"
              exit 1
            }
          register: _client_check
          retries: 40
          delay: 30
          until: _client_check.rc == 0
      rescue:
        - name: Fetch ccmsetup log on registration failure
          ansible.windows.win_shell: |
            Get-Content C:\Windows\ccmsetup\Logs\ccmsetup.log -Tail 80
          register: _ccmsetup_log

        - name: Display ccmsetup log
          ansible.builtin.debug:
            var: _ccmsetup_log.stdout_lines

        - name: Fail with registration error
          ansible.builtin.fail:
            msg: "SCCM client failed to register after 40 retries. See ccmsetup log above."
