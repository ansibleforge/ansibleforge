---
- name: Install SCCM Site Server
  hosts: sccm_servers
  gather_facts: true

  vars:
    sccm_media_bucket: ansibleforge-tfstate
    sccm_media_key: media/ConfigMgr_2509.exe

  tasks:
    - name: Create SCCM install directory
      ansible.windows.win_file:
        path: C:\SCCMInstall
        state: directory

    - name: Download SCCM eval from S3
      ansible.windows.win_shell: |
        Read-S3Object -BucketName {{ sccm_media_bucket }} -Key {{ sccm_media_key }} -File C:\SCCMInstall\ConfigMgr_2509.exe
      args:
        creates: C:\SCCMInstall\ConfigMgr_2509.exe

    - name: Install 7-Zip for archive extraction
      ansible.windows.win_package:
        path: https://www.7-zip.org/a/7z2408-x64.msi
        product_id: '{23170F69-40C1-2702-2408-000001000000}'
        arguments: /qn
        state: present

    - name: Extract SCCM media
      ansible.windows.win_shell: |
        & "C:\Program Files\7-Zip\7z.exe" x C:\SCCMInstall\ConfigMgr_2509.exe -oC:\SCCMInstall\Media -y
      args:
        creates: C:\SCCMInstall\Media\SMSSETUP\BIN\X64\setup.exe

    - name: Extend AD schema for SCCM
      ansible.windows.win_shell: |
        Start-Process -FilePath C:\SCCMInstall\Media\SMSSETUP\BIN\X64\extadsch.exe -Wait -NoNewWindow
      args:
        creates: C:\ExtADSch.log

    - name: Install ODBC Driver 18
      ansible.windows.win_package:
        path: https://go.microsoft.com/fwlink/?linkid=2266337
        product_id: '{8B0E60C4-1FF1-4109-9E88-2A3BCA48EED8}'
        arguments: IACCEPTMSODBCSQLLICENSETERMS=YES /qn
        state: present

    - name: Install SQL Native Client 11
      ansible.windows.win_package:
        path: https://download.microsoft.com/download/B/E/D/BED73AAC-3C8A-43F5-AF4F-EB4FEA6C8F3A/ENU/x64/sqlncli.msi
        product_id: '{49D665A2-4C2A-476E-9AB8-FCC425F526FC}'
        arguments: IACCEPTSQLNCLILICENSETERMS=YES /qn
        state: present

    - name: Install OLE DB Driver for SQL Server
      ansible.windows.win_package:
        path: C:\SCCMInstall\Media\SMSSETUP\BIN\X64\msoledbsql.msi
        product_id: '{EF32B858-4029-4636-A3E5-19170B133B5D}'
        arguments: IACCEPTMSOLEDBSQLLICENSETERMS=YES /qn
        state: present

    - name: Create SCCM setup INI
      ansible.windows.win_copy:
        content: |
          [Identification]
          Action=InstallPrimarySite

          [Options]
          ProductID=EVAL
          SiteCode={{ sccm_site_code }}
          SiteName={{ sccm_site_name }}
          SMSInstallDir=C:\Program Files\Microsoft Configuration Manager
          SDKServer={{ inventory_hostname }}.{{ domain_name }}
          RoleCommunicationProtocol=HTTPorHTTPS
          ClientsUsePKICertificate=0
          PrerequisiteComp=1
          PrerequisitePath=C:\SCCMInstall\Downloads
          AdminConsole=1
          JoinCEIP=0

          [SQLConfigOptions]
          SQLServerName={{ groups['sql_servers'][0] }}.{{ domain_name }}
          DatabaseName=CM_{{ sccm_site_code }}
          SQLSSBPort=4022

          [CloudConnectorOptions]
          CloudConnector=0

          [HierarchyExpansionOption]
        dest: C:\SCCMInstall\setup.ini

    - name: Enable auto-logon for interactive desktop session
      ansible.windows.win_auto_logon:
        username: "{{ domain_netbios }}\\Administrator"
        password: "{{ ansible_password }}"
        state: present
      no_log: true

    - name: Reboot to create interactive desktop session
      ansible.windows.win_reboot:
        reboot_timeout: 300
        post_reboot_delay: 30

    - name: Wait for interactive session to be available
      ansible.windows.win_shell: |
        (Get-Process explorer -ErrorAction SilentlyContinue) -ne $null
      register: _desktop_ready
      retries: 12
      delay: 10
      until: _desktop_ready.stdout | trim | bool

    - name: Install SCCM via scheduled task (interactive desktop session)
      ansible.windows.win_shell: |
        $action = New-ScheduledTaskAction `
          -Execute "C:\SCCMInstall\Media\SMSSETUP\BIN\X64\setup.exe" `
          -Argument "/SCRIPT C:\SCCMInstall\setup.ini"
        $principal = New-ScheduledTaskPrincipal -UserId "{{ domain_netbios }}\Administrator" `
          -RunLevel Highest -LogonType Interactive
        Register-ScheduledTask -TaskName "InstallSCCM" -Action $action -Principal $principal -Force | Out-Null
        Start-ScheduledTask -TaskName "InstallSCCM"
        do {
          Start-Sleep 60
          $state = (Get-ScheduledTask -TaskName "InstallSCCM").State
          Write-Host "State: $state"
        } while ($state -eq 'Running')
        $info = Get-ScheduledTaskInfo -TaskName "InstallSCCM"
        Unregister-ScheduledTask -TaskName "InstallSCCM" -Confirm:$false
        Write-Output "ExitCode: $($info.LastTaskResult)"
        if ($info.LastTaskResult -ne 0) { exit 1 }
      register: _sccm_install
      changed_when: "'ExitCode: 0' in _sccm_install.stdout"
      async: 3600
      poll: 60

    - name: Disable auto-logon
      ansible.windows.win_auto_logon:
        state: absent

    - name: Wait for SCCM site to be ready
      ansible.windows.win_shell: |
        $site = Get-WmiObject -Namespace "root\SMS\site_{{ sccm_site_code }}" -Class SMS_Site
        Write-Output $site.SiteName
      register: _site_check
      retries: 30
      delay: 30
      until: _site_check.rc == 0

    - name: Configure boundary (VPC CIDR)
      ansible.windows.win_shell: |
        $existing = Get-WmiObject -Namespace "root\SMS\site_{{ sccm_site_code }}" -Class SMS_Boundary `
          | Where-Object { $_.Value -eq "10.0.0.0/16" }
        if (-not $existing) {
          $boundary = ([WmiClass]"\\.\root\SMS\site_{{ sccm_site_code }}:SMS_Boundary").CreateInstance()
          $boundary.DisplayName = "Lab VPC"
          $boundary.BoundaryType = 3
          $boundary.Value = "10.0.0.0/16"
          $boundary.Put()
          Write-Output "CREATED"
        } else {
          Write-Output "EXISTS"
        }
      register: _boundary
      changed_when: "'CREATED' in _boundary.stdout"

    - name: Enable client push installation
      ansible.windows.win_shell: |
        $props = Get-WmiObject -Namespace "root\SMS\site_{{ sccm_site_code }}" -Class SMS_SCI_SCProperty `
          | Where-Object { $_.ItemName -eq "SMS_DISCOVERY_DATA_MANAGER" -and $_.PropertyName -eq "SETTINGS" }
        Write-Output "Client push configuration available"
      changed_when: false
