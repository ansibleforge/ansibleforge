---
- name: Configure SCCM Prerequisites
  hosts: sccm_servers
  gather_facts: true

  tasks:
    - name: Wait for WinRM
      ansible.builtin.wait_for_connection:
        timeout: 600

    - name: Set hostname
      ansible.windows.win_hostname:
        name: "{{ inventory_hostname }}"
      register: _hostname

    - name: Set DNS to domain controller
      ansible.windows.win_dns_client:
        adapter_names: "*"
        dns_servers:
          - "{{ dc_private_ip }}"

    - name: Reboot after hostname/DNS change
      ansible.windows.win_reboot:
      when: _hostname.reboot_required

    - name: Join domain
      microsoft.ad.membership:
        dns_domain_name: "{{ domain_name }}"
        domain_admin_user: "{{ domain_netbios }}\\Administrator"
        domain_admin_password: "{{ ansible_password }}"
        hostname: "{{ inventory_hostname }}"
        domain_ou_path: "OU=Servers,DC={{ domain_name.split('.') | join(',DC=') }}"
        state: domain
        reboot: true

    - name: Wait after domain join
      ansible.builtin.wait_for_connection:
        timeout: 600
        delay: 15

    - name: Install SCCM prerequisite features
      ansible.windows.win_feature:
        name:
          - NET-Framework-Core
          - NET-Framework-Features
          - BITS
          - BITS-IIS-Ext
          - RDC
          - Web-Server
          - Web-WebServer
          - Web-Common-Http
          - Web-Default-Doc
          - Web-Dir-Browsing
          - Web-Http-Errors
          - Web-Static-Content
          - Web-Http-Redirect
          - Web-App-Dev
          - Web-Net-Ext45
          - Web-ASP-Net45
          - Web-ISAPI-Ext
          - Web-ISAPI-Filter
          - Web-Security
          - Web-Windows-Auth
          - Web-Filtering
          - Web-Mgmt-Tools
          - Web-Mgmt-Console
          - Web-Mgmt-Compat
          - Web-Metabase
          - Web-WMI
          - Web-Scripting-Tools
          - UpdateServices-Services
          - UpdateServices-DB
        include_management_tools: true
        state: present
      register: _features

    - name: Reboot after feature install
      ansible.windows.win_reboot:
      when: _features.reboot_required

    - name: Create Temp directory
      ansible.windows.win_file:
        path: C:\Temp
        state: directory

    - name: Download Windows ADK
      ansible.windows.win_get_url:
        url: https://go.microsoft.com/fwlink/?linkid=2243390
        dest: C:\Temp\adksetup.exe
        force: false

    - name: Install Windows ADK
      ansible.windows.win_package:
        path: C:\Temp\adksetup.exe
        arguments: /quiet /ceip off /features OptionId.DeploymentTools OptionId.UserStateMigrationTool
        product_id: '{skip}'
        expected_return_code: [0, 3010]

    - name: Download Windows PE addon
      ansible.windows.win_get_url:
        url: https://go.microsoft.com/fwlink/?linkid=2243391
        dest: C:\Temp\adkwinpesetup.exe
        force: false

    - name: Install Windows PE addon
      ansible.windows.win_package:
        path: C:\Temp\adkwinpesetup.exe
        arguments: /quiet /ceip off /features OptionId.WindowsPreinstallationEnvironment
        product_id: '{skip}'
        expected_return_code: [0, 3010]

    - name: Wait for SQL01 DNS resolution
      ansible.windows.win_shell: |
        Clear-DnsClientCache
        Resolve-DnsName -Name SQL01.{{ domain_name }} -ErrorAction Stop
      register: _dns_check
      retries: 6
      delay: 10
      until: _dns_check is succeeded

    - name: Run WSUS post-install configuration
      ansible.windows.win_shell: |
        & "C:\Program Files\Update Services\Tools\wsusutil.exe" postinstall SQL_INSTANCE_NAME=SQL01.{{ domain_name }} CONTENT_DIR=C:\WSUS
      args:
        creates: C:\WSUS

    - name: Grant SCCM server Full Control on System Management container
      ansible.windows.win_shell: |
        Import-Module ActiveDirectory
        $root = (Get-ADRootDSE).defaultNamingContext
        $container = "CN=System Management,CN=System,$root"
        $computer = Get-ADComputer "{{ inventory_hostname }}"
        $acl = Get-Acl "AD:\$container"
        $sid = $computer.SID
        $rule = New-Object System.DirectoryServices.ActiveDirectoryAccessRule(
          $sid, "GenericAll", "Allow", "Descendents")
        $acl.AddAccessRule($rule)
        Set-Acl "AD:\$container" $acl
      changed_when: false
