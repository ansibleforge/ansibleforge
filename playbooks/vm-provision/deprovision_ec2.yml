---
- name: Deprovision EC2 Instance from ServiceNow Request
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    aws_region: us-east-2
    vm_name: ""
    instance_id: ""
    decommission_reason: ""
    ritm_number: ""
    ritm_sys_id: ""

  tasks:
    - name: Fetch RITM variables from ServiceNow
      servicenow.itsm.api_info:
        resource: sc_item_option_mtom
        sysparm_query: "request_item={{ ritm_sys_id }}"
        columns:
          - sc_item_option.item_option_new.name
          - sc_item_option.value
      register: _ritm_vars_raw
      when: ritm_sys_id | length > 0 and (vm_name | length == 0 or instance_id | length == 0)

    - name: Build RITM variables dict
      ansible.builtin.set_fact:
        _ritm_vars: >-
          {{ _ritm_vars | default({}) | combine({
            item['sc_item_option.item_option_new.name']: item['sc_item_option.value']
          }) }}
      loop: "{{ _ritm_vars_raw.record }}"
      loop_control:
        label: "{{ item['sc_item_option.item_option_new.name'] | default('') }}"
      when: _ritm_vars_raw is not skipped

    - name: Apply RITM variables
      ansible.builtin.set_fact:
        vm_name: "{{ _ritm_vars.vm_name | default(vm_name) }}"
        instance_id: "{{ _ritm_vars.instance_id | default(instance_id) }}"
        decommission_reason: "{{ _ritm_vars.decommission_reason | default(decommission_reason) }}"
      when: _ritm_vars is defined

    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - instance_id | length > 0
          - vm_name | length > 0
        fail_msg: "instance_id and vm_name are required."

    - name: Look up CMDB CI by instance ID
      servicenow.itsm.api_info:
        resource: cmdb_ci_vm_instance
        sysparm_query: "vm_inst_id={{ instance_id }}"
      register: _cmdb_lookup

    - name: Set CMDB CI sys_id
      ansible.builtin.set_fact:
        _ci_sys_id: "{{ _cmdb_lookup.record[0].sys_id }}"
      when: _cmdb_lookup.record | length > 0

    - name: Terminate EC2 instance
      amazon.aws.ec2_instance:
        region: "{{ aws_region }}"
        instance_ids:
          - "{{ instance_id }}"
        state: terminated
        wait: true
      register: _terminate

    - name: Display termination result
      ansible.builtin.debug:
        msg: |
          VM deprovisioned:
            Name:        {{ vm_name }}
            Instance ID: {{ instance_id }}
            Reason:      {{ decommission_reason }}
            RITM:        {{ ritm_number }}

    - name: Retire CMDB CI
      servicenow.itsm.api:
        resource: cmdb_ci_vm_instance
        action: patch
        sys_id: "{{ _ci_sys_id }}"
        data:
          state: "Retired"
          short_description: "{{ vm_name }} - DECOMMISSIONED - {{ decommission_reason | truncate(80) }}"
      when: _ci_sys_id is defined and _ci_sys_id | length > 0

    - name: Update ServiceNow RITM with decommission details
      servicenow.itsm.api:
        resource: sc_req_item
        action: patch
        sys_id: "{{ ritm_sys_id }}"
        data:
          work_notes: >-
            [code]EC2 instance decommissioned by Ansible Automation Platform.
            Instance ID: {{ instance_id }}
            VM Name: {{ vm_name }}
            Reason: {{ decommission_reason }}[/code]
          state: closed_complete
          close_notes: "VM {{ vm_name }} ({{ instance_id }}) terminated successfully."
      when: ritm_sys_id | length > 0
