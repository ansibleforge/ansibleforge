---
# Drives the ServiceNow VM Provision/Decommission demo. Each tick:
#   1. Waits 0-180s random jitter so cycles spread to 5-8 min (rulebook
#      base interval is 300s).
#   2. Submits a new "Request a new virtual machine" RITM via the SN
#      service catalog order_now endpoint (state=1 -> EDA fires the
#      Provision rule -> "VM Provision - EC2" launches an ubuntu t3a.medium).
#   3. Looks up CMDB CIs whose name starts with the chaos prefix and are
#      still "In use" (excluding the just-requested one), and submits a
#      "Decommission VM" RITM for each — the EDA Decommission rule then
#      runs "VM Deprovision - EC2" to terminate the EC2.
- name: ServiceNow chaos tick
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    sn_host: "{{ lookup('env', 'SN_HOST') }}"
    sn_username: "{{ lookup('env', 'SN_USERNAME') }}"
    sn_password: "{{ lookup('env', 'SN_PASSWORD') }}"
    sn_provision_cat_item: "2c160bb0c3f33210dd6df7fdd401311f"
    sn_decom_cat_item: "b1995e0ac33f7210dd6df7fdd40131cb"
    chaos_vm_prefix: "chaos-vm"
    cycle_epoch: "{{ lookup('pipe', 'date +%s') }}"
    new_vm_name: "{{ chaos_vm_prefix }}-{{ cycle_epoch }}"

  tasks:
    - name: Assert SN credentials are present
      ansible.builtin.assert:
        that:
          - sn_host | length > 0
          - sn_username | length > 0
          - sn_password | length > 0
        fail_msg: Attach the "ServiceNow" credential to this job template.

    # Pre-flight: if the developer instance is hibernating or otherwise
    # unreachable, the catalog calls below would all error and pile up
    # noise (and on wake-up, EDA flushes the queued ticks as a burst —
    # which is how we ended up with 100+ orphan EC2 instances). Skip the
    # cycle cleanly instead.
    - name: Pre-flight SNOW reachability
      ansible.builtin.uri:
        url: "{{ sn_host }}/api/now/table/sys_user?sysparm_limit=1&sysparm_fields=sys_id"
        method: GET
        user: "{{ sn_username }}"
        password: "{{ sn_password }}"
        force_basic_auth: true
        validate_certs: false
        headers:
          Accept: application/json
        return_content: true
        status_code: [200, 401, 403, 502, 503, 504]
        timeout: 30
      register: _snow_ping
      failed_when: false

    - name: Skip cycle when SNOW is hibernating or unreachable
      when: _snow_ping.status != 200 or _snow_ping.json is not defined
      block:
        - name: Report skip reason
          ansible.builtin.debug:
            msg: >-
              Skipping chaos cycle —
              {% if _snow_ping.content is defined and 'Instance Hibernating' in _snow_ping.content %}
              SNOW developer instance is hibernating.
              {% else %}
              SNOW unreachable (status={{ _snow_ping.status | default('?') }}).
              {% endif %}
              The SN Keepalive schedule will keep poking it.

        - name: End play
          ansible.builtin.meta: end_play

    - name: Wait random 0-180s so chaos cycles spread to 5-8 min apart
      ansible.builtin.wait_for:
        timeout: "{{ 180 | random }}"

    - name: Submit Provision RITM via service catalog order_now
      ansible.builtin.uri:
        url: "{{ sn_host }}/api/sn_sc/servicecatalog/items/{{ sn_provision_cat_item }}/order_now"
        method: POST
        user: "{{ sn_username }}"
        password: "{{ sn_password }}"
        force_basic_auth: true
        validate_certs: false
        body_format: json
        body:
          sysparm_quantity: "1"
          variables:
            vm_name: "{{ new_vm_name }}"
            operating_system: ubuntu2404
            cpu_cores: "2"
            memory_gb: "4"
            disk_size_gb: "20"
            environment: dev
            business_justification: "Automated chaos cycle for SN VM provision demo"
        status_code: [200, 201]
      register: _new_ritm

    - name: Report provision RITM
      ansible.builtin.debug:
        msg: "Submitted provision RITM for {{ new_vm_name }} (request_number={{ _new_ritm.json.result.request_number }})"

    # Build the SN encoded-query in Jinja and pass via the URL so Ansible
    # doesn't mangle the `^`/`!=` operators (a previous body-form-urlencoded
    # version was silently dropped by the SN API and returned every CI in
    # cmdb_ci_vm_instance — which then got submitted for decommission).
    - name: Build CMDB query URL (single-line so no whitespace creeps in)
      ansible.builtin.set_fact:
        _cmdb_query_url: "{{ sn_host }}/api/now/table/cmdb_ci_vm_instance?sysparm_query={{ ('nameSTARTSWITH' ~ chaos_vm_prefix ~ '^install_status=1^name!=' ~ new_vm_name) | urlencode }}&sysparm_fields=name,vm_inst_id,sys_id,install_status&sysparm_limit=20"

    - name: Find existing chaos VMs in CMDB to decommission
      ansible.builtin.uri:
        url: "{{ _cmdb_query_url }}"
        method: GET
        user: "{{ sn_username }}"
        password: "{{ sn_password }}"
        force_basic_auth: true
        validate_certs: false
        headers:
          Accept: application/json
        status_code: 200
      register: _existing_chaos_vms_raw

    # Defense-in-depth: filter client-side so a rogue server response can't
    # cause us to submit decom RITMs for non-chaos VMs.
    - name: Filter to chaos-prefixed VMs only (safety belt)
      ansible.builtin.set_fact:
        _existing_chaos_vms: >-
          {{ _existing_chaos_vms_raw.json.result | default([])
             | selectattr('name', 'match', '^' ~ chaos_vm_prefix ~ '-')
             | rejectattr('name', 'equalto', new_vm_name)
             | list }}

    - name: Submit Decommission RITM for each existing chaos VM
      ansible.builtin.uri:
        url: "{{ sn_host }}/api/sn_sc/servicecatalog/items/{{ sn_decom_cat_item }}/order_now"
        method: POST
        user: "{{ sn_username }}"
        password: "{{ sn_password }}"
        force_basic_auth: true
        validate_certs: false
        body_format: json
        body:
          sysparm_quantity: "1"
          variables:
            vm_name: "{{ item.name }}"
            instance_id: "{{ item.vm_inst_id }}"
            decommission_reason: "Chaos rotation"
        status_code: [200, 201]
      loop: "{{ _existing_chaos_vms }}"
      loop_control:
        label: "{{ item.name }} ({{ item.vm_inst_id }})"
      register: _decom_results

    - name: Report decommission count
      ansible.builtin.debug:
        msg: >-
          Submitted {{ _decom_results.results | default([]) | length }}
          decommission RITM(s) for previous chaos VMs.
