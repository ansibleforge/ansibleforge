---
- name: Provision EC2 Instance from ServiceNow Request
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    aws_region: us-east-2
    vm_name: ""
    operating_system: ""
    cpu_cores: ""
    memory_gb: ""
    disk_size_gb: ""
    environment: ""
    ritm_number: ""
    ritm_sys_id: ""
    subnet_id: ""
    security_group_id: ""
    key_pair_name: ""

    os_ami_map:
      win2022:
        owner: "801119661308"
        filter: "Windows_Server-2022-English-Full-Base-*"
      win2025:
        owner: "801119661308"
        filter: "Windows_Server-2025-English-Full-Base-*"
      rhel9:
        owner: "309956199498"
        filter: "RHEL-9.*-x86_64-*"
      ubuntu2404:
        owner: "099720109477"
        filter: "ubuntu/images/hvm-ssd-gp3/ubuntu-noble-24.04-amd64-server-*"

    instance_type_map:
      "2_4": "t3a.medium"
      "2_8": "t3a.large"
      "4_16": "t3a.xlarge"
      "4_32": "r5a.xlarge"
      "8_32": "m5a.2xlarge"
      "8_64": "r5a.2xlarge"
      "16_64": "m5a.4xlarge"

  tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - vm_name | length > 0
          - operating_system in os_ami_map
          - cpu_cores | string + '_' + memory_gb | string in instance_type_map
          - disk_size_gb | int >= 20
          - environment | length > 0
          - subnet_id | length > 0
          - security_group_id | length > 0
        fail_msg: >-
          Missing or invalid parameters. Ensure vm_name, operating_system,
          cpu_cores/memory_gb (valid combination), disk_size_gb, environment,
          subnet_id, and security_group_id are provided.

    - name: Resolve instance type
      ansible.builtin.set_fact:
        _instance_type: "{{ instance_type_map[cpu_cores | string + '_' + memory_gb | string] }}"

    - name: Find AMI
      amazon.aws.ec2_ami_info:
        region: "{{ aws_region }}"
        owners:
          - "{{ os_ami_map[operating_system].owner }}"
        filters:
          name: "{{ os_ami_map[operating_system].filter }}"
          architecture: x86_64
          virtualization-type: hvm
      register: _ami_results

    - name: Select most recent AMI
      ansible.builtin.set_fact:
        _ami_id: "{{ (_ami_results.images | sort(attribute='creation_date') | last).image_id }}"

    - name: Launch EC2 instance
      amazon.aws.ec2_instance:
        region: "{{ aws_region }}"
        name: "{{ vm_name }}"
        instance_type: "{{ _instance_type }}"
        image_id: "{{ _ami_id }}"
        subnet_id: "{{ subnet_id }}"
        security_group: "{{ security_group_id }}"
        key_name: "{{ key_pair_name | default(omit, true) }}"
        volumes:
          - device_name: "{{ '/dev/xvda' if operating_system.startswith('win') else '/dev/sda1' }}"
            ebs:
              volume_size: "{{ disk_size_gb | int }}"
              volume_type: gp3
              encrypted: true
        tags:
          Environment: "{{ environment }}"
          ManagedBy: ansible
          ServiceNow_RITM: "{{ ritm_number }}"
        wait: true
        state: running
      register: _ec2

    - name: Set instance facts
      ansible.builtin.set_fact:
        _instance_id: "{{ _ec2.instances[0].instance_id }}"
        _private_ip: "{{ _ec2.instances[0].private_ip_address }}"
        _public_ip: "{{ _ec2.instances[0].public_ip_address | default('N/A') }}"

    - name: Display instance details
      ansible.builtin.debug:
        msg: |
          VM provisioned successfully:
            Name:        {{ vm_name }}
            Instance ID: {{ _instance_id }}
            Type:        {{ _instance_type }}
            AMI:         {{ _ami_id }}
            Private IP:  {{ _private_ip }}
            Public IP:   {{ _public_ip }}
            OS:          {{ operating_system }}
            Environment: {{ environment }}
            RITM:        {{ ritm_number }}

    - name: Update ServiceNow RITM with instance details
      servicenow.itsm.api:
        resource: sc_req_item
        action: patch
        sys_id: "{{ ritm_sys_id }}"
        data:
          work_notes: >-
            [code]EC2 instance provisioned by Ansible Automation Platform.
            Instance ID: {{ _instance_id }}
            Instance Type: {{ _instance_type }}
            Private IP: {{ _private_ip }}
            Public IP: {{ _public_ip }}
            OS: {{ operating_system }}
            Region: {{ aws_region }}[/code]
          state: closed_complete
          close_notes: "VM {{ vm_name }} ({{ _instance_id }}) provisioned successfully."
      when: ritm_sys_id | length > 0
