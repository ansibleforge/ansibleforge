---
# Rotates the Administrator password on the iis-demo Windows host every 90
# days. Looks up the running instance by Name tag, generates a new password,
# pushes it via SSM Run Command, and patches the "IIS Demo Secrets"
# credential in AAP so downstream JTs (Restart IIS, Trigger Error, EDA
# auto-heal) keep working with the new password. Designed to be launched on
# a schedule — no extra_vars or surveys required.
- name: Rotate IIS demo Administrator password
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    aws_region: us-east-2
    vm_name: "iis-demo"

  pre_tasks:
    - name: Generate new Administrator password once
      ansible.builtin.set_fact:
        admin_password: "{{ _pw + 'Af1!' }}"
      vars:
        # Alphanumeric only — punctuation breaks `net user Administrator "<pw>"`.
        _pw: "{{ lookup('ansible.builtin.password', '/dev/null chars=ascii_letters,digits length=20') }}"

  tasks:
    - name: Find running iis-demo instance
      amazon.aws.ec2_instance_info:
        region: "{{ aws_region }}"
        filters:
          "tag:Name": "{{ vm_name }}"
          "instance-state-name": running
      register: _ec2

    - name: Fail when no running iis-demo instance exists
      ansible.builtin.fail:
        msg: >-
          No running EC2 instance with tag Name={{ vm_name }} found in
          {{ aws_region }}. Run "IIS Demo - Provision" first.
      when: _ec2.instances | length == 0

    - name: Set instance facts
      ansible.builtin.set_fact:
        _instance_id: "{{ _ec2.instances[0].instance_id }}"
        _public_ip: "{{ _ec2.instances[0].public_ip_address }}"

    # SSM agent is normally already online on a healthy iis-demo host, but
    # poll briefly in case the rotation fires right after a reboot.
    - name: Confirm SSM agent is online for the instance
      ansible.builtin.command:
        argv:
          - python3
          - -c
          - |
            import boto3, os
            ssm = boto3.client('ssm', region_name=os.environ['AWS_REGION'])
            r = ssm.describe_instance_information(
                Filters=[{'Key': 'InstanceIds', 'Values': [os.environ['INSTANCE_ID']]}],
            )
            info = r.get('InstanceInformationList', [])
            print(info[0]['PingStatus'] if info else 'NotRegistered')
      environment:
        AWS_REGION: "{{ aws_region }}"
        INSTANCE_ID: "{{ _instance_id }}"
      register: _ssm_ping
      retries: 12
      delay: 10
      until: _ssm_ping.stdout == "Online"
      changed_when: false

    # Password is passed via env var (not a Jinja-rendered argv element) so
    # it never lands in process listings or no_log-bypass logs.
    - name: Reset Administrator password via SSM Run Command
      ansible.builtin.command:
        argv:
          - python3
          - -c
          - |
            import boto3, os
            ssm = boto3.client('ssm', region_name=os.environ['AWS_REGION'])
            r = ssm.send_command(
                InstanceIds=[os.environ['INSTANCE_ID']],
                DocumentName='AWS-RunPowerShellScript',
                Parameters={'commands': [f'net user Administrator "{os.environ["ADMIN_PASSWORD"]}"']},
            )
            print(r['Command']['CommandId'])
      environment:
        AWS_REGION: "{{ aws_region }}"
        INSTANCE_ID: "{{ _instance_id }}"
        ADMIN_PASSWORD: "{{ admin_password }}"
      register: _ssm_cmd
      changed_when: true
      no_log: true

    - name: Wait for SSM password-reset command to complete
      ansible.builtin.command:
        argv:
          - python3
          - -c
          - |
            import boto3, os
            ssm = boto3.client('ssm', region_name=os.environ['AWS_REGION'])
            try:
                r = ssm.get_command_invocation(
                    CommandId=os.environ['COMMAND_ID'],
                    InstanceId=os.environ['INSTANCE_ID'],
                )
                print(r['Status'])
            except ssm.exceptions.InvocationDoesNotExist:
                print('Pending')
      environment:
        AWS_REGION: "{{ aws_region }}"
        INSTANCE_ID: "{{ _instance_id }}"
        COMMAND_ID: "{{ _ssm_cmd.stdout }}"
      register: _ssm_status
      retries: 30
      delay: 5
      until: _ssm_status.stdout == "Success"
      failed_when: _ssm_status.stdout in ["Failed", "Cancelled", "TimedOut"]
      changed_when: false

    - name: Patch "IIS Demo Secrets" credential with new password
      vars:
        _controller_host: "{{ lookup('env', 'CONTROLLER_HOST') }}"
        _controller_user: "{{ lookup('env', 'CONTROLLER_USERNAME') | default('admin', true) }}"
        _controller_pass: "{{ lookup('env', 'CONTROLLER_PASSWORD') }}"
      block:
        - name: Assert AAP Controller Admin credential is attached
          ansible.builtin.assert:
            that:
              - _controller_host | length > 0
              - _controller_pass | length > 0
            fail_msg: >-
              Attach the "AAP Controller Admin" credential to this job
              template so the IIS Demo Secrets credential can be updated
              with the rotated password.

        - name: Look up IIS Demo Secrets credential ID
          ansible.builtin.uri:
            url: "{{ _controller_host }}/api/controller/v2/credentials/?name=IIS+Demo+Secrets"
            method: GET
            user: "{{ _controller_user }}"
            password: "{{ _controller_pass }}"
            force_basic_auth: true
            validate_certs: false
          register: _cred_lookup

        - name: Patch IIS Demo Secrets credential with rotated password
          ansible.builtin.uri:
            url: "{{ _controller_host }}/api/controller/v2/credentials/{{ _cred_lookup.json.results[0].id }}/"
            method: PATCH
            user: "{{ _controller_user }}"
            password: "{{ _controller_pass }}"
            force_basic_auth: true
            validate_certs: false
            body_format: json
            body:
              inputs:
                IIS_HOST: "{{ _public_ip }}"
                IIS_ADMIN_PASSWORD: "{{ admin_password }}"
            status_code: [200]
          no_log: true

    - name: Report rotation result
      ansible.builtin.debug:
        msg: >-
          Rotated Administrator password on {{ vm_name }}
          ({{ _instance_id }} @ {{ _public_ip }}). IIS Demo Secrets
          credential updated.
