---
# Provisions a Windows 2022 EC2 instance, installs IIS + ASP.NET, deploys the
# demo pages, and writes the host IP + Administrator password to Vault so
# downstream JTs and the EDA rulebook can target it.
- name: Launch Windows EC2 for IIS demo
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    aws_region: us-east-2
    vm_name: "iis-demo"
    os_ami_owner: "801119661308"
    os_ami_filter: "Windows_Server-2022-English-Full-Base-*"
    instance_type: "t3a.large"
    disk_size_gb: 50
    # admin_password is set in pre_tasks as a fact so the lookup runs exactly
    # once (play vars re-evaluate the expression on every access, which would
    # produce a different password in user-data vs the credential).

  pre_tasks:
    - name: Generate Administrator password once (lookup would re-run every access)
      ansible.builtin.set_fact:
        admin_password: "{{ _pw + 'Af1!' }}"
      vars:
        # Restrict to alphanumeric — punctuation chars like $, ", ` break the
        # PowerShell user-data that runs `net user Administrator "<pw>"`,
        # producing a set password that differs from the variable.
        _pw: "{{ lookup('ansible.builtin.password', '/dev/null chars=ascii_letters,digits length=20') }}"

    # Ensure an IAM role + instance profile granting SSM access exists. We use
    # this to push the freshly-generated Administrator password onto the host
    # via SSM Run Command after launch, which makes the playbook idempotent
    # against pre-existing iis-demo instances. Without SSM, re-running against
    # a host whose user_data has already executed leaves the credential and
    # the host's actual password out of sync (user_data only re-runs on boot).
    - name: Ensure IIS demo SSM IAM role exists
      amazon.aws.iam_role:
        name: iis-demo-ssm
        assume_role_policy_document: |
          {
            "Version": "2012-10-17",
            "Statement": [{
              "Effect": "Allow",
              "Principal": {"Service": "ec2.amazonaws.com"},
              "Action": "sts:AssumeRole"
            }]
          }
        managed_policies:
          - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        create_instance_profile: true
        state: present

  tasks:
    - name: Find VPCs
      amazon.aws.ec2_vpc_net_info:
        region: "{{ aws_region }}"
      register: _vpc

    - name: Pick a VPC (first in the region)
      ansible.builtin.set_fact:
        _vpc_id: "{{ _vpc.vpcs[0].vpc_id }}"
      failed_when: _vpc.vpcs | length == 0

    - name: Find a public subnet in that VPC
      amazon.aws.ec2_vpc_subnet_info:
        region: "{{ aws_region }}"
        filters:
          vpc-id: "{{ _vpc_id }}"
      register: _subnets

    - name: Pick the first subnet that auto-assigns public IPs
      ansible.builtin.set_fact:
        subnet_id: >-
          {{ (_subnets.subnets
              | selectattr('map_public_ip_on_launch', 'equalto', true)
              | list
              | first).subnet_id }}

    - name: Ensure iis-demo SG exists with HTTP 80 and WinRM 5985 ingress
      amazon.aws.ec2_security_group:
        region: "{{ aws_region }}"
        state: present
        name: iis-demo-sg
        description: "AnsibleForge IIS demo - HTTP and WinRM"
        vpc_id: "{{ _vpc_id }}"
        rules:
          - proto: tcp
            from_port: 80
            to_port: 80
            cidr_ip: 0.0.0.0/0
            rule_desc: "HTTP for IIS demo page"
          - proto: tcp
            from_port: 5985
            to_port: 5985
            cidr_ip: 0.0.0.0/0
            rule_desc: "WinRM HTTP (demo)"
        purge_rules: false
      register: _demo_sg

    - name: Set security group id
      ansible.builtin.set_fact:
        security_group_id: "{{ _demo_sg.group_id }}"

    - name: Find latest Windows 2022 AMI
      amazon.aws.ec2_ami_info:
        region: "{{ aws_region }}"
        owners:
          - "{{ os_ami_owner }}"
        filters:
          name: "{{ os_ami_filter }}"
          architecture: x86_64
          virtualization-type: hvm
      register: _ami_results

    - name: Select most recent AMI
      ansible.builtin.set_fact:
        _ami_id: "{{ (_ami_results.images | sort(attribute='creation_date') | last).image_id }}"

    - name: Launch EC2 instance
      amazon.aws.ec2_instance:
        region: "{{ aws_region }}"
        name: "{{ vm_name }}"
        instance_type: "{{ instance_type }}"
        image_id: "{{ _ami_id }}"
        subnet_id: "{{ subnet_id }}"
        security_group: "{{ security_group_id }}"
        instance_role: iis-demo-ssm
        volumes:
          - device_name: /dev/sda1
            ebs:
              volume_size: "{{ disk_size_gb | int }}"
              volume_type: gp3
              encrypted: true
        tags:
          Name: "{{ vm_name }}"
          Role: iis-demo
          ManagedBy: ansible
        user_data: |
          <powershell>
          Start-Transcript -Path C:\Windows\Temp\userdata.log -Append
          $ErrorActionPreference = 'Stop'

          # Set a known Administrator password
          net user Administrator "{{ admin_password }}"
          wmic useraccount where "Name='Administrator'" set PasswordExpires=false

          # WinRM over HTTP (5985) with basic auth + unencrypted — demo-only.
          Enable-PSRemoting -Force -SkipNetworkProfileCheck
          winrm set winrm/config/service/auth '@{Basic="true"}'
          winrm set winrm/config/service '@{AllowUnencrypted="true"}'
          winrm set winrm/config/client/auth '@{Basic="true"}'
          winrm set winrm/config/client '@{AllowUnencrypted="true"}'

          # Firewall rules
          New-NetFirewallRule -DisplayName "WinRM HTTP" -Direction Inbound -LocalPort 5985 -Protocol TCP -Action Allow
          New-NetFirewallRule -DisplayName "HTTP 80"    -Direction Inbound -LocalPort 80   -Protocol TCP -Action Allow

          Restart-Service WinRM
          Stop-Transcript
          </powershell>
          <persist>true</persist>
        wait: true
        state: running
      register: _ec2

    - name: Set instance facts
      ansible.builtin.set_fact:
        _instance_id: "{{ _ec2.instances[0].instance_id }}"
        _public_ip: "{{ _ec2.instances[0].public_ip_address }}"

    # ec2_instance only sets instance_role at launch — for instances that
    # already exist (the idempotent path), we have to associate the profile
    # explicitly. amazon.aws has no module for instance-profile association
    # on running instances and the EE ships neither community.aws nor the
    # aws CLI, so we drive boto3 directly via inline python3. Same approach
    # is used for the SSM Run Command tasks below.
    - name: Look up any existing IAM instance profile association
      ansible.builtin.command:
        argv:
          - python3
          - -c
          - |
            import boto3, os
            ec2 = boto3.client('ec2', region_name=os.environ['AWS_REGION'])
            r = ec2.describe_iam_instance_profile_associations(
                Filters=[
                    {'Name': 'instance-id', 'Values': [os.environ['INSTANCE_ID']]},
                    {'Name': 'state', 'Values': ['associated']},
                ],
            )
            a = r.get('IamInstanceProfileAssociations', [])
            print(a[0]['IamInstanceProfile']['Arn'] if a else '')
      environment:
        AWS_REGION: "{{ aws_region }}"
        INSTANCE_ID: "{{ _instance_id }}"
      register: _iam_assoc_arn
      changed_when: false

    - name: Fail fast if a non-iis-demo-ssm profile is already attached
      ansible.builtin.fail:
        msg: >-
          Instance {{ _instance_id }} already has IAM profile
          "{{ _iam_assoc_arn.stdout }}" attached. Expected iis-demo-ssm or
          none. Disassociate it manually before re-running.
      when:
        - _iam_assoc_arn.stdout | length > 0
        - not _iam_assoc_arn.stdout.endswith("/iis-demo-ssm")

    - name: Associate iis-demo-ssm instance profile when none attached
      ansible.builtin.command:
        argv:
          - python3
          - -c
          - |
            import boto3, os
            ec2 = boto3.client('ec2', region_name=os.environ['AWS_REGION'])
            ec2.associate_iam_instance_profile(
                IamInstanceProfile={'Name': 'iis-demo-ssm'},
                InstanceId=os.environ['INSTANCE_ID'],
            )
      environment:
        AWS_REGION: "{{ aws_region }}"
        INSTANCE_ID: "{{ _instance_id }}"
      when: _iam_assoc_arn.stdout | length == 0
      changed_when: true

    - name: Wait for SSM agent to register with AWS Systems Manager
      ansible.builtin.command:
        argv:
          - python3
          - -c
          - |
            import boto3, os
            ssm = boto3.client('ssm', region_name=os.environ['AWS_REGION'])
            r = ssm.describe_instance_information(
                Filters=[{'Key': 'InstanceIds', 'Values': [os.environ['INSTANCE_ID']]}],
            )
            info = r.get('InstanceInformationList', [])
            print(info[0]['PingStatus'] if info else 'NotRegistered')
      environment:
        AWS_REGION: "{{ aws_region }}"
        INSTANCE_ID: "{{ _instance_id }}"
      register: _ssm_ping
      retries: 60
      delay: 10
      until: _ssm_ping.stdout == "Online"
      changed_when: false

    # Reset the Administrator password to the value we just generated so the
    # AAP credential we patch below actually matches what's on the host. This
    # is what makes the playbook safe to re-run against an already-provisioned
    # iis-demo instance. Password is passed as an env var (not a Jinja-rendered
    # argv element) so it never lands in process listings or no_log-bypass logs.
    - name: Reset Administrator password via SSM Run Command
      ansible.builtin.command:
        argv:
          - python3
          - -c
          - |
            import boto3, os
            ssm = boto3.client('ssm', region_name=os.environ['AWS_REGION'])
            r = ssm.send_command(
                InstanceIds=[os.environ['INSTANCE_ID']],
                DocumentName='AWS-RunPowerShellScript',
                Parameters={'commands': [f'net user Administrator "{os.environ["ADMIN_PASSWORD"]}"']},
            )
            print(r['Command']['CommandId'])
      environment:
        AWS_REGION: "{{ aws_region }}"
        INSTANCE_ID: "{{ _instance_id }}"
        ADMIN_PASSWORD: "{{ admin_password }}"
      register: _ssm_cmd
      changed_when: true
      no_log: true

    - name: Wait for SSM password-reset command to complete
      ansible.builtin.command:
        argv:
          - python3
          - -c
          - |
            import boto3, os
            ssm = boto3.client('ssm', region_name=os.environ['AWS_REGION'])
            try:
                r = ssm.get_command_invocation(
                    CommandId=os.environ['COMMAND_ID'],
                    InstanceId=os.environ['INSTANCE_ID'],
                )
                print(r['Status'])
            except ssm.exceptions.InvocationDoesNotExist:
                print('Pending')
      environment:
        AWS_REGION: "{{ aws_region }}"
        INSTANCE_ID: "{{ _instance_id }}"
        COMMAND_ID: "{{ _ssm_cmd.stdout }}"
      register: _ssm_status
      retries: 30
      delay: 5
      until: _ssm_status.stdout == "Success"
      failed_when: _ssm_status.stdout in ["Failed", "Cancelled", "TimedOut"]
      changed_when: false

    - name: Wait for WinRM HTTP to be reachable
      ansible.builtin.wait_for:
        host: "{{ _public_ip }}"
        port: 5985
        timeout: 600
        delay: 60
        sleep: 10

    - name: Add the new instance to runtime inventory
      ansible.builtin.add_host:
        name: "{{ _public_ip }}"
        groups: iis_demo
        ansible_connection: winrm
        ansible_user: Administrator
        ansible_password: "{{ admin_password }}"
        ansible_port: 5985
        ansible_winrm_scheme: http
        ansible_winrm_transport: basic
        ansible_winrm_message_encryption: auto

    - name: Populate "IIS Demo Secrets" credential in AAP Controller
      vars:
        _controller_host: "{{ lookup('env', 'CONTROLLER_HOST') }}"
        _controller_user: "{{ lookup('env', 'CONTROLLER_USERNAME') | default('admin', true) }}"
        _controller_pass: "{{ lookup('env', 'CONTROLLER_PASSWORD') }}"
      block:
        - name: Assert AAP Controller Admin credential is attached
          ansible.builtin.assert:
            that:
              - _controller_host | length > 0
              - _controller_pass | length > 0
            fail_msg: >-
              Attach the "AAP Controller Admin" credential to the
              "IIS Demo - Provision" job template so the credential
              can be updated with the new host IP and password.

        - name: Look up IIS Demo Secrets credential ID
          ansible.builtin.uri:
            url: "{{ _controller_host }}/api/controller/v2/credentials/?name=IIS+Demo+Secrets"
            method: GET
            user: "{{ _controller_user }}"
            password: "{{ _controller_pass }}"
            force_basic_auth: true
            validate_certs: false
          register: _cred_lookup

        - name: Patch IIS Demo Secrets credential with new host + password
          ansible.builtin.uri:
            url: "{{ _controller_host }}/api/controller/v2/credentials/{{ _cred_lookup.json.results[0].id }}/"
            method: PATCH
            user: "{{ _controller_user }}"
            password: "{{ _controller_pass }}"
            force_basic_auth: true
            validate_certs: false
            body_format: json
            body:
              inputs:
                IIS_HOST: "{{ _public_ip }}"
                IIS_ADMIN_PASSWORD: "{{ admin_password }}"
            status_code: [200]
          no_log: true
      rescue:
        - name: Credential update failed (non-fatal)
          ansible.builtin.debug:
            msg: >-
              Could not update IIS Demo Secrets credential:
              {{ ansible_failed_result.msg | default('unknown') }}.
              Manually update it with IIS_HOST={{ _public_ip }}.

    - name: Update EDA "IIS Auto-Heal" activation with new IIS_HEALTH_URL
      vars:
        _controller_host: "{{ lookup('env', 'CONTROLLER_HOST') }}"
        _controller_user: "{{ lookup('env', 'CONTROLLER_USERNAME') | default('admin', true) }}"
        _controller_pass: "{{ lookup('env', 'CONTROLLER_PASSWORD') }}"
        _activation_name: "IIS Auto-Heal"
      block:
        - name: Look up IIS Auto-Heal activation ID
          ansible.builtin.uri:
            url: "{{ _controller_host }}/api/eda/v1/activations/?name={{ _activation_name | urlencode }}"
            method: GET
            user: "{{ _controller_user }}"
            password: "{{ _controller_pass }}"
            force_basic_auth: true
            validate_certs: false
          register: _act_lookup

        - name: Patch + restart activation when found
          when: (_act_lookup.json.results | default([])) | length > 0
          vars:
            _act_id: "{{ _act_lookup.json.results[0].id }}"
          block:
            - name: Patch activation extra_var + re-enable
              ansible.builtin.uri:
                url: "{{ _controller_host }}/api/eda/v1/activations/{{ _act_id }}/"
                method: PATCH
                user: "{{ _controller_user }}"
                password: "{{ _controller_pass }}"
                force_basic_auth: true
                validate_certs: false
                body_format: json
                body:
                  is_enabled: true
                  # extra_var is a CharField on the EDA API and runs through
                  # yaml.safe_load — must be a serialized string, not a dict.
                  extra_var: "{{ {'IIS_HEALTH_URL': 'http://' ~ _public_ip ~ '/health.aspx'} | to_nice_yaml }}"
                status_code: [200]

            - name: Restart activation so the new URL takes effect
              ansible.builtin.uri:
                url: "{{ _controller_host }}/api/eda/v1/activations/{{ _act_id }}/restart/"
                method: POST
                user: "{{ _controller_user }}"
                password: "{{ _controller_pass }}"
                force_basic_auth: true
                validate_certs: false
                status_code: [200, 204]
      rescue:
        - name: Activation update failed (non-fatal)
          ansible.builtin.debug:
            msg: >-
              Could not update EDA activation '{{ _activation_name }}':
              {{ ansible_failed_result.msg | default('unknown') }}.
              Manually set IIS_HEALTH_URL=http://{{ _public_ip }}/health.aspx
              on the activation, then restart it.

- name: Configure IIS on the demo host
  hosts: iis_demo
  gather_facts: false

  tasks:
    - name: Wait for WinRM
      ansible.builtin.wait_for_connection:
        timeout: 600

    - name: Install IIS and ASP.NET features
      ansible.windows.win_feature:
        name:
          - Web-Server
          - Web-Asp-Net45
          - Web-Net-Ext45
          - Web-ISAPI-Ext
          - Web-ISAPI-Filter
        include_management_tools: true
        state: present

    - name: Remove default IIS page
      ansible.windows.win_file:
        path: 'C:\inetpub\wwwroot\iisstart.htm'
        state: absent

    - name: Deploy demo pages
      ansible.windows.win_copy:
        src: "{{ item }}"
        dest: 'C:\inetpub\wwwroot\{{ item | basename }}'
      loop:
        - files/default.aspx
        - files/health.aspx

    - name: Initialize restart counter if missing
      ansible.windows.win_copy:
        content: "0"
        dest: 'C:\inetpub\wwwroot\restartcount.txt'
        force: false

    - name: Set Default.aspx as default document
      ansible.windows.win_shell: |
        Import-Module WebAdministration
        Remove-WebConfigurationProperty -Filter /system.webServer/defaultDocument/files -Name . -AtElement @{value='Default.aspx'} -ErrorAction SilentlyContinue
        Add-WebConfigurationProperty -Filter /system.webServer/defaultDocument/files -Name . -Value @{value='Default.aspx'}
      changed_when: false

    - name: Restart IIS to pick up configuration
      ansible.windows.win_shell: iisreset
      changed_when: true

    - name: Display demo URL
      ansible.builtin.debug:
        msg: |
          IIS demo ready at: http://{{ inventory_hostname }}/
          Health endpoint:   http://{{ inventory_hostname }}/health.aspx
          Administrator password stored in Vault at secret/iis-demo
