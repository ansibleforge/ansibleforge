---
- name: "Look up AAP user {{ target_user }}"
  ansible.builtin.uri:
    url: "{{ controller_hostname }}/api/controller/v2/users/?username={{ target_user }}"
    user: "{{ controller_username }}"
    password: "{{ controller_password }}"
    force_basic_auth: true
    validate_certs: "{{ controller_validate_certs }}"
  register: _aap_user

- name: "Skip {{ target_user }} - not found in AAP"
  ansible.builtin.debug:
    msg: "User '{{ target_user }}' not found in AAP, skipping"
  when: _aap_user.json.count == 0

- name: "Provision aap-creds for {{ target_user }}"
  when: _aap_user.json.count > 0
  block:
    - name: Create AAP personal token
      ansible.builtin.uri:
        url: "{{ controller_hostname }}/api/controller/v2/users/{{ _aap_user.json.results[0].id }}/personal_tokens/"
        method: POST
        user: "{{ controller_username }}"
        password: "{{ controller_password }}"
        force_basic_auth: true
        validate_certs: "{{ controller_validate_certs }}"
        body_format: json
        body:
          scope: write
          description: "DevSpaces workspace token (managed)"
        status_code: [201]
      register: _aap_token

    - name: Check if aap-creds secret exists
      ansible.builtin.uri:
        url: "{{ k8s_host }}/api/v1/namespaces/{{ target_user }}-devspaces/secrets/aap-creds"
        method: GET
        headers:
          Authorization: "Bearer {{ k8s_token }}"
        validate_certs: false
        status_code: [200, 404]
      register: _existing_secret

    - name: Create aap-creds secret
      ansible.builtin.uri:
        url: "{{ k8s_host }}/api/v1/namespaces/{{ target_user }}-devspaces/secrets"
        method: POST
        headers:
          Authorization: "Bearer {{ k8s_token }}"
          Content-Type: application/json
        validate_certs: false
        body_format: json
        body:
          apiVersion: v1
          kind: Secret
          metadata:
            name: aap-creds
            namespace: "{{ target_user }}-devspaces"
          type: Opaque
          data:
            CONTROLLER_HOST: "{{ controller_hostname | b64encode }}"
            CONTROLLER_OAUTH_TOKEN: "{{ _aap_token.json.token | b64encode }}"
            AWXKIT_API_BASE_PATH: "{{ '/api/controller/v2' | b64encode }}"
        status_code: [201]
      when: _existing_secret.status == 404

    - name: Update aap-creds secret
      ansible.builtin.uri:
        url: "{{ k8s_host }}/api/v1/namespaces/{{ target_user }}-devspaces/secrets/aap-creds"
        method: PUT
        headers:
          Authorization: "Bearer {{ k8s_token }}"
          Content-Type: application/json
        validate_certs: false
        body_format: json
        body:
          apiVersion: v1
          kind: Secret
          metadata:
            name: aap-creds
            namespace: "{{ target_user }}-devspaces"
          type: Opaque
          data:
            CONTROLLER_HOST: "{{ controller_hostname | b64encode }}"
            CONTROLLER_OAUTH_TOKEN: "{{ _aap_token.json.token | b64encode }}"
            AWXKIT_API_BASE_PATH: "{{ '/api/controller/v2' | b64encode }}"
        status_code: [200]
      when: _existing_secret.status == 200

    - name: Done
      ansible.builtin.debug:
        msg: "aap-creds provisioned for {{ target_user }}"
