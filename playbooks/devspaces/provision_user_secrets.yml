---
- name: Provision DevSpaces User Secrets
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    controller_hostname: "{{ lookup('env', 'CONTROLLER_HOST') | default('https://aap-aap.' ~ cluster_domain, true) }}"
    controller_username: "{{ lookup('env', 'CONTROLLER_USERNAME') | default('admin', true) }}"
    controller_password: "{{ lookup('env', 'CONTROLLER_PASSWORD') }}"
    controller_validate_certs: false
    k8s_host: "{{ lookup('env', 'K8S_HOST') | default('https://kubernetes.default.svc', true) }}"
    k8s_token: "{{ lookup('env', 'K8S_TOKEN') | default('', true) }}"
    username: ""

  pre_tasks:
    - name: Validate credentials
      ansible.builtin.assert:
        that:
          - controller_password | length > 0
          - k8s_token | length > 0
        fail_msg: >-
          Required: controller credentials and OpenShift API Token
          credential attached to the job template.

    - name: Discover users when no username specified
      when: username | length == 0
      block:
        - name: List devspaces namespaces
          ansible.builtin.uri:
            url: "{{ k8s_host }}/api/v1/namespaces?labelSelector=app.kubernetes.io/part-of%3Dche.eclipse.org"
            headers:
              Authorization: "Bearer {{ k8s_token }}"
            validate_certs: false
          register: _devspaces_ns

        - name: Find namespaces matching *-devspaces pattern
          ansible.builtin.set_fact:
            _target_users: >-
              {{ _devspaces_ns.json.items
                 | map(attribute='metadata.name')
                 | select('match', '.*-devspaces$')
                 | map('regex_replace', '-devspaces$', '')
                 | list }}

    - name: Use specified username
      when: username | length > 0
      ansible.builtin.set_fact:
        _target_users:
          - "{{ username }}"

    - name: Display target users
      ansible.builtin.debug:
        msg: "Provisioning aap-creds for: {{ _target_users | join(', ') }}"

  tasks:
    - name: Provision aap-creds for each user
      ansible.builtin.include_tasks: provision_user_aap_token.yml
      loop: "{{ _target_users }}"
      loop_control:
        loop_var: target_user
