---
- name: Provision DevSpaces User Secrets
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    controller_hostname: "{{ lookup('env', 'CONTROLLER_HOST') | default('https://aap-aap.' ~ cluster_domain, true) }}"
    controller_username: "{{ lookup('env', 'CONTROLLER_USERNAME') | default('admin', true) }}"
    controller_password: "{{ lookup('env', 'CONTROLLER_PASSWORD') }}"
    controller_validate_certs: false
    k8s_host: "{{ lookup('env', 'K8S_HOST') | default('https://kubernetes.default.svc', true) }}"
    k8s_token: "{{ lookup('env', 'K8S_TOKEN') | default('', true) }}"
    username: ""

  pre_tasks:
    - name: Validate inputs
      ansible.builtin.assert:
        that:
          - username | length > 0
          - controller_password | length > 0
          - k8s_token | length > 0
        fail_msg: >-
          Required: username, controller credentials, and OpenShift
          API Token credential attached to the job template.

    - name: Look up AAP user
      ansible.builtin.uri:
        url: "{{ controller_hostname }}/api/controller/v2/users/?username={{ username }}"
        user: "{{ controller_username }}"
        password: "{{ controller_password }}"
        force_basic_auth: true
        validate_certs: "{{ controller_validate_certs }}"
      register: _aap_user

    - name: Fail if user not found in AAP
      ansible.builtin.assert:
        that: _aap_user.json.count > 0
        fail_msg: "User '{{ username }}' not found in AAP"

  tasks:
    - name: Create AAP personal token for user
      ansible.builtin.uri:
        url: "{{ controller_hostname }}/api/controller/v2/users/{{ _aap_user.json.results[0].id }}/personal_tokens/"
        method: POST
        user: "{{ controller_username }}"
        password: "{{ controller_password }}"
        force_basic_auth: true
        validate_certs: "{{ controller_validate_certs }}"
        body_format: json
        body:
          scope: write
          description: "DevSpaces workspace token (managed)"
        status_code: [201]
      register: _aap_token

    - name: Store aap-creds in user namespace
      ansible.builtin.uri:
        url: "{{ k8s_host }}/api/v1/namespaces/{{ username }}-devspaces/secrets/aap-creds"
        method: GET
        headers:
          Authorization: "Bearer {{ k8s_token }}"
        validate_certs: false
        status_code: [200, 404]
      register: _existing_secret

    - name: Create aap-creds secret
      ansible.builtin.uri:
        url: "{{ k8s_host }}/api/v1/namespaces/{{ username }}-devspaces/secrets"
        method: POST
        headers:
          Authorization: "Bearer {{ k8s_token }}"
          Content-Type: application/json
        validate_certs: false
        body_format: json
        body:
          apiVersion: v1
          kind: Secret
          metadata:
            name: aap-creds
            namespace: "{{ username }}-devspaces"
          type: Opaque
          data:
            CONTROLLER_HOST: "{{ controller_hostname | b64encode }}"
            CONTROLLER_OAUTH_TOKEN: "{{ _aap_token.json.token | b64encode }}"
            AWXKIT_API_BASE_PATH: "{{ '/api/controller/v2' | b64encode }}"
        status_code: [201]
      when: _existing_secret.status == 404

    - name: Update aap-creds secret
      ansible.builtin.uri:
        url: "{{ k8s_host }}/api/v1/namespaces/{{ username }}-devspaces/secrets/aap-creds"
        method: PUT
        headers:
          Authorization: "Bearer {{ k8s_token }}"
          Content-Type: application/json
        validate_certs: false
        body_format: json
        body:
          apiVersion: v1
          kind: Secret
          metadata:
            name: aap-creds
            namespace: "{{ username }}-devspaces"
          type: Opaque
          data:
            CONTROLLER_HOST: "{{ controller_hostname | b64encode }}"
            CONTROLLER_OAUTH_TOKEN: "{{ _aap_token.json.token | b64encode }}"
            AWXKIT_API_BASE_PATH: "{{ '/api/controller/v2' | b64encode }}"
        status_code: [200]
      when: _existing_secret.status == 200

    - name: Done
      ansible.builtin.debug:
        msg: "aap-creds provisioned for {{ username }} in {{ username }}-devspaces"
